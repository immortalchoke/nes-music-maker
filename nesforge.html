      const relY = (my - ((isNoise || isPads) ? this.RULER_HEIGHT : 0)) + this.scrollY;
      const barW = this.barWidth();
      // Snap to the current cell size (stamp duration) so a click anywhere in a cell
      // lands at that cell's start rather than an arbitrary 1/32 subdivision.
      const defaultDur = this.sixteenthWidth() / this.barWidth() / 2;
      const cellDur = this._stampDuration !== null ? this._stampDuration : defaultDur;
      const snapVal = (PR._snapVal !== undefined) ? PR._snapVal : cellDur;
      const snapPx = Math.max(barW / 64, snapVal * barW);
      const snappedStart = Math.floor(relX / snapPx) * snapPx / barW;
      const rowIdx = Math.floor(relY / this.ROW_HEIGHT);
      const pitch = (isNoise || isPads) ? (rows[rowIdx] ?? -1) : (127 - rowIdx);
      return { snappedStart, rowIdx, pitch };
    };

    // Expand hit area on touch devices so fingers can tap small notes
    const _touchExpand = window.matchMedia('(pointer: coarse)').matches ? 10 : 0;

    const hitTestNote = (mx, my, expand = 0) => {
      const ap = this.activePattern;
      if (!ap) return null;
      const isNoise = isDrumChannel(ap.track.channelType);
      const isPads  = ap.track.channelType === 'sampler' && ap.track.samplerMode === 'pads';
      const PAD_RANGE = Array.from({length: 24}, (_, i) => i + 24);
      const rows = isNoise ? this.DRUM_ROWS : (isPads ? PAD_RANGE : null);
      const barW = this.barWidth();
      const drumOffset = (isNoise || isPads) ? this.RULER_HEIGHT : 0;
      for (const note of ap.pattern.notes) {
        let rowIdx = (isNoise || isPads) ? rows.indexOf(note.pitch) : (127 - note.pitch);
        if (isNoise && rowIdx < 0) {
          rowIdx = rows.reduce((best, row, ri) =>
            Math.abs(row - note.pitch) < Math.abs(rows[best] - note.pitch) ? ri : best, 0);
          note.pitch = rows[rowIdx]; // heal in-place
        }
        const y = drumOffset + rowIdx * this.ROW_HEIGHT - this.scrollY;
        const x = this.KEY_WIDTH + note.start * barW - this.scrollX;
        const w = note.duration * barW;
        if (mx >= x - expand && mx <= x + w + expand &&
            my >= y - expand && my <= y + this.ROW_HEIGHT + expand) {
          return { note, x, w, y };
        }
      }
      return null;
    };

    // Hit-test glide out-port (right edge circle, r=8px) — pitched channels only
    const hitTestOutPort = (mx, my) => {
      const ap = this.activePattern;
      if (!ap || isDrumChannel(ap.track.channelType)) return null;
      const barW = this.barWidth();
      for (const note of ap.pattern.notes) {
        const rowIdx = 127 - note.pitch;
        const nx = this.KEY_WIDTH + note.start * barW - this.scrollX;
        const nw = note.duration * barW;
        const cy = rowIdx * this.ROW_HEIGHT + this.ROW_HEIGHT / 2 - this.scrollY;
        if (Math.hypot(mx - (nx + nw), my - cy) <= 8) return note;
      }
      return null;
    };

    // Hit-test glide in-port (left edge circle, r=8px) — pitched channels only
    const hitTestInPort = (mx, my) => {
      const ap = this.activePattern;
      if (!ap || isDrumChannel(ap.track.channelType)) return null;
      const barW = this.barWidth();
      for (const note of ap.pattern.notes) {
        const rowIdx = 127 - note.pitch;
        const nx = this.KEY_WIDTH + note.start * barW - this.scrollX;
        const cy = rowIdx * this.ROW_HEIGHT + this.ROW_HEIGHT / 2 - this.scrollY;
        if (Math.hypot(mx - nx, my - cy) <= 8) return note;
      }
      return null;
    };

    // Hit-test glide midpoint node (connector delete handle, r=9px)
    const hitTestGlideNode = (mx, my) => {
      const ap = this.activePattern;
      if (!ap) return null;
      const barW = this.barWidth();
      const noteById = {};
      for (const n of ap.pattern.notes) noteById[n.id] = n;
      for (const note of ap.pattern.notes) {
        if (!note.glideTo) continue;
        const target = noteById[note.glideTo];
        if (!target) continue;
        const srcX = this.KEY_WIDTH + (note.start + note.duration) * barW - this.scrollX;
        const srcY = (127 - note.pitch) * this.ROW_HEIGHT + this.ROW_HEIGHT / 2 - this.scrollY;
        const tgtX = this.KEY_WIDTH + target.start * barW - this.scrollX;
        const tgtY = (127 - target.pitch) * this.ROW_HEIGHT + this.ROW_HEIGHT / 2 - this.scrollY;
        const midX = (srcX + tgtX) / 2;
        const midY = (srcY + tgtY) / 2;
        if (Math.hypot(mx - midX, my - midY) <= 9) return note; // return source note
      }
      return null;
    };

    // Stop the currently-playing preview note (if any) immediately.
    let _previewStop = null;
    const stopPreview = () => {
      if (_previewStop) { try { _previewStop(); } catch(e) {} _previewStop = null; }
    };
    const previewNote = (track, pitch, duration) => {
      stopPreview();
      const ctx = getAudioCtx();
      const fakeNote = { pitch, start: 0, duration, velocity: 100 };
      _previewStop = playNote(track, fakeNote, ctx.currentTime + 0.01) || null;
    };

    const placeNote = (ap, pitch, snappedStart) => {
      const defaultDur = this.sixteenthWidth() / this.barWidth() / 2; // 1/8 note
      const duration = this._stampDuration !== null ? this._stampDuration : defaultDur;
      let p = pitch;
      if (!isDrumChannel(ap.track.channelType) && ProjectState.scale !== 'Chromatic') {
        p = Scales.snapToScale(p, ProjectState.key, ProjectState.scale);
      }
      if (p < 0 || p > 127) return null;
      // Avoid duplicate at same cell
      const exists = ap.pattern.notes.find(n => n.pitch === p && n.start === snappedStart);
      if (exists) return null;
      History.push();
      ap.pattern.notes.forEach(n => { n.selected = false; });
      const note = { id: makeId(), pitch: p, start: snappedStart, duration, velocity: 100, selected: true, glideTo: null, glideSpeed: 0.85 };
      ap.pattern.notes.push(note);
      previewNote(ap.track, p, duration);
      return note;
    };

    // Shared handler for both dblclick event and touch double-tap
    const _onDblClick = (mx, my, clientX, clientY) => {
      const ap = this.activePattern;
      if (!ap || mx < this.KEY_WIDTH) return;
      // Ruler area interception
      if (my < this.RULER_HEIGHT) {
        if (my >= this.LOOP_BAR_H) {
          // Timeline bar double-click → place playhead + play
          const patStartBar = ap.track.arrangement.find(en => en.patternId === ap.pattern.id)?.startBar || 0;
          const bar = patStartBar + (mx - this.KEY_WIDTH + this.scrollX) / this.barWidth();
          ProjectState.playheadBar = Math.max(0, bar);
          if (typeof Sequencer !== 'undefined') {
            Sequencer._playStartBar = ProjectState.playheadBar;
            Sequencer.play();
          }
          this.draw(); AV.draw();
        }
        return;
      }
      const hit = hitTestNote(mx, my, _touchExpand);
      if (hit) {
        History.push();
        ap.pattern.notes = ap.pattern.notes.filter(n => n !== hit.note);
        this.draw(); this.drawVelocity();
      } else {
        const pos = posToNote(mx, my);
        if (!pos) return;
        if (NoteSeq.engaged) {
          this._selectedCell = pos;
          this.draw();
          NoteSeq.open({ rootMidi: pos.pitch, snappedStart: pos.snappedStart });
          return;
        }
        if (PR._tool === 'stamp') {
          const count = PR._stampCount || 4;
          const pitchDelta = PR._stampPitchDelta || 0;
          const interval = PR._stampInterval || 0.0625;
          const useScaleSteps = PR._stampPitchMode === 'scale';
          History.push();
          ap.pattern.notes.forEach(n => { n.selected = false; });
          for (let i = 0; i < count; i++) {
            const start = pos.snappedStart + i * interval;
            if (start >= ap.pattern.lengthBars) break;
            let pitch;
            if (pitchDelta === 0) {
              pitch = pos.pitch;
            } else if (useScaleSteps) {
              pitch = stepByScale(pos.pitch, pitchDelta * i);
            } else {
              pitch = pos.pitch + pitchDelta * i;
            }
            pitch = Math.max(0, Math.min(127, pitch));
            if (!isDrumChannel(ap.track.channelType) &&
                ProjectState.scale !== 'Chromatic' && pitchDelta === 0) {
              pitch = Scales.snapToScale(pitch, ProjectState.key, ProjectState.scale);
            }
            const dur = PR._stampDuration !== null ?
              PR._stampDuration : PR.sixteenthWidth() / PR.barWidth() / 2;
            const exists = ap.pattern.notes.find(n => n.pitch === pitch && n.start === start);
            if (!exists) {
              ap.pattern.notes.push({
                id: makeId(), pitch, start,
                duration: dur, velocity: 100, selected: i === 0,
                glideTo: null, glideSpeed: 0.85
              });
            }
          }
          this.draw(); this.drawVelocity(); this.updateSidePanel();
          return;
        }
        placeNote(ap, pos.pitch, pos.snappedStart);
        this.draw(); this.drawVelocity(); this.updateSidePanel();
      }
    };

    canvas.addEventListener('dblclick', (e) => {
      const rect = canvas.getBoundingClientRect();
      _onDblClick(e.clientX - rect.left, e.clientY - rect.top, e.clientX, e.clientY);
    });

    // Double-tap state: recorded on touchend, checked on next touchstart.
    // This sidesteps all synthetic-event race conditions — by the time tap2's
    // touchstart fires, tap1's mouse events have already completed.
    let _lastTapEnd = null;

    canvas.addEventListener('mousedown', (e) => {
      if (e.detail >= 2) return; // dblclick handled separately
      if (_prTouch?.mode === 'note') return; // touch already handling this note drag
      const ap = this.activePattern;
      if (!ap) return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      // Ruler interaction — two-bar model
      if (my < this.RULER_HEIGHT) {
        const patStartBar = ap.track.arrangement.find(en => en.patternId === ap.pattern.id)?.startBar || 0;
        const bar = patStartBar + (mx - this.KEY_WIDTH + this.scrollX) / this.barWidth();
        if (my < this.LOOP_BAR_H) {
          // Loop bar: click toggle, drag draws new loop region
          const barW = this.barWidth();
          const lx1 = this.KEY_WIDTH + (ProjectState.loopStart - patStartBar) * barW - this.scrollX;
          const lx2 = this.KEY_WIDTH + (ProjectState.loopEnd   - patStartBar) * barW - this.scrollX;
          const inLoop = mx >= lx1 && mx <= lx2;
          const snapped = Math.max(0, Math.floor(bar));
          dragState = { type: 'pr-loop-bar-drag', patStartBar, anchorBar: snapped, anchorX: mx, hasMoved: false, wasInLoop: inLoop };
        } else {
          // Timeline bar: click/drag scrubs playhead
          ProjectState.playheadBar = Math.max(0, bar);
          if (typeof Sequencer !== 'undefined') Sequencer._playStartBar = ProjectState.playheadBar;
          dragState = { type: 'pr-playhead', patStartBar };
        }
        this.draw(); AV.draw();
        return;
      }

      if (mx < this.KEY_WIDTH) {
        // Click on piano key — audition the note at this row
        if (my >= this.RULER_HEIGHT) {
          const isNoise = isDrumChannel(ap.track.channelType);
          const rowIdx = isNoise
            ? Math.floor((my - this.RULER_HEIGHT) / this.ROW_HEIGHT)
            : Math.floor((my + this.scrollY) / this.ROW_HEIGHT);
          const pitch = isNoise ? this.DRUM_ROWS[rowIdx] : (127 - rowIdx);
          if (pitch !== undefined && pitch >= 0 && pitch <= 127) {
            this._pressedKey = pitch;
            this.draw();
            previewNote(ap.track, pitch, 0.5);
            const clearPress = () => {
              this._pressedKey = null;
              this.draw();
              document.removeEventListener('mouseup', clearPress);
              document.removeEventListener('touchend', clearPress);
            };
            document.addEventListener('mouseup', clearPress, { once: true });
            document.addEventListener('touchend', clearPress, { once: true });
          }
        }
        return;
      }

      // ── GLIDE tool: handle before normal hit-test ─────────────────
      if (PR._tool === 'glide' && ap && !isDrumChannel(ap.track.channelType)) {
        // Priority 1: click midpoint node → delete glide link
        const nodeHit = hitTestGlideNode(mx, my);
        if (nodeHit) {
          History.push();
          nodeHit.glideTo = null;
          PR._glideHoverNode = null;
          this.draw();
          return;
        }
        // Priority 2: click anywhere on a note body → start drawing a connection
        // (out-port circles are visual guides; dragging from note body is more usable)
        const bodyHit = hitTestNote(mx, my, 0);
        if (bodyHit) {
          dragState = { type: 'glide-draw', sourceNote: bodyHit.note, currentX: mx, currentY: my };
          this._dragState = dragState;
          PR._glideDragTarget = null;
          canvas.style.cursor = 'crosshair';
          return;
        }
        // Otherwise do nothing (don't create notes in glide mode)
        return;
      }
      // ── end GLIDE tool branch ─────────────────────────────────────

      const hit = hitTestNote(mx, my, _touchExpand);
      if (hit) {
        const { note, x, w } = hit;
        const snapshot = JSON.stringify(ProjectState);
        if (mx > x + w - 6) {
          // Build a Map<noteObject, origDur> for the dragged note + all selected notes.
          // Using a Map with object keys guarantees we hold the exact same references.
          const selMap = new Map();
          for (const n of ap.pattern.notes) {
            if (n.selected) selMap.set(n, n.duration);
          }
          selMap.set(note, note.duration); // always include dragged note (may already be there)
          dragState = { type: 'resize', note, startX: mx, origDur: note.duration, selMap, snapshot };
        } else if (e.altKey) {
          // Option+drag: clone note(s) and drag the copies; originals stay in place.
          // If the hit note is part of a multi-note selection, clone the whole selection.
          const selectedNotes = ap.pattern.notes.filter(n => n.selected);
          const notesToCopy = (note.selected && selectedNotes.length > 1) ? selectedNotes : [note];
          ap.pattern.notes.forEach(n => { n.selected = false; });
          const clones = notesToCopy.map(n => {
            const c = { ...n, id: makeId(), selected: true, glideTo: null }; // clones start without glide links
            if (c.chordId) { delete c.chordId; delete c.chordLabel; } // detach from chord group
            return c;
          });
          ap.pattern.notes.push(...clones);
          const hitClone = clones[notesToCopy.indexOf(note)] || clones[0];
          dragState = {
            type: 'move', note: hitClone,
            startX: mx, startY: my,
            origPitch: hitClone.pitch, origStart: hitClone.start,
            lastPitch: hitClone.pitch, lastStart: hitClone.start,
            hasMoved: false,
            movingSelection: clones.length > 1,
            snapshot
          };
          this.draw();
        } else {
          const wasSelected = !!note.selected;
          if (e.shiftKey) {
            // Shift+click: toggle this note in/out of the current selection
            note.selected = !wasSelected;
            this.draw();
          } else {
            if (!wasSelected) {
              ap.pattern.notes.forEach(n => { n.selected = false; });
            }
            note.selected = true;
            this._stampDuration = note.duration;
            dragState = {
              type: 'move', note,
              startX: mx, startY: my,
              origPitch: note.pitch, origStart: note.start,
              lastPitch: note.pitch, lastStart: note.start,
              hasMoved: false,
              movingSelection: wasSelected,
              snapshot
            };
            this.draw();
          }
        }
      } else {
        ap.pattern.notes.forEach(n => { n.selected = false; });
        const pos = posToNote(mx, my);
        if (pos) {
          this._selectedCell = pos;
          this._hoverPitch = pos.pitch;
          this._pitchLocked = true;
          this.updateSidePanel();
        }
        this._hoverCell = null;
        dragState = { type: 'marquee', startX: mx, startY: my, currentX: mx, currentY: my, startScrollX: this.scrollX, startScrollY: this.scrollY };
        this._dragState = dragState;
        this.draw();
      }
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!dragState) {
        // Hover cursor: show copy cursor when Option held over a note body
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        // ── GLIDE tool hover ───────────────────────────────────────
        if (PR._tool === 'glide') {
          const nodeHit = hitTestGlideNode(mx, my);
          const newHover = nodeHit ? nodeHit.id : null;
          if (PR._glideHoverNode !== newHover) {
            PR._glideHoverNode = newHover;
            this.draw();
          }
          if (newHover) {
            canvas.style.cursor = 'pointer'; // midpoint node = delete
          } else {
            const noteHit = hitTestNote(mx, my, 0);
            canvas.style.cursor = noteHit ? 'crosshair' : ''; // note body = drag to connect
          }
          return; // skip normal hover logic in glide mode
        }
        // ── end GLIDE tool hover ───────────────────────────────────

        if (mx >= this.KEY_WIDTH) {
          const hit = hitTestNote(mx, my, _touchExpand);
          if (hit) {
            const { x, w } = hit;
            canvas.style.cursor = mx > x + w - 6 ? 'ew-resize' : (e.altKey ? 'copy' : 'grab');
            if (this._hoverCell) { this._hoverCell = null; this.draw(); }
            if (!this._pitchLocked && this._hoverPitch !== hit.note.pitch) {
              this._hoverPitch = hit.note.pitch;
              this.updateSidePanel();
            }
          } else {
            canvas.style.cursor = '';
            const pos = posToNote(mx, my);
            if (pos) {
              if (!this._hoverCell || this._hoverCell.snappedStart !== pos.snappedStart || this._hoverCell.rowIdx !== pos.rowIdx) {
                this._hoverCell = { rowIdx: pos.rowIdx, snappedStart: pos.snappedStart };
                this.draw();
              }
              if (!this._pitchLocked && this._hoverPitch !== pos.pitch) {
                this._hoverPitch = pos.pitch;
                this.updateSidePanel();
              }
            } else if (this._hoverCell) {
              this._hoverCell = null;
              this.draw();
            }
          }
        } else if (this._hoverCell) {
          this._hoverCell = null;
          this.draw();
          if (this._hoverPitch !== null) { this._hoverPitch = null; this.updateSidePanel(); }
        }
        return;
      }
      const ap = this.activePattern;
      if (!ap) return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      if (dragState.type === 'pr-playhead') {
        const barW = this.barWidth();
        const canvasW = canvas.offsetWidth;
        const edgeZone = 60;
        if (mx < this.KEY_WIDTH + edgeZone) {
          this.scrollX = Math.max(0, this.scrollX - barW * 0.4);
        } else if (mx > canvasW - edgeZone) {
          this.scrollX += barW * 0.4;
        }
        const bar = dragState.patStartBar + (mx - this.KEY_WIDTH + this.scrollX) / this.barWidth();
        ProjectState.playheadBar = Math.max(0, bar);
        if (typeof Sequencer !== 'undefined') Sequencer._playStartBar = ProjectState.playheadBar;
        this.draw(); AV.draw();
        return;
      }
      if (dragState.type === 'pr-loop-bar-drag') {
        if (Math.abs(mx - dragState.anchorX) < 6) return;
        if (!dragState.hasMoved) {
          ProjectState.loopEnabled = true;
          const btn = document.getElementById('btn-loop');
          if (btn) btn.classList.add('btn--engaged');
          dragState.hasMoved = true;
        }
        const bar = dragState.patStartBar + (mx - this.KEY_WIDTH + this.scrollX) / this.barWidth();
        const cell = 1 / ProjectState.timeSignature[0];
        const snap = (v) => Math.round(v / cell) * cell;
        const anchor = dragState.anchorBar;
        const snapped = snap(bar);
        if (snapped <= anchor) {
          ProjectState.loopStart = Math.max(0, snapped);
          ProjectState.loopEnd = anchor + 1;
        } else {
          ProjectState.loopStart = anchor;
          ProjectState.loopEnd = Math.max(anchor + 1, snapped);
        }
        this.draw(); AV.draw();
        return;
      }

      if (dragState.type === 'glide-draw') {
        dragState.currentX = mx;
        dragState.currentY = my;
        // Snap to any note body (not just the tiny in-port circle)
        const noteHit = hitTestNote(mx, my, 0);
        const candidate = noteHit ? noteHit.note : null;
        PR._glideDragTarget = (candidate && candidate !== dragState.sourceNote) ? candidate : null;
        this.draw();
        return;
      }
      if (dragState.type === 'resize') {
        const thirtysecond = 1 / 32; // 1/32 note in bar units
        const deltaBars = (mx - dragState.startX) / this.barWidth();
        const snapDur = (orig) => Math.max(thirtysecond, Math.round((orig + deltaBars) / thirtysecond) * thirtysecond);
        // selMap always contains at least the dragged note; also contains all selected notes.
        for (const [n, origDur] of dragState.selMap) {
          n.duration = snapDur(origDur);
        }
        this.draw();

      } else if (dragState.type === 'move') {
        const dx = mx - dragState.startX;
        const dy = my - dragState.startY;
        if (!dragState.hasMoved && Math.sqrt(dx*dx + dy*dy) < 4) return;
        dragState.hasMoved = true;

        const pos = posToNote(mx, my);
        if (!pos) return;
        const newStart = Math.max(0, pos.snappedStart);
        const isNoise = isDrumChannel(ap.track.channelType);
        const isPads  = ap.track.channelType === 'sampler' && ap.track.samplerMode === 'pads';
        const PAD_RANGE = Array.from({length: 24}, (_, i) => i + 24);
        const newPitch = isNoise
          ? (this.DRUM_ROWS.includes(pos.pitch) ? pos.pitch : dragState.lastPitch)
          : isPads
            ? (PAD_RANGE.includes(pos.pitch) ? pos.pitch : dragState.lastPitch)
            : Math.max(0, Math.min(127, pos.pitch));

        if (newPitch !== dragState.lastPitch || newStart !== dragState.lastStart) {
          const pitchChanged = newPitch !== dragState.lastPitch;
          const deltaStart = newStart - dragState.lastStart;
          const deltaPitch = newPitch - dragState.lastPitch;
          dragState.lastPitch = newPitch;
          dragState.lastStart = newStart;

          if (dragState.movingSelection) {
            ap.pattern.notes.forEach(n => {
              if (n.selected) {
                n.start = Math.max(0, n.start + deltaStart);
                if (!isNoise) n.pitch = Math.max(0, Math.min(127, n.pitch + deltaPitch));
              }
            });
          } else {
            dragState.note.pitch = newPitch;
            dragState.note.start = newStart;
          }

          this._pressedKey = newPitch;
          if (pitchChanged) previewNote(ap.track, newPitch, 0.125); // short stab per cell
          this.draw(); this.drawVelocity();
        }

      } else if (dragState.type === 'marquee') {
        dragState.currentX = mx;
        dragState.currentY = my;
        if (this._selectedCell) { this._selectedCell = null; }
        // Edge auto-scroll: scroll when cursor is within 40px of grid edges
        const EDGE = 40, SPEED = 8;
        const ap2 = this.activePattern;
        if (ap2) {
          const maxScrollX = Math.max(0, (ap2.pattern.lengthBars + 1) * this.barWidth() - (canvas.width - this.KEY_WIDTH));
          const maxScrollY = Math.max(0, 128 * this.ROW_HEIGHT - canvas.height);
          if (mx > canvas.width - EDGE) this.scrollX = Math.min(maxScrollX, this.scrollX + SPEED);
          else if (mx < this.KEY_WIDTH + EDGE) this.scrollX = Math.max(0, this.scrollX - SPEED);
          if (my > canvas.height - EDGE) this.scrollY = Math.min(maxScrollY, this.scrollY + SPEED);
          else if (my < EDGE) this.scrollY = Math.max(0, this.scrollY - SPEED);
        }
        this.draw();
      }
    });

    const onCanvasMouseUp = (e) => {
      if (!dragState) return;
      if (dragState.type === 'glide-draw') {
        const target = PR._glideDragTarget;
        if (target && target !== dragState.sourceNote) {
          if (!target.id) target.id = makeId();
          History.push();
          dragState.sourceNote.glideTo    = target.id;
          dragState.sourceNote.glideSpeed = dragState.sourceNote.glideSpeed ?? 0.85;
        }
        PR._glideDragTarget = null;
        dragState = null; this._dragState = null;
        this.draw();
        return;
      }
      if (dragState.type === 'pr-loop-bar-drag') {
        if (!dragState.hasMoved && dragState.wasInLoop) {
          // Click without drag inside loop → toggle engage/disengage
          ProjectState.loopEnabled = !ProjectState.loopEnabled;
          const btn = document.getElementById('btn-loop');
          if (btn) btn.classList.toggle('btn--engaged',ProjectState.loopEnabled);
          this.draw(); AV.draw();
        }
        dragState = null; this._dragState = null;
        return;
      }
      if (dragState.type === 'pr-playhead') {
        dragState = null; this._dragState = null;
        return;
      }
      if (dragState.type === 'move' && !dragState.hasMoved) {
        // Single click on note body → preview note (selection already set on mousedown)
        const ap = this.activePattern;
        if (ap) previewNote(ap.track, dragState.note.pitch, dragState.note.duration);
      } else if (dragState.type === 'move' && dragState.hasMoved) {
        History._pushSnapshot(dragState.snapshot);
      } else if (dragState.type === 'resize' && dragState.note.duration !== dragState.origDur) {
        History._pushSnapshot(dragState.snapshot);
      } else if (dragState.type === 'marquee') {
        const ap = this.activePattern;
        if (ap) {
          const { startX, startY, currentX, currentY, startScrollX = this.scrollX, startScrollY = this.scrollY } = dragState;
          // Convert marquee corners to world (scroll-independent) coordinates so notes
          // scrolled into view during the drag are included in the selection.
          const barW = this.barWidth();
          const isNoise = isDrumChannel(ap.track.channelType);
          const rows = isNoise ? this.DRUM_ROWS : null;
          const drumOffset = isNoise ? this.RULER_HEIGHT : 0;
          const startWorldX = startX - this.KEY_WIDTH + startScrollX;
          const startWorldY = startY + startScrollY;
          const curWorldX   = currentX - this.KEY_WIDTH + this.scrollX;
          const curWorldY   = currentY + this.scrollY;
          const rectLeft   = Math.min(startWorldX, curWorldX);
          const rectRight  = Math.max(startWorldX, curWorldX);
          const rectTop    = Math.min(startWorldY, curWorldY);
          const rectBottom = Math.max(startWorldY, curWorldY);
          for (const note of ap.pattern.notes) {
            const rowIdx = isNoise ? rows.indexOf(note.pitch) : (127 - note.pitch);
            const noteWorldX = note.start * barW;
            const noteWorldY = drumOffset + rowIdx * this.ROW_HEIGHT;
            const noteW = note.duration * barW;
            if (noteWorldX < rectRight && noteWorldX + noteW > rectLeft &&
                noteWorldY < rectBottom && noteWorldY + this.ROW_HEIGHT > rectTop) {
              note.selected = true;
            }
          }
          const firstSelected = ap.pattern.notes.find(n => n.selected);
          if (firstSelected) {
            this._stampDuration = firstSelected.duration;
          } else {
            const { startX, startY, currentX, currentY } = dragState;
            const wasDrag = Math.abs(currentX - startX) > 4 || Math.abs(currentY - startY) > 4;
            if (wasDrag) {
              this._pitchLocked = false;
              this._hoverPitch = null;
            }
          }
        }
      }
      this._pressedKey = null;
      dragState = null;
      this._dragState = null;
      if (this.activePattern) { this.draw(); this.drawVelocity(); this.updateSidePanel(); }
    };
    if (PR._onMouseUp) document.removeEventListener('mouseup', PR._onMouseUp);
    PR._onMouseUp = onCanvasMouseUp;
    document.addEventListener('mouseup', onCanvasMouseUp);

    canvas.addEventListener('mouseleave', () => {
      this._pitchLocked = false;
      if (this._hoverCell) { this._hoverCell = null; this.draw(); }
      if (this._hoverPitch !== null) { this._hoverPitch = null; this.updateSidePanel(); }
    });

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (Sequencer._playing) Sequencer._followPlayback = false;
      if (e.ctrlKey) {
        // Pinch-to-zoom: scale BEAT_WIDTH, keep bar under cursor fixed
        const factor = Math.exp(-e.deltaY / 120);
        const mx = e.offsetX;
        const barUnderCursor = (mx - this.KEY_WIDTH + this.scrollX) / this.barWidth();
        this.BEAT_WIDTH = Math.max(20, Math.min(320, this.BEAT_WIDTH * factor));
        this.scrollX = Math.max(0, barUnderCursor * this.barWidth() - (mx - this.KEY_WIDTH));
        PR.draw();
        return;
      }
      if (e.shiftKey || Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
        const ap = this.activePattern;
        const maxScrollX = ap
          ? Math.max(0, (ap.pattern.lengthBars + 1) * this.barWidth() - (canvas.width - this.KEY_WIDTH))
          : 0;
        PR.scrollX = Math.max(0, Math.min(maxScrollX, PR.scrollX + (e.deltaX || e.deltaY)));
      } else {
        PR.scrollY = Math.max(0, Math.min(128 * PR.ROW_HEIGHT - canvas.height, PR.scrollY + e.deltaY));
      }
      PR.draw();
    }, { passive: false });

    // ── Touch handling for piano roll ──────────────────────────────────────
    //
    // Double-tap strategy: record finger-lift in touchend (_lastTapEnd), detect
    // on next touchstart. By the time tap2's touchstart fires, tap1's synthetic
    // mouse events have ALREADY completed — no race condition possible.
    //
    // Note drag/resize: computed directly in touchmove — no synthetic events.
    // Scroll: touchmove detects axis and scrolls; preventDefault only there.
    // ────────────────────────────────────────────────────────────────────────
    let _prTouch = null;

    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length > 1) return;
      const t = e.changedTouches[0] || e.touches[0];
      if (!t) return;
      const now = Date.now();
      const rect = canvas.getBoundingClientRect();
      const mx = t.clientX - rect.left;
      const my = t.clientY - rect.top;
      const ap = this.activePattern;

      // ── Double-tap detection: check _lastTapEnd (set in touchend) ──
      // Viewport-relative distance for iOS Desktop Mode compatibility.
      const dblDist = Math.max(60, window.innerWidth * 0.15);
      if (_lastTapEnd && now - _lastTapEnd.time < 700 &&
          Math.abs(t.clientX - _lastTapEnd.x) < dblDist &&
          Math.abs(t.clientY - _lastTapEnd.y) < dblDist) {
        e.preventDefault();
        _lastTapEnd = null;
        _prTouch = null;
        dragState = null; this._dragState = null;
        _onDblClick(mx, my, t.clientX, t.clientY);
        return;
      }

      if (!ap || my < this.RULER_HEIGHT || mx < this.KEY_WIDTH) {
        _prTouch = { x: t.clientX, y: t.clientY, scrolling: false, horiz: false };
        return;
      }

      // ── Note hit? ──
      const hit = hitTestNote(mx, my, _touchExpand);
      if (hit) {
        e.preventDefault(); // prevent mousedown overwriting dragState
        _prTouch = { mode: 'note', startMx: mx, startMy: my };
        const { note, x, w } = hit;
        const snapshot = JSON.stringify(ProjectState);
        const resizeZone = _touchExpand ? Math.max(6, _touchExpand * 2) : 6;
        if (mx > x + w - resizeZone) {
          const selMap = new Map();
          for (const n of ap.pattern.notes) if (n.selected) selMap.set(n, n.duration);
          selMap.set(note, note.duration);
          dragState = { type: 'resize', note, startX: mx, origDur: note.duration, selMap, snapshot };
        } else {
          const wasSelected = !!note.selected;
          if (!wasSelected) ap.pattern.notes.forEach(n => { n.selected = false; });
          note.selected = true;
          this._stampDuration = note.duration;
          dragState = {
            type: 'move', note,
            startX: mx, startY: my,
            origPitch: note.pitch, origStart: note.start,
            lastPitch: note.pitch, lastStart: note.start,
            hasMoved: false, movingSelection: wasSelected,
            snapshot
          };
          this.draw();
        }
        return;
      }

      // ── Empty grid area: track for scroll ──
      _prTouch = { x: t.clientX, y: t.clientY, scrolling: false, horiz: false };
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      if (!_prTouch) return;
      if (e.touches.length > 1) return;
      const t = e.touches[0];

      // ── Note drag / resize: compute directly (no synthetic events) ──
      if (_prTouch.mode === 'note') {
        if (!dragState) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mx = t.clientX - rect.left;
        const my = t.clientY - rect.top;
        const ap = this.activePattern;
        if (!ap) return;
        if (dragState.type === 'resize') {
          const snap32 = 1 / 32;
          const deltaBars = (mx - dragState.startX) / this.barWidth();
          const snapDur = (orig) => Math.max(snap32, Math.round((orig + deltaBars) / snap32) * snap32);
          for (const [n, origDur] of dragState.selMap) n.duration = snapDur(origDur);
          this.draw();
        } else if (dragState.type === 'move') {
          const dx = mx - dragState.startX, dy = my - dragState.startY;
          if (!dragState.hasMoved && Math.sqrt(dx*dx + dy*dy) < 4) return;
          dragState.hasMoved = true;
          const pos = posToNote(mx, my);
          if (!pos) return;
          const newStart = Math.max(0, pos.snappedStart);
          const isNoise = isDrumChannel(ap.track.channelType);
          const isPads  = ap.track.channelType === 'sampler' && ap.track.samplerMode === 'pads';
          const PAD_RANGE = Array.from({length: 24}, (_, i) => i + 24);
          const newPitch = isNoise
            ? (this.DRUM_ROWS.includes(pos.pitch) ? pos.pitch : dragState.lastPitch)
            : isPads
              ? (PAD_RANGE.includes(pos.pitch) ? pos.pitch : dragState.lastPitch)
              : Math.max(0, Math.min(127, pos.pitch));
          if (newPitch !== dragState.lastPitch || newStart !== dragState.lastStart) {
            const pitchChanged = newPitch !== dragState.lastPitch;
            const dStart = newStart - dragState.lastStart, dPitch = newPitch - dragState.lastPitch;
            dragState.lastPitch = newPitch; dragState.lastStart = newStart;
            if (dragState.movingSelection) {
              ap.pattern.notes.forEach(n => {
                if (n.selected) {
                  n.start = Math.max(0, n.start + dStart);
                  if (!isNoise) n.pitch = Math.max(0, Math.min(127, n.pitch + dPitch));
                }
              });
            } else {
              dragState.note.pitch = newPitch;
              dragState.note.start = newStart;
            }
            this._pressedKey = newPitch;
            if (pitchChanged) previewNote(ap.track, newPitch, 0.125); // short stab per cell
            this.draw(); this.drawVelocity();
          }
        }
        return;
      }

      // ── Scroll ──
      if (!_prTouch.x) return;
      const dx = t.clientX - _prTouch.x;
      const dy = t.clientY - _prTouch.y;
      if (!_prTouch.scrolling) {
        if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
        e.preventDefault();
        _prTouch.scrolling = true;
        _prTouch.horiz = Math.abs(dx) > Math.abs(dy);
        dragState = null; this._dragState = null; // cancel any pending mouse drag
      } else {
        e.preventDefault();
      }
      if (Sequencer._playing) Sequencer._followPlayback = false;
      if (_prTouch.horiz) {
        const ap2 = this.activePattern;
        const maxSX = ap2 ? Math.max(0, (ap2.pattern.lengthBars + 1) * this.barWidth() - (canvas.width - this.KEY_WIDTH)) : 0;
        PR.scrollX = Math.max(0, Math.min(maxSX, PR.scrollX - dx));
      } else {
        PR.scrollY = Math.max(0, Math.min(128 * PR.ROW_HEIGHT - canvas.height, PR.scrollY - dy));
      }
      _prTouch.x = t.clientX; _prTouch.y = t.clientY;
      PR.draw();
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      const t = e.changedTouches[0];
      // Determine if this touch was a true tap (no scroll, no drag, no resize)
      const wasScrolling = _prTouch?.scrolling;
      const wasDragged = !!(dragState?.hasMoved);
      const wasResized = !!(dragState?.type === 'resize' && dragState.note.duration !== dragState.origDur);

      if (_prTouch?.mode === 'note') {
        // Single tap on note: play preview; drag was handled live in touchmove
        if (dragState && !dragState.hasMoved && dragState.type === 'move') {
          const ap = this.activePattern;
          if (ap) previewNote(ap.track, dragState.note.pitch, dragState.note.duration);
        }
        if (wasDragged) {
          History._pushSnapshot(dragState.snapshot);
        } else if (wasResized) {
          History._pushSnapshot(dragState.snapshot);
        }
        this._pressedKey = null;
        dragState = null; this._dragState = null;
        if (this.activePattern) { this.draw(); this.drawVelocity(); }
      }

      // Record tap position for double-tap detection on next touchstart.
      // Only record if this was a genuine tap (not a scroll, drag, or resize).
      if (!wasScrolling && !wasDragged && !wasResized && t) {
        _lastTapEnd = { time: Date.now(), x: t.clientX, y: t.clientY };
      } else {
        _lastTapEnd = null;
      }

      _prTouch = null;
    }, { passive: true });

    // Velocity canvas interaction
    const velCanvas = this.getVelCanvas();
    if (!velCanvas) return;
    velCanvas.addEventListener('mousedown', (e) => {
      const ap = this.activePattern;
      if (!ap) return;
      const rect = velCanvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const barW = this.barWidth();
      // Find closest note by x position
      let closest = null, minDist = 20;
      const seen = new Set();
      for (const note of ap.pattern.notes) {
        const key = note.chordId || (note.pitch + '_' + note.start);
        if (seen.has(key)) continue;
        seen.add(key);
        const x = this.KEY_WIDTH + note.start * barW - this.scrollX;
        if (Math.abs(x - mx) < minDist) { minDist = Math.abs(x - mx); closest = note; }
      }
      if (!closest) return;
      dragState = { type: 'velocity', note: closest, startY: my, origVel: closest.velocity };
      const onMove = (ev) => {
        const dy = dragState.startY - (ev.clientY - rect.top);
        const newVel = Math.max(1, Math.min(127, Math.round(dragState.origVel + dy * 1.5)));
        // Apply to chord group if applicable
        if (dragState.note.chordId) {
          ap.pattern.notes.filter(n => n.chordId === dragState.note.chordId)
            .forEach(n => n.velocity = newVel);
        } else {
          dragState.note.velocity = newVel;
        }
        this.draw(); this.drawVelocity();
      };
      const onUp = () => {
        dragState = null;
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    canvas.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const ap = this.activePattern;
      if (!ap) return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const hasSelection = ap.pattern.notes.some(n => n.selected);
      const items = [];
      // Glide connector right-click → "Remove glide" option
      const glideNodeHit = hitTestGlideNode(mx, my);
      if (glideNodeHit) {
        items.push({ label: 'Remove glide', action: () => {
          History.push();
          glideNodeHit.glideTo = null;
          PR.draw(); PR.updateSidePanel();
        }});
      }
      if (hasSelection) items.push({ label: 'Copy  (⌘C)', action: _copySelected });
      if (_clipboard)   items.push({ label: 'Paste  (⌘V)', action: _paste });
      items.push({ label: 'Select All  (⌘A)', action: () => {
        ap.pattern.notes.forEach(n => { n.selected = true; }); PR.draw();
      }});
      if (hasSelection) items.push({ label: 'Delete', action: () => {
        History.push();
        ap.pattern.notes = ap.pattern.notes.filter(n => !n.selected);
        PR.draw(); PR.drawVelocity();
      }});
      showContextMenu(e.clientX, e.clientY, items);
    });
  };

// ============================================================
// UTILITY: drawKnob
// ============================================================
function drawKnob(ctx, cx, cy, r, value, color) {
  // value: 0.0 to 1.0
  const startAngle = Math.PI * 0.75;
  const endAngle = Math.PI * 2.25;
  const angle = startAngle + value * (endAngle - startAngle);

  // Background arc
  ctx.strokeStyle = '#46425e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, endAngle);
  ctx.stroke();

  // Value arc
  ctx.strokeStyle = color;
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, angle);
  ctx.stroke();

  // Indicator dot (pixelated: use rect)
  const ix = cx + (r - 2) * Math.cos(angle);
  const iy = cy + (r - 2) * Math.sin(angle);
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(ix) - 1, Math.round(iy) - 1, 2, 2);

  ctx.lineWidth = 1;
}

function drawPanKnob(ctx, cx, cy, r, pan, color) {
  // pan: -1.0 (full left) to 1.0 (full right), 0 = center/12 o'clock
  const startAngle = Math.PI * 0.75;   // 7 o'clock (min)
  const endAngle   = Math.PI * 2.25;   // 5 o'clock (max)
  const centerAngle = Math.PI * 1.5;   // 12 o'clock

  // Map pan -1..1 → angle
  const totalRange = endAngle - startAngle;
  const angle = centerAngle + pan * (totalRange / 2);

  // Background arc (full sweep)
  ctx.strokeStyle = '#2a2845';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, endAngle);
  ctx.stroke();

  // Fill arc from center to current position
  if (pan !== 0) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    if (pan > 0) {
      ctx.arc(cx, cy, r, centerAngle, angle);
    } else {
      ctx.arc(cx, cy, r, angle, centerAngle);
    }
    ctx.stroke();
  }

  // Knob body fill — solid circle inside the arc ring
  ctx.fillStyle = '#3a3660';
  ctx.beginPath();
  ctx.arc(cx, cy, r - 2, 0, Math.PI * 2);
  ctx.fill();

  // Tick mark — line from center of knob outward
  const tickInner = r * 0.15;
  const tickOuter = r * 0.82;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx + tickInner * Math.cos(angle), cy + tickInner * Math.sin(angle));
  ctx.lineTo(cx + tickOuter * Math.cos(angle), cy + tickOuter * Math.sin(angle));
  ctx.stroke();

  ctx.lineWidth = 1;
}

// ============================================================
// MODULE: ArrangementView
// ============================================================
const AV = {
  HEADER_WIDTH: 240,
  TRACK_HEIGHT: 96,
  BEAT_WIDTH: 40,
  RULER_HEIGHT: 36,
  LOOP_BAR_H: 18,   // top strip of ruler reserved for loop region (= timeline bar height)
  scrollX: 0,
  scrollY: 0,
  _scrollAnim: null,
  animateScrollY(target) {
    if (this._scrollAnim) cancelAnimationFrame(this._scrollAnim);
    const step = () => {
      const d = target - this.scrollY;
      if (Math.abs(d) < 0.5) { this.scrollY = target; this.draw(); this._scrollAnim = null; return; }
      this.scrollY += d * 0.18;
      this.draw();
      this._scrollAnim = requestAnimationFrame(step);
    };
    step();
  },
  NOTE_COLORS: PR.NOTE_COLORS,
  _selEntries: new Set(),   // selected arrangement entry objects
  _avMarquee: null,         // { startX, startY, currentX, currentY }
  _hoverHit: null,          // hit object under cursor for hover highlights
  _avTool: 'move',          // 'move' | 'cut'

  getCanvas() { return document.getElementById('arrangement-canvas'); },

  barWidth() { return this.BEAT_WIDTH * ProjectState.timeSignature[0]; },

  resize() {
    const canvas = this.getCanvas();
    const panel = document.getElementById('arrangement-panel');
    canvas.width = panel.clientWidth;
    canvas.height = panel.clientHeight;
  },

  draw() {
    const canvas = this.getCanvas();
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const { width: W, height: H } = canvas;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#46425e';
    ctx.fillRect(0, 0, W, H);

    this._drawTracks(ctx, W, H);
    this._drawRuler(ctx, W);
    if (this._avMarquee) {
      const { startX, startY, currentX, currentY } = this._avMarquee;
      const rx = Math.min(startX, currentX), ry = Math.min(startY, currentY);
      const rw = Math.abs(currentX - startX), rh = Math.abs(currentY - startY);
      ctx.fillStyle = 'rgba(0,185,190,0.12)';
      ctx.fillRect(rx, ry, rw, rh);
      ctx.strokeStyle = '#00b9be';
      ctx.lineWidth = 1;
      ctx.strokeRect(rx, ry, rw, rh);
    }
    // Track drag-reorder insert marker
    if (this._trackDrag && this._trackDrag.dragging) {
      const { insertIdx } = this._trackDrag;
      const { RULER_HEIGHT, TRACK_HEIGHT, scrollY } = this;
      const lineY = RULER_HEIGHT + insertIdx * TRACK_HEIGHT - scrollY;
      ctx.save();
      ctx.strokeStyle = '#00ccaa';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, lineY);
      ctx.lineTo(W, lineY);
      ctx.stroke();
      ctx.restore();
    }
  },

  _drawRuler(ctx, W) {
    const { HEADER_WIDTH, RULER_HEIGHT, LOOP_BAR_H, scrollX } = this;
    const timelineY = LOOP_BAR_H;
    const timelineH = RULER_HEIGHT - LOOP_BAR_H;

    // Top bar background (loop region strip)
    ctx.fillStyle = '#2a2845';
    ctx.fillRect(0, 0, W, LOOP_BAR_H);
    // Bottom bar background (timeline)
    ctx.fillStyle = '#46425e';
    ctx.fillRect(0, timelineY, W, timelineH);
    // Divider between the two bars
    ctx.strokeStyle = '#15788c';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, timelineY); ctx.lineTo(W, timelineY); ctx.stroke();
    // Bottom border of ruler
    ctx.beginPath(); ctx.moveTo(0, RULER_HEIGHT); ctx.lineTo(W, RULER_HEIGHT); ctx.stroke();

    // Clip timeline content to right of header
    ctx.save();
    ctx.beginPath();
    ctx.rect(HEADER_WIDTH, 0, W - HEADER_WIDTH, RULER_HEIGHT);
    ctx.clip();

    const barW = this.barWidth();
    const songLen = getSongLengthBars() + 4;

    // Bar tick marks and numbers in the timeline bar only
    for (let b = 0; b <= songLen; b++) {
      const x = HEADER_WIDTH + b * barW - scrollX;
      if (x < HEADER_WIDTH || x > W) continue;
      ctx.strokeStyle = '#15788c';
      ctx.beginPath(); ctx.moveTo(x, timelineY); ctx.lineTo(x, RULER_HEIGHT); ctx.stroke();
      ctx.fillStyle = '#ffb0a3';
      ctx.font = '6px "Press Start 2P"';
      ctx.fillText(b + 1, x + 2, timelineY + 13);
    }

    // Loop region — always drawn, grayed when disengaged
    const lx1 = HEADER_WIDTH + ProjectState.loopStart * barW - scrollX;
    const lx2 = HEADER_WIDTH + ProjectState.loopEnd * barW - scrollX;
    if (ProjectState.loopEnabled) {
      ctx.fillStyle = 'rgba(0,185,190,0.45)';
      ctx.fillRect(lx1, 0, lx2 - lx1, LOOP_BAR_H);
      ctx.strokeStyle = '#00ccaa';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(lx1, 0); ctx.lineTo(lx1, LOOP_BAR_H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(lx2, 0); ctx.lineTo(lx2, LOOP_BAR_H); ctx.stroke();
      // Subtle tint in timeline bar too
      ctx.fillStyle = 'rgba(0,185,190,0.08)';
      ctx.fillRect(lx1, timelineY, lx2 - lx1, timelineH);
    } else {
      // Disengaged: muted gray indicator so region is still visible
      ctx.fillStyle = 'rgba(100,100,140,0.35)';
      ctx.fillRect(lx1, 0, lx2 - lx1, LOOP_BAR_H);
      ctx.strokeStyle = '#555577';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(lx1, 0); ctx.lineTo(lx1, LOOP_BAR_H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(lx2, 0); ctx.lineTo(lx2, LOOP_BAR_H); ctx.stroke();
    }

    // Playhead — in timeline bar only
    const px = HEADER_WIDTH + ProjectState.playheadBar * barW - scrollX;
    ctx.strokeStyle = '#ffeecc';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px, timelineY); ctx.lineTo(px, RULER_HEIGHT); ctx.stroke();
    // Small triangle head at the top of the timeline bar
    ctx.fillStyle = '#ffeecc';
    ctx.beginPath();
    ctx.moveTo(px - 4, timelineY);
    ctx.lineTo(px + 4, timelineY);
    ctx.lineTo(px, timelineY + 5);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // Header cover — solid fill matching track headers, with right border
    ctx.fillStyle = '#46425e';
    ctx.fillRect(0, 0, HEADER_WIDTH, RULER_HEIGHT);
    ctx.strokeStyle = '#15788c';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(HEADER_WIDTH, 0); ctx.lineTo(HEADER_WIDTH, RULER_HEIGHT); ctx.stroke();

    // Buttons always on top
    const hz = this._hoverHit?.zone;
    // Add track (+)
    ctx.fillStyle = hz === 'add-track' ? '#00b9be' : '#15788c';
    ctx.fillRect(4, 4, 26, 28);
    ctx.fillStyle = '#ffeecc';
    ctx.fillRect(10, 16, 14, 4);   // horizontal bar
    ctx.fillRect(15, 11, 4, 14);   // vertical bar

    // Clear all (trash can)
    const clearColor = hz === 'clear-all' ? '#00b9be' : '#15788c';
    ctx.fillStyle = clearColor;
    ctx.fillRect(34, 4, 26, 28);
    ctx.fillStyle = '#ffeecc';
    ctx.fillRect(43, 7, 6, 2);     // handle top
    ctx.fillRect(41, 9, 10, 2);    // handle arch
    ctx.fillRect(39, 11, 16, 2);   // lid
    ctx.fillRect(40, 13, 14, 13);  // body
    ctx.fillStyle = clearColor;    // slot cutouts
    ctx.fillRect(43, 15, 2, 9);
    ctx.fillRect(47, 15, 2, 9);
    ctx.fillRect(51, 15, 2, 9);
  },

  _drawTracks(ctx, W, H) {
    const { HEADER_WIDTH, TRACK_HEIGHT, RULER_HEIGHT, scrollX, scrollY } = this;
    const barW = this.barWidth();

    ProjectState.tracks.forEach((track, i) => {
      const y = RULER_HEIGHT + i * TRACK_HEIGHT - scrollY;
      if (y + TRACK_HEIGHT < RULER_HEIGHT || y > H) return;

      // Header
      const _isDragTarget = this._trackDrag && this._trackDrag.track === track;
      const _isSelected   = track.id === ProjectState.selectedTrackId;
      ctx.fillStyle = _isDragTarget ? '#5a5680' : (_isSelected ? '#4e4a6a' : '#46425e');
      ctx.fillRect(0, y, HEADER_WIDTH, TRACK_HEIGHT);
      ctx.strokeStyle = (_isDragTarget || _isSelected) ? '#00ccaa' : '#15788c';
      ctx.lineWidth = 2;
      ctx.strokeRect(0, y, HEADER_WIDTH, TRACK_HEIGHT);
      ctx.lineWidth = 1;

      // Track name
      ctx.fillStyle = track.muted ? '#ffb0a3' : '#ffeecc';
      ctx.font = '8px "Press Start 2P"';
      ctx.fillText(track.name.slice(0, 10), 8, y + 20);

      // M / S buttons
      const _hh = this._hoverHit;
      const _ht = _hh?.track === track;
      ctx.fillStyle = track.muted ? '#ff6973' : (_ht && _hh.zone === 'mute' ? '#00b9be' : '#15788c');
      ctx.fillRect(8, y + 38, 20, 14);
      ctx.fillStyle = '#ffeecc';
      ctx.font = '5px "Press Start 2P"';
      ctx.fillText('M', 14, y + 49);

      ctx.fillStyle = track.soloed ? '#ff6973' : (_ht && _hh.zone === 'solo' ? '#00b9be' : '#15788c');
      ctx.fillRect(34, y + 38, 20, 14);
      ctx.fillStyle = '#ffeecc';
      ctx.fillText('S', 40, y + 49);

      // Mixer icon button (right of S, left of VOL)
      ctx.fillStyle = _ht && _hh.zone === 'settings' ? '#00b9be' : '#15788c';
      ctx.fillRect(58, y + 38, 14, 14);
      ctx.fillStyle = '#ffeecc';
      // Three vertical slider tracks
      ctx.fillRect(61, y + 40, 1, 10);
      ctx.fillRect(64, y + 40, 1, 10);
      ctx.fillRect(67, y + 40, 1, 10);
      // Handles staggered at different heights
      ctx.fillRect(60, y + 42, 3, 2);
      ctx.fillRect(63, y + 47, 3, 2);
      ctx.fillRect(66, y + 44, 3, 2);

      if (track.channelType === 'dpcm' || track.channelType === 'sampler') {
        const isArmed = ProjectState.armedTrackId === track.id;
        ctx.fillStyle = isArmed ? '#ff6973' : '#15788c';
        ctx.fillRect(60, y + 56, 36, 14);
        ctx.fillStyle = '#ffeecc';
        ctx.font = '5px "Press Start 2P"';
        ctx.fillText('REC', 66, y + 67);
      }

      // Volume bar slider
      ctx.fillStyle = '#ffb0a3';
      ctx.font = '5px "Press Start 2P"';
      ctx.fillText('VOL', 76, y + 35);
      ctx.fillStyle = '#2a2845';
      ctx.fillRect(76, y + 40, 76, 12);
      ctx.fillStyle = '#00b9be';
      ctx.fillRect(76, y + 40, track.volume * 0.76, 12);

      // Pan knob
      drawPanKnob(ctx, 184, y + 42, 12, track.pan, '#00b9be');

      // Timeline area
      const isSelected = track.id === ProjectState.selectedTrackId;
      ctx.fillStyle = isSelected ? '#4e4a6a' : '#46425e';
      ctx.fillRect(HEADER_WIDTH, y, W - HEADER_WIDTH, TRACK_HEIGHT);
      ctx.strokeStyle = isSelected ? '#00b9be' : '#15788c';
      ctx.lineWidth = 1;
      ctx.strokeRect(HEADER_WIDTH, y, W - HEADER_WIDTH, TRACK_HEIGHT);

      // Playhead line
      const px = HEADER_WIDTH + ProjectState.playheadBar * barW - scrollX;
      ctx.strokeStyle = 'rgba(255,105,115,0.3)';
      ctx.beginPath(); ctx.moveTo(px, y); ctx.lineTo(px, y + TRACK_HEIGHT); ctx.stroke();

      // Pattern blocks — clipped to timeline area so blocks slide under the header
      ctx.save();
      ctx.beginPath();
      ctx.rect(HEADER_WIDTH, y, W - HEADER_WIDTH, TRACK_HEIGHT);
      ctx.clip();

      const color = this.NOTE_COLORS[track.channelType] || '#ff6973';
      const isPitched = ['pulse50','pulse25','triangle','chord'].includes(track.channelType) && !isDrumChannel(track.channelType);
      for (const entry of track.arrangement) {
        const pat = track.patterns.find(p => p.id === entry.patternId);
        if (!pat) continue;
        const totalBars = entry.loopBars && entry.loopBars > pat.lengthBars ? entry.loopBars : pat.lengthBars;
        const bx = HEADER_WIDTH + entry.startBar * barW - scrollX;
        const contentW = pat.lengthBars * barW - 2;
        const bw = totalBars * barW - 2;
        if (bx + bw < HEADER_WIDTH || bx > W) continue;
        const blockY = y + 2;
        const blockH = TRACK_HEIGHT - 4;

        // Content block
        const isSelected = AV._selEntries.has(entry);
        ctx.fillStyle = _isDragTarget ? color + 'aa' : isSelected ? color + '99' : color + '55';
        ctx.fillRect(bx, blockY, contentW, blockH);
        ctx.strokeStyle = _isDragTarget ? '#00ccaa' : isSelected ? '#ffeecc' : color;
        ctx.lineWidth = (_isDragTarget || isSelected) ? 2 : 1;
        ctx.strokeRect(bx, blockY, contentW, blockH);
        ctx.lineWidth = 1;

        // Loop region (beyond content)
        if (entry.loopBars && entry.loopBars > pat.lengthBars) {
          ctx.fillStyle = color + '28';
          ctx.fillRect(bx + contentW, blockY, bw - contentW, blockH);
          ctx.strokeStyle = color + '88';
          ctx.strokeRect(bx + contentW, blockY, bw - contentW, blockH);
          ctx.save();
          ctx.strokeStyle = color + '66';
          ctx.setLineDash([3, 3]);
          for (let lb = pat.lengthBars; lb < totalBars; lb += pat.lengthBars) {
            const lx = bx + lb * barW;
            ctx.beginPath(); ctx.moveTo(lx, blockY); ctx.lineTo(lx, blockY + blockH); ctx.stroke();
          }
          ctx.setLineDash([]);
          ctx.restore();
        }

        // Loop-shorten strip: top half of the LOOPED EXTENSION area only.
        // Click here to instantly clip the loop end to that bar position.
        if (entry.loopBars && entry.loopBars > pat.lengthBars) {
          const extW = bw - contentW;
          ctx.fillStyle = color + '55';
          ctx.fillRect(bx + contentW, blockY, extW, blockH / 2);
        }

        ctx.fillStyle = color;
        ctx.font = '5px "Press Start 2P"';
        ctx.fillText(pat.name, bx + 3, blockY + 11);

        // Loop handle: TOP-right corner of content (6×8 px) — drag up here to extend loop
        ctx.fillStyle = color;
        ctx.fillRect(bx + contentW - 6, blockY, 6, 8);
        // Resize handle: bottom-right corner of content (6×8 px, dimmer)
        ctx.fillStyle = color + 'aa';
        ctx.fillRect(bx + contentW - 6, blockY + blockH - 8, 6, 8);

        // Note preview dots in content area
        ctx.save();
        ctx.beginPath(); ctx.rect(bx, blockY, contentW, blockH); ctx.clip();
        ctx.globalAlpha = 0.8; ctx.fillStyle = color;
        for (const note of pat.notes) {
          const nx = bx + (note.start / pat.lengthBars) * contentW;
          if (isPitched) {
            ctx.fillRect(nx, blockY + blockH - 4 - ((note.pitch / 127) * (blockH - 8)), 2, 2);
          } else {
            ctx.fillRect(nx, blockY + blockH / 2 - 1, 2, 2);
          }
        }
        ctx.globalAlpha = 1; ctx.restore();

        // Note preview dots in loop region
        if (entry.loopBars && entry.loopBars > pat.lengthBars) {
          ctx.save();
          ctx.beginPath(); ctx.rect(bx + contentW, blockY, bw - contentW, blockH); ctx.clip();
          ctx.globalAlpha = 0.4; ctx.fillStyle = color;
          for (let loopOff = pat.lengthBars; loopOff < totalBars; loopOff += pat.lengthBars) {
            for (const note of pat.notes) {
              const nx = bx + loopOff * barW + (note.start / pat.lengthBars) * contentW;
              if (isPitched) {
                ctx.fillRect(nx, blockY + blockH - 4 - ((note.pitch / 127) * (blockH - 8)), 2, 2);
              } else {
                ctx.fillRect(nx, blockY + blockH / 2 - 1, 2, 2);
              }
            }
          }
          ctx.globalAlpha = 1; ctx.restore();
        }
      }
      ctx.restore(); // end pattern blocks clip

      // Task 24: DPCM waveform canvas overlay
      if (track.channelType === 'dpcm' || track.channelType === 'sampler') {
        const wc = document.getElementById('waveform-' + track.id);
        if (wc) {
          const panelRect = document.getElementById('arrangement-panel').getBoundingClientRect();
          const wcY = panelRect.top + y + 4;
          wc.style.display = (wcY < panelRect.top + RULER_HEIGHT || wcY > panelRect.bottom) ? 'none' : 'block';
          wc.style.position = 'absolute';
          wc.style.left = (panelRect.left + 64) + 'px';
          wc.style.top  = wcY + 'px';
          wc.style.pointerEvents = 'none';
          DPCMSampler.drawWaveform(track);
        }
      }

      // Mute overlay — gray out track when muted or when another track is soloed
      const soloActive = ProjectState.tracks.some(t => t.soloed);
      const effectivelyMuted = track.muted || (soloActive && !track.soloed);
      if (effectivelyMuted) {
        ctx.fillStyle = 'rgba(20, 18, 40, 0.55)';
        ctx.fillRect(0, y, W, TRACK_HEIGHT);
      }
    });
  }
};

AV.initEvents = function() {
  const canvas = this.getCanvas();
  let dragState = null;
  let loopDragState = null;
  let playheadDrag = false;
  // Track the zone of the most recent detail=1 mousedown so dblclick can verify
  // both clicks landed in the same logical zone before acting.
  let _lastMdZone = null;

  const getHit = (mx, my) => {
    const { HEADER_WIDTH, TRACK_HEIGHT, RULER_HEIGHT, LOOP_BAR_H, scrollX, scrollY } = this;
    const barW = this.barWidth();
    if (my < RULER_HEIGHT) {
      if (mx >= 4 && mx <= 30) return { zone: 'add-track' };
      if (mx >= 34 && mx <= 60) return { zone: 'clear-all' };
      if (my < LOOP_BAR_H) return { zone: 'loop-bar' };
      return { zone: 'timeline-bar' };
    }
    const trackIdx = Math.floor((my - RULER_HEIGHT + scrollY) / TRACK_HEIGHT);
    if (trackIdx < 0 || trackIdx >= ProjectState.tracks.length) return null;
    const track = ProjectState.tracks[trackIdx];
    const ty = RULER_HEIGHT + trackIdx * TRACK_HEIGHT - scrollY;
    if (mx < HEADER_WIDTH) {
      if (mx >= 8 && mx <= 28 && my >= ty+38 && my <= ty+52) return { zone:'mute', track };
      if (mx >= 34 && mx <= 54 && my >= ty+38 && my <= ty+52) return { zone:'solo', track };
      if (mx >= 58 && mx <= 72 && my >= ty+38 && my <= ty+52) return { zone:'settings', track };
      return { zone: 'header', track, trackIdx };
    }
    const bar = Math.floor((mx - HEADER_WIDTH + scrollX) / barW);
    for (const entry of track.arrangement) {
      const pat = track.patterns.find(p => p.id === entry.patternId);
      if (!pat) continue;
      const totalBars = entry.loopBars && entry.loopBars > pat.lengthBars ? entry.loopBars : pat.lengthBars;
      const bx = HEADER_WIDTH + entry.startBar * barW - scrollX;
      const contentRight = bx + pat.lengthBars * barW - 2;
      const bw = totalBars * barW - 2;
      if (mx >= bx && mx <= bx + bw) {
        const blockTopY = ty + 2;
        const blockH = TRACK_HEIGHT - 4;
        // Loop-shorten: top HALF of the looped EXTENSION area (past content end)
        if (entry.loopBars && entry.loopBars > pat.lengthBars) {
          const extStartX = bx + (pat.lengthBars * barW - 2);
          const extEndX = bx + bw - 8; // exclude tail loop-extend handle
          if (mx >= extStartX && mx <= extEndX &&
              my >= blockTopY && my <= blockTopY + blockH / 2) {
            return { zone: 'loop-shorten', track, entry, pat };
          }
        }
        // Resize/loop handle: right 8px of content edge
        // Top third → loop-pattern (create/extend); bottom two-thirds → resize
        if (mx >= contentRight - 8 && mx <= contentRight + 4) {
          return my <= blockTopY + blockH / 3
            ? { zone: 'loop-pattern', track, entry, pat, bar }
            : { zone: 'resize-pattern', track, entry, pat, bar };
        }
        // Extend loop zone: right 8px of the looped block tail
        if (entry.loopBars && entry.loopBars > pat.lengthBars && mx >= bx + bw - 8) {
          return { zone: 'loop-pattern', track, entry, pat, bar };
        }
        return { zone: 'pattern', track, entry, pat, bar };
      }
    }
    return { zone:'empty', track, bar };
  };

  canvas.addEventListener('mousedown', (e) => {
    if (e.detail >= 2) return; // let dblclick handle double-clicks
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const hit = getHit(mx, my);
    if (!hit) { _lastMdZone = null; ProjectState.selectedTrackId = null; AV.draw(); return; }
    _lastMdZone = hit.zone;

    if (hit.zone === 'loop-bar') {
      const { HEADER_WIDTH, scrollX } = this;
      const barW = this.barWidth();
      const bar = (mx - HEADER_WIDTH + scrollX) / barW;
      const lx1 = HEADER_WIDTH + ProjectState.loopStart * barW - scrollX;
      const lx2 = HEADER_WIDTH + ProjectState.loopEnd * barW - scrollX;
      const inLoop = mx >= lx1 && mx <= lx2;
      // Any drag will draw a new loop region; click without drag on existing = toggle
      const snapped = Math.max(0, Math.floor(bar));
      loopDragState = { type: 'loop-bar-drag', anchorBar: snapped, anchorX: mx, hasMoved: false, wasInLoop: inLoop };
      AV.draw();
      return;
    }
    if (hit.zone === 'timeline-bar') {
      const { HEADER_WIDTH, scrollX } = this;
      const barW = this.barWidth();
      const bar = (mx - HEADER_WIDTH + scrollX) / barW;
      ProjectState.playheadBar = Math.max(0, bar);
      if (typeof Sequencer !== 'undefined') {
        Sequencer._playStartBar = ProjectState.playheadBar;
        if (Sequencer._playing) {
          const _ctx = getAudioCtx();
          Sequencer._playStartTime = _ctx.currentTime;
          Sequencer._scheduledUpToTime = _ctx.currentTime;
        }
      }
      playheadDrag = true;
      AV.draw();
      return;
    }
    if (hit.zone === 'add-track') {
      showAddTrackModal({ onConfirm: (type, name) => {
        if (type === 'sampler') { DPCMSampler.open(null, name); return; }
        History.push(); addTrack(type, name); AV.resize(); AV.draw();
      } });
      return;
    }
    if (hit.zone === 'clear-all') {
      let clearMode = 'tracks'; // 'tracks' | 'notes'
      const conf = document.createElement('div');
      conf.className = 'modal';
      conf.style.cssText = `position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
        background:var(--bg);border:2px solid var(--accent);z-index:501;padding:14px 16px 12px;min-width:300px;`;

      const confTitle = document.createElement('div');
      confTitle.className = 'modal-title';
      confTitle.style.cssText = 'font:9px "Press Start 2P";color:var(--accent);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--accent);letter-spacing:1px;';
      confTitle.textContent = 'CLEAR ALL?';

      // Toggle row
      const toggleRow = document.createElement('div');
      toggleRow.style.cssText = 'display:flex;gap:0;margin-bottom:10px;';
      const mkTogBtn = (label, mode) => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.textContent = label;
        b.style.cssText = `flex:1;font-size:8px;padding:5px 4px;`;
        b.dataset.mode = mode;
        b.onclick = () => {
          clearMode = mode;
          toggleRow.querySelectorAll('button').forEach(btn => {
            const active = btn.dataset.mode === clearMode;
            btn.style.background    = active ? 'var(--accent)' : '';
            btn.style.color         = active ? 'var(--bg-deep)' : '';
            btn.style.borderColor   = active ? 'var(--accent)' : '';
          });
          confMsg.textContent = clearMode === 'tracks'
            ? 'Delete all note containers across all tracks. Tracks remain.'
            : 'Erase all notes from every pattern. Tracks and patterns stay.';
          confirmBtn.textContent = clearMode === 'tracks' ? 'DELETE TRACKS' : 'CLEAR NOTES';
        };
        return b;
      };
      const btnTracks = mkTogBtn('DELETE TRACKS', 'tracks');
      const btnNotes  = mkTogBtn('CLEAR NOTES',   'notes');
      // Set initial active state
      btnTracks.style.background = 'var(--accent)';
      btnTracks.style.color      = 'var(--bg-deep)';
      btnTracks.style.borderColor = 'var(--accent)';
      toggleRow.appendChild(btnTracks);
      toggleRow.appendChild(btnNotes);

      const confMsg = document.createElement('div');
      confMsg.style.cssText = 'font:8px "Press Start 2P";color:var(--text);margin-bottom:14px;line-height:1.8;';
      confMsg.textContent = 'Delete all note containers across all tracks. Tracks remain.';

      const btnRow = document.createElement('div');
      btnRow.style.cssText = 'display:flex;gap:8px;';
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'btn'; cancelBtn.textContent = 'CANCEL'; cancelBtn.style.cssText = 'flex:1;';
      cancelBtn.onclick = () => conf.remove();
      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'btn btn--danger'; confirmBtn.textContent = 'DELETE TRACKS';
      confirmBtn.style.cssText = 'flex:1;color:var(--accent);border-color:var(--accent);';
      confirmBtn.onclick = () => {
        History.push();
        if (clearMode === 'tracks') {
          ProjectState.tracks = [];
          ProjectState.selectedTrackId = null;
          ProjectState.armedTrackId = null;
          if (PR.activePattern) {
            PR.activePattern = null;
            document.getElementById('pianoroll-panel').style.display = 'none';
            document.getElementById('panel-divider').style.display = 'none';
          }
        } else {
          for (const track of ProjectState.tracks) {
            for (const pat of track.patterns) { pat.notes = []; }
          }
          if (PR.activePattern) { PR.draw(); PR.drawVelocity(); }
        }
        conf.remove();
        requestAnimationFrame(() => { AV.resize(); AV.draw(); });
      };
      btnRow.appendChild(cancelBtn); btnRow.appendChild(confirmBtn);
      conf.appendChild(confTitle); conf.appendChild(toggleRow);
      conf.appendChild(confMsg);   conf.appendChild(btnRow);
      document.body.appendChild(conf);
      conf.addEventListener('mousedown', ev => ev.stopPropagation());
      setTimeout(() => document.addEventListener('mousedown', () => conf.remove(), { once: true }), 100);
      return;
    }
    if (hit.track) {
      const track = hit.track;
      const trackIdx = ProjectState.tracks.indexOf(track);
      if (track.channelType === 'dpcm' || track.channelType === 'sampler') {
        const { RULER_HEIGHT, TRACK_HEIGHT, scrollY } = this;
        const ty = RULER_HEIGHT + trackIdx * TRACK_HEIGHT - scrollY;
        if (mx >= 60 && mx <= 96 && my >= ty+56 && my <= ty+70) {
          DPCMSampler.open(track);
          return;
        }
      }
      // Volume bar slider drag (x 64-144, y+40 to y+52)
      if (hit.zone === 'header') {
        const { RULER_HEIGHT, TRACK_HEIGHT, scrollY } = this;
        const ty = RULER_HEIGHT + trackIdx * TRACK_HEIGHT - scrollY;
        if (mx >= 76 && mx <= 152 && my >= ty+40 && my <= ty+52) {
          // Direct x-position to volume mapping
          track.volume = Math.max(0, Math.min(100, Math.round((mx - 76) / 0.76)));
          AV.draw();
          const onMove = (ev) => {
            const rect = canvas.getBoundingClientRect();
            const cmx = ev.clientX - rect.left;
            track.volume = Math.max(0, Math.min(100, Math.round((cmx - 76) / 0.76)));
            AV.draw();
          };
          const onUp = () => { document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
          return;
        }
        // Pan knob drag
        if (mx >= 170 && mx <= 198 && my >= ty+29 && my <= ty+56) {
          const onMove = (ev) => {
            track.pan = Math.max(-1, Math.min(1, track.pan - ev.movementY * 0.02));
            AV.draw();
          };
          const onUp = () => { document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
          return;
        }
        // Default header click: select track + begin drag-or-settings gesture
        ProjectState.selectedTrackId = track.id;
        AV.draw();
        const _startX = e.clientX, _startY = e.clientY;
        this._trackDrag = { track, idx: trackIdx, startX: _startX, startY: _startY, insertIdx: trackIdx, dragging: false };
        AV.draw();
        const _onMove = (ev) => {
          const dx = ev.clientX - _startX, dy = ev.clientY - _startY;
          if (!this._trackDrag.dragging && Math.sqrt(dx*dx+dy*dy) > 6) {
            this._trackDrag.dragging = true;
          }
          if (this._trackDrag.dragging) {
            const rect2 = canvas.getBoundingClientRect();
            const my2 = ev.clientY - rect2.top;
            const { RULER_HEIGHT, TRACK_HEIGHT } = this;
            // Auto-scroll when dragging near top/bottom edge (use canvas.height, not offsetHeight)
            const canvasH = canvas.height;
            const edgeZone = 24, scrollSpeed = TRACK_HEIGHT * 0.35;
            const maxScrollY = Math.max(0, ProjectState.tracks.length * TRACK_HEIGHT - (canvasH - RULER_HEIGHT));
            if (my2 > canvasH - edgeZone) this.scrollY = Math.min(maxScrollY, this.scrollY + scrollSpeed);
            else if (my2 < RULER_HEIGHT + edgeZone) this.scrollY = Math.max(0, this.scrollY - scrollSpeed);
            const rawIdx = Math.round((my2 - RULER_HEIGHT + this.scrollY) / TRACK_HEIGHT);
            this._trackDrag.insertIdx = Math.max(0, Math.min(ProjectState.tracks.length, rawIdx));
            AV.draw();
          }
        };
        const _onUp = (ev) => {
          document.removeEventListener('mousemove', _onMove);
          document.removeEventListener('mouseup', _onUp);
          if (this._trackDrag.dragging) {
            // Perform reorder
            const from = this._trackDrag.idx;
            let to = this._trackDrag.insertIdx;
            if (to !== from && to !== from + 1) {
              History.push();
              const tracks = ProjectState.tracks;
              const [moved] = tracks.splice(from, 1);
              const dest = to > from ? to - 1 : to;
              tracks.splice(dest, 0, moved);
              AV.draw();
            }
          }
          this._trackDrag = null;
          AV.draw();
        };
        document.addEventListener('mousemove', _onMove);
        document.addEventListener('mouseup', _onUp);
        return;
      }
    }
    if (hit.zone === 'mute') { hit.track.muted = !hit.track.muted; AV.draw(); return; }
    if (hit.zone === 'solo') { hit.track.soloed = !hit.track.soloed; AV.draw(); return; }
    if (hit.zone === 'settings') { showTrackSettings(hit.track, e.clientX, e.clientY); return; }
    if (hit.zone === 'empty') {
      AV._selEntries.clear();
      ProjectState.selectedPatternId = null;
      ProjectState.selectedTrackId = hit.track.id;
      AV._avMarquee = { startX: mx, startY: my, currentX: mx, currentY: my };
      AV.draw();
      return;
    }
    if (hit.zone === 'resize-pattern') {
      AV._selEntries.clear();
      AV._selEntries.add(hit.entry);
      ProjectState.selectedTrackId = hit.track.id;
      ProjectState.selectedPatternId = hit.pat.id;
      dragState = {
        type: 'resize-pattern', entry: hit.entry, track: hit.track, pat: hit.pat,
        startX: mx, origLengthBars: hit.pat.lengthBars,
        snapshot: JSON.stringify(ProjectState)
      };
      return;
    }
    if (hit.zone === 'loop-shorten') {
      const { HEADER_WIDTH, scrollX } = this;
      const snapshot = JSON.stringify(ProjectState); // before any change
      const barW = this.barWidth();
      const cell = 1 / ProjectState.timeSignature[0];
      const rawBar = (mx - HEADER_WIDTH + scrollX) / barW;
      const snapped = Math.round(rawBar / cell) * cell;
      const origLoopBars = hit.entry.loopBars;
      // Instantly clip to clicked position, then allow drag to continue adjusting
      hit.entry.loopBars = Math.max(hit.pat.lengthBars + cell, snapped - hit.entry.startBar);
      dragState = {
        type: 'loop-shorten-drag',
        entry: hit.entry, track: hit.track, pat: hit.pat,
        origLoopBars, snapshot
      };
      AV.draw();
      return;
    }
    if (hit.zone === 'loop-pattern') {
      AV._selEntries.clear();
      AV._selEntries.add(hit.entry);
      ProjectState.selectedTrackId = hit.track.id;
      ProjectState.selectedPatternId = hit.pat.id;
      dragState = {
        type: 'loop-pattern', entry: hit.entry, track: hit.track, pat: hit.pat,
        startX: mx, origLoopBars: hit.entry.loopBars || hit.pat.lengthBars,
        snapshot: JSON.stringify(ProjectState)
      };
      return;
    }
    if (hit.zone === 'pattern') {
      // CUT mode: split the clicked container at the click point
      if (AV._avTool === 'cut') {
        const barW = AV.barWidth();
        const barX = (mx - AV.HEADER_WIDTH + AV.scrollX) / barW;
        const cutOffset = barX - hit.entry.startBar;
        const beatLen = 1 / ProjectState.timeSignature[0];
        const snapped = Math.round(cutOffset / beatLen) * beatLen;
        if (snapped <= 0 || snapped >= hit.pat.lengthBars) return;

        const snapshot = JSON.stringify(ProjectState);

        // Build two new patterns by splitting notes at snapped offset
        const notesA = [], notesB = [];
        for (const n of hit.pat.notes) {
          if (n.start < snapped) {
            notesA.push({ ...n, duration: Math.min(n.duration, snapped - n.start) });
          }
          if (n.start + n.duration > snapped) {
            const bStart = Math.max(n.start, snapped) - snapped;
            const bDur = (n.start + n.duration) - Math.max(n.start, snapped);
            notesB.push({ ...n, start: bStart, duration: bDur });
          }
        }

        const newIdA = 'p' + Date.now();
        const newIdB = 'p' + (Date.now() + 1);
        const patA = { id: newIdA, name: hit.pat.name + '-A', lengthBars: snapped, notes: notesA };
        const patB = { id: newIdB, name: hit.pat.name + '-B', lengthBars: hit.pat.lengthBars - snapped, notes: notesB };

        // Replace old pattern with patA+patB in track.patterns
        const pi = hit.track.patterns.indexOf(hit.pat);
        hit.track.patterns.splice(pi, 1, patA, patB);

        // Replace old entry with two entries in track.arrangement
        const ei = hit.track.arrangement.indexOf(hit.entry);
        const entryA = { patternId: newIdA, startBar: hit.entry.startBar };
        const entryB = { patternId: newIdB, startBar: hit.entry.startBar + snapped };
        if (hit.entry.loopBars) {
          entryA.loopBars = Math.min(hit.entry.loopBars, snapped);
          entryB.loopBars = Math.max(0, hit.entry.loopBars - snapped);
          if (entryB.loopBars <= 0) delete entryB.loopBars;
        }
        hit.track.arrangement.splice(ei, 1, entryA, entryB);

        AV._selEntries.clear();
        AV._selEntries.add(entryA);
        History._pushSnapshot(snapshot);
        AV.draw();
        return;
      }

      // MOVE mode (default): select + drag
      if (!AV._selEntries.has(hit.entry)) {
        AV._selEntries.clear();
        AV._selEntries.add(hit.entry);
      }
      ProjectState.selectedTrackId = hit.track.id;
      ProjectState.selectedPatternId = hit.pat.id;
      // Don't open piano roll yet — wait for mouseup so dragging isn't obstructed
      AV.draw();
      dragState = {
        type: 'move-pattern',
        entry: hit.entry, track: hit.track, pat: hit.pat,
        origTrack: hit.track,
        origTrackIdx: ProjectState.tracks.indexOf(hit.track),
        startX: mx, startY: my,
        origBar: hit.entry.startBar,
        isAlt: e.altKey,
        snapshot: JSON.stringify(ProjectState)
      };
    }
  });

  canvas.addEventListener('dblclick', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const hit = getHit(mx, my);
    if (!hit) return;
    if (hit.zone === 'timeline-bar') {
      // Double-click on timeline bar → place playhead + start playback
      const bar = (mx - AV.HEADER_WIDTH + AV.scrollX) / AV.barWidth();
      ProjectState.playheadBar = Math.max(0, bar);
      if (typeof Sequencer !== 'undefined') {
        Sequencer._playStartBar = ProjectState.playheadBar;
        Sequencer.play();
      }
      AV.draw();
      return;
    }
    if (hit.zone === 'header') {
      // Double-click in track name area → inline rename
      const trackIdx = ProjectState.tracks.indexOf(hit.track);
      const ty = AV.RULER_HEIGHT + trackIdx * AV.TRACK_HEIGHT - AV.scrollY;
      if (mx < 160 && my >= ty && my <= ty + 30) {
        const inputEl = document.createElement('input');
        inputEl.type = 'text';
        inputEl.value = hit.track.name;
        inputEl.className = 'field-input';
        inputEl.style.cssText = `
