            dragState.note.pitch = newPitch;
            dragState.note.start = newStart;

        const btn = document.getElementById('btn-loop');
        if (btn) btn.classList.remove('engaged');

        this.draw(); AV.draw();
        return;
      }
      if (dragState.type === 'pr-playhead' || dragState.type === 'pr-loop' ||
          dragState.type === 'pr-loop-left' || dragState.type === 'pr-loop-right' || dragState.type === 'pr-loop-move') {
        dragState = null; this._dragState = null;
        return;
      }
      if (dragState.type === 'move' && !dragState.hasMoved) {
        // Single click on note body → preview note (selection already set on mousedown)
        const ap = this.activePattern;
        if (ap) previewNote(ap.track, dragState.note.pitch, dragState.note.duration);
      } else if (dragState.type === 'move' && dragState.hasMoved) {
        History._pushSnapshot(dragState.snapshot);
      } else if (dragState.type === 'resize' && dragState.note.duration !== dragState.origDur) {
        History._pushSnapshot(dragState.snapshot);
      } else if (dragState.type === 'marquee') {
        const ap = this.activePattern;
        if (ap) {
          const { startX, startY, currentX, currentY } = dragState;
          const rectLeft   = Math.min(startX, currentX);
          const rectRight  = Math.max(startX, currentX);
          const rectTop    = Math.min(startY, currentY);
          const rectBottom = Math.max(startY, currentY);
          const barW = this.barWidth();
          const isNoise = isDrumChannel(ap.track.channelType);
          const rows = isNoise ? this.DRUM_ROWS : null;
          for (const note of ap.pattern.notes) {
            const rowIdx = isNoise ? rows.indexOf(note.pitch) : (127 - note.pitch);
            const noteX = this.KEY_WIDTH + note.start * barW - this.scrollX;
            const noteY = rowIdx * this.ROW_HEIGHT - this.scrollY;
            const noteW = note.duration * barW;
            if (noteX < rectRight && noteX + noteW > rectLeft &&
                noteY < rectBottom && noteY + this.ROW_HEIGHT > rectTop) {
              note.selected = true;
            }
          }
          const firstSelected = ap.pattern.notes.find(n => n.selected);
          if (firstSelected) this._stampDuration = firstSelected.duration;
        }
      }
      dragState = null;
      this._dragState = null;
      if (this.activePattern) { this.draw(); this.drawVelocity(); }
    };
    if (PR._onMouseUp) document.removeEventListener('mouseup', PR._onMouseUp);
    PR._onMouseUp = onCanvasMouseUp;
    document.addEventListener('mouseup', onCanvasMouseUp);

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (e.shiftKey || Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
        const ap = this.activePattern;
        const maxScrollX = ap
          ? Math.max(0, (ap.pattern.lengthBars + 1) * this.barWidth() - (canvas.width - this.KEY_WIDTH))
          : 0;
        PR.scrollX = Math.max(0, Math.min(maxScrollX, PR.scrollX + (e.deltaX || e.deltaY)));
      } else {
        PR.scrollY = Math.max(0, Math.min(128 * PR.ROW_HEIGHT - canvas.height, PR.scrollY + e.deltaY));
      }
      PR.draw();
    }, { passive: false });

    // ── Touch handling for piano roll ──────────────────────────────────────
    //
    // Double-tap strategy: record finger-lift in touchend (_lastTapEnd), detect
    // on next touchstart. By the time tap2's touchstart fires, tap1's synthetic
    // mouse events have ALREADY completed — no race condition possible.
    //
    // Note drag/resize: computed directly in touchmove — no synthetic events.
    // Scroll: touchmove detects axis and scrolls; preventDefault only there.
    // ────────────────────────────────────────────────────────────────────────
    let _prTouch = null;

    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length > 1) return;
      const t = e.changedTouches[0] || e.touches[0];
      if (!t) return;
      const now = Date.now();
      const rect = canvas.getBoundingClientRect();
      const mx = t.clientX - rect.left;
      const my = t.clientY - rect.top;
      const ap = this.activePattern;

      // ── Double-tap detection: check _lastTapEnd (set in touchend) ──
      // Viewport-relative distance for iOS Desktop Mode compatibility.
      const dblDist = Math.max(60, window.innerWidth * 0.15);
      if (_lastTapEnd && now - _lastTapEnd.time < 700 &&
          Math.abs(t.clientX - _lastTapEnd.x) < dblDist &&
          Math.abs(t.clientY - _lastTapEnd.y) < dblDist) {
        e.preventDefault();
        _lastTapEnd = null;
        _prTouch = null;
        dragState = null; this._dragState = null;
        _onDblClick(mx, my, t.clientX, t.clientY);
        return;
      }

      if (!ap || my < this.RULER_HEIGHT || mx < this.KEY_WIDTH) {
        _prTouch = { x: t.clientX, y: t.clientY, scrolling: false, horiz: false };
        return;
      }

      // ── Note hit? ──
      const hit = hitTestNote(mx, my, _touchExpand);
      if (hit) {
        e.preventDefault(); // prevent mousedown overwriting dragState
        _prTouch = { mode: 'note', startMx: mx, startMy: my };
        const { note, x, w } = hit;
        const snapshot = JSON.stringify(ProjectState);
        const resizeZone = _touchExpand ? Math.max(6, _touchExpand * 2) : 6;
        if (mx > x + w - resizeZone) {
          const selMap = new Map();
          for (const n of ap.pattern.notes) if (n.selected) selMap.set(n, n.duration);
          selMap.set(note, note.duration);
          dragState = { type: 'resize', note, startX: mx, origDur: note.duration, selMap, snapshot };
        } else {
          const wasSelected = !!note.selected;
          if (!wasSelected) ap.pattern.notes.forEach(n => { n.selected = false; });
          note.selected = true;
          this._stampDuration = note.duration;
          dragState = {
            type: 'move', note,
            startX: mx, startY: my,
            origPitch: note.pitch, origStart: note.start,
            lastPitch: note.pitch, lastStart: note.start,
            hasMoved: false, movingSelection: wasSelected,
            snapshot
          };
          this.draw();
        }
        return;
      }

      // ── Empty grid area: track for scroll ──
      _prTouch = { x: t.clientX, y: t.clientY, scrolling: false, horiz: false };
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      if (!_prTouch) return;
      if (e.touches.length > 1) return;
      const t = e.touches[0];

      // ── Note drag / resize: compute directly (no synthetic events) ──
      if (_prTouch.mode === 'note') {
        if (!dragState) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mx = t.clientX - rect.left;
        const my = t.clientY - rect.top;
        const ap = this.activePattern;
        if (!ap) return;
        if (dragState.type === 'resize') {
          const snap32 = 1 / 32;
          const deltaBars = (mx - dragState.startX) / this.barWidth();
          const snapDur = (orig) => Math.max(snap32, Math.round((orig + deltaBars) / snap32) * snap32);
          for (const [n, origDur] of dragState.selMap) n.duration = snapDur(origDur);
          this.draw();
        } else if (dragState.type === 'move') {
          const dx = mx - dragState.startX, dy = my - dragState.startY;
          if (!dragState.hasMoved && Math.sqrt(dx*dx + dy*dy) < 4) return;
          dragState.hasMoved = true;
          const pos = posToNote(mx, my);
          if (!pos) return;
          const newStart = Math.max(0, pos.snappedStart);
          const isNoise = isDrumChannel(ap.track.channelType);
          const newPitch = isNoise
            ? (this.DRUM_ROWS.includes(pos.pitch) ? pos.pitch : dragState.lastPitch)
            : Math.max(0, Math.min(127, pos.pitch));
          if (newPitch !== dragState.lastPitch || newStart !== dragState.lastStart) {
            const pitchChanged = newPitch !== dragState.lastPitch;
            const dStart = newStart - dragState.lastStart, dPitch = newPitch - dragState.lastPitch;
            dragState.lastPitch = newPitch; dragState.lastStart = newStart;
            if (dragState.movingSelection) {
              ap.pattern.notes.forEach(n => {
                if (n.selected) {
                  n.start = Math.max(0, n.start + dStart);
                  if (!isNoise) n.pitch = Math.max(0, Math.min(127, n.pitch + dPitch));
                }
              });
            } else {
              dragState.note.pitch = newPitch;
              dragState.note.start = newStart;
            }
            if (pitchChanged) previewNote(ap.track, newPitch, 0.125); // short stab per cell
            this.draw(); this.drawVelocity();
          }
        }
        return;
      }

      // ── Scroll ──
      if (!_prTouch.x) return;
      const dx = t.clientX - _prTouch.x;
      const dy = t.clientY - _prTouch.y;
      if (!_prTouch.scrolling) {
        if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
        e.preventDefault();
        _prTouch.scrolling = true;
        _prTouch.horiz = Math.abs(dx) > Math.abs(dy);
        dragState = null; this._dragState = null; // cancel any pending mouse drag
      } else {
        e.preventDefault();
      }
      if (_prTouch.horiz) {
        const ap2 = this.activePattern;
        const maxSX = ap2 ? Math.max(0, (ap2.pattern.lengthBars + 1) * this.barWidth() - (canvas.width - this.KEY_WIDTH)) : 0;
        PR.scrollX = Math.max(0, Math.min(maxSX, PR.scrollX - dx));
      } else {
        PR.scrollY = Math.max(0, Math.min(128 * PR.ROW_HEIGHT - canvas.height, PR.scrollY - dy));
      }
      _prTouch.x = t.clientX; _prTouch.y = t.clientY;
      PR.draw();
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      const t = e.changedTouches[0];
      // Determine if this touch was a true tap (no scroll, no drag, no resize)
      const wasScrolling = _prTouch?.scrolling;
      const wasDragged = !!(dragState?.hasMoved);
      const wasResized = !!(dragState?.type === 'resize' && dragState.note.duration !== dragState.origDur);

      if (_prTouch?.mode === 'note') {
        // Single tap on note: play preview; drag was handled live in touchmove
        if (dragState && !dragState.hasMoved && dragState.type === 'move') {
          const ap = this.activePattern;
          if (ap) previewNote(ap.track, dragState.note.pitch, dragState.note.duration);
        }
        if (wasDragged) {
          History._pushSnapshot(dragState.snapshot);
        } else if (wasResized) {
          History._pushSnapshot(dragState.snapshot);
        }
        dragState = null; this._dragState = null;
        if (this.activePattern) { this.draw(); this.drawVelocity(); }
      }

      // Record tap position for double-tap detection on next touchstart.
      // Only record if this was a genuine tap (not a scroll, drag, or resize).
      if (!wasScrolling && !wasDragged && !wasResized && t) {
        _lastTapEnd = { time: Date.now(), x: t.clientX, y: t.clientY };
      } else {
        _lastTapEnd = null;
      }

      _prTouch = null;
    }, { passive: true });

    // Velocity canvas interaction
    const velCanvas = this.getVelCanvas();
    velCanvas.addEventListener('mousedown', (e) => {
      const ap = this.activePattern;
      if (!ap) return;
      const rect = velCanvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const barW = this.barWidth();
      // Find closest note by x position
      let closest = null, minDist = 20;
      const seen = new Set();
      for (const note of ap.pattern.notes) {
        const key = note.chordId || (note.pitch + '_' + note.start);
        if (seen.has(key)) continue;
        seen.add(key);
        const x = this.KEY_WIDTH + note.start * barW - this.scrollX;
        if (Math.abs(x - mx) < minDist) { minDist = Math.abs(x - mx); closest = note; }
      }
      if (!closest) return;
      dragState = { type: 'velocity', note: closest, startY: my, origVel: closest.velocity };
      const onMove = (ev) => {
        const dy = dragState.startY - (ev.clientY - rect.top);
        const newVel = Math.max(1, Math.min(127, Math.round(dragState.origVel + dy * 1.5)));
        // Apply to chord group if applicable
        if (dragState.note.chordId) {
          ap.pattern.notes.filter(n => n.chordId === dragState.note.chordId)
            .forEach(n => n.velocity = newVel);
        } else {
          dragState.note.velocity = newVel;
        }
        this.draw(); this.drawVelocity();
      };
      const onUp = () => {
        dragState = null;
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    canvas.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const ap = this.activePattern;
      if (!ap) return;
      const hasSelection = ap.pattern.notes.some(n => n.selected);
      const items = [];
      if (hasSelection) items.push({ label: 'Copy  (⌘C)', action: _copySelected });
      if (_clipboard)   items.push({ label: 'Paste  (⌘V)', action: _paste });
      items.push({ label: 'Select All  (⌘A)', action: () => {
        ap.pattern.notes.forEach(n => { n.selected = true; }); PR.draw();
      }});
      if (hasSelection) items.push({ label: 'Delete', action: () => {
        History.push();
        ap.pattern.notes = ap.pattern.notes.filter(n => !n.selected);
        PR.draw(); PR.drawVelocity();
      }});
      showContextMenu(e.clientX, e.clientY, items);
    });
  };

// ============================================================
// UTILITY: drawKnob
// ============================================================
function drawKnob(ctx, cx, cy, r, value, color) {
  // value: 0.0 to 1.0
  const startAngle = Math.PI * 0.75;
  const endAngle = Math.PI * 2.25;
  const angle = startAngle + value * (endAngle - startAngle);

  // Background arc
  ctx.strokeStyle = '#46425e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, endAngle);
  ctx.stroke();

  // Value arc
  ctx.strokeStyle = color;
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, angle);
  ctx.stroke();

  // Indicator dot (pixelated: use rect)
  const ix = cx + (r - 2) * Math.cos(angle);
  const iy = cy + (r - 2) * Math.sin(angle);
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(ix) - 1, Math.round(iy) - 1, 2, 2);

  ctx.lineWidth = 1;
}

function drawPanKnob(ctx, cx, cy, r, pan, color) {
  // pan: -1.0 (full left) to 1.0 (full right), 0 = center/12 o'clock
  const startAngle = Math.PI * 0.75;   // 7 o'clock (min)
  const endAngle   = Math.PI * 2.25;   // 5 o'clock (max)
  const centerAngle = Math.PI * 1.5;   // 12 o'clock

  // Map pan -1..1 → angle
  const totalRange = endAngle - startAngle;
  const angle = centerAngle + pan * (totalRange / 2);

  // Background arc (full sweep)
  ctx.strokeStyle = '#2a2845';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, endAngle);
  ctx.stroke();

  // Fill arc from center to current position
  if (pan !== 0) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    if (pan > 0) {
      ctx.arc(cx, cy, r, centerAngle, angle);
    } else {
      ctx.arc(cx, cy, r, angle, centerAngle);
    }
    ctx.stroke();
  }

  // Knob body fill — solid circle inside the arc ring
  ctx.fillStyle = '#3a3660';
  ctx.beginPath();
  ctx.arc(cx, cy, r - 2, 0, Math.PI * 2);
  ctx.fill();

  // Tick mark — line from center of knob outward
  const tickInner = r * 0.15;
  const tickOuter = r * 0.82;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx + tickInner * Math.cos(angle), cy + tickInner * Math.sin(angle));
  ctx.lineTo(cx + tickOuter * Math.cos(angle), cy + tickOuter * Math.sin(angle));
  ctx.stroke();

  ctx.lineWidth = 1;
}

// ============================================================
// MODULE: ArrangementView
// ============================================================
const AV = {
  HEADER_WIDTH: 240,
  TRACK_HEIGHT: 96,
  BEAT_WIDTH: 40,
  RULER_HEIGHT: 36,
  scrollX: 0,
  scrollY: 0,
  NOTE_COLORS: PR.NOTE_COLORS,
  _selEntries: new Set(),   // selected arrangement entry objects
  _avMarquee: null,         // { startX, startY, currentX, currentY }

  getCanvas() { return document.getElementById('arrangement-canvas'); },

  barWidth() { return this.BEAT_WIDTH * ProjectState.timeSignature[0]; },

  resize() {
    const canvas = this.getCanvas();
    const panel = document.getElementById('arrangement-panel');
    canvas.width = panel.clientWidth;
    canvas.height = panel.clientHeight;
  },

  draw() {
    const canvas = this.getCanvas();
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const { width: W, height: H } = canvas;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#46425e';
    ctx.fillRect(0, 0, W, H);

    this._drawRuler(ctx, W);
    this._drawTracks(ctx, W, H);
    if (this._avMarquee) {
      const { startX, startY, currentX, currentY } = this._avMarquee;
      const rx = Math.min(startX, currentX), ry = Math.min(startY, currentY);
      const rw = Math.abs(currentX - startX), rh = Math.abs(currentY - startY);
      ctx.fillStyle = 'rgba(0,185,190,0.12)';
      ctx.fillRect(rx, ry, rw, rh);
      ctx.strokeStyle = '#00b9be';
      ctx.lineWidth = 1;
      ctx.strokeRect(rx, ry, rw, rh);
    }
    // Track drag-reorder insert marker
    if (this._trackDrag && this._trackDrag.dragging) {
      const { insertIdx } = this._trackDrag;
      const { RULER_HEIGHT, TRACK_HEIGHT, scrollY } = this;
      const lineY = RULER_HEIGHT + insertIdx * TRACK_HEIGHT - scrollY;
      ctx.save();
      ctx.strokeStyle = '#00ccaa';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, lineY);
      ctx.lineTo(W, lineY);
      ctx.stroke();
      ctx.restore();
    }
  },

  _drawRuler(ctx, W) {
    const { HEADER_WIDTH, RULER_HEIGHT, scrollX } = this;
    ctx.fillStyle = '#46425e';
    ctx.fillRect(0, 0, W, RULER_HEIGHT);
    ctx.strokeStyle = '#15788c';
    ctx.beginPath(); ctx.moveTo(0, RULER_HEIGHT); ctx.lineTo(W, RULER_HEIGHT); ctx.stroke();

    const barW = this.barWidth();
    const songLen = getSongLengthBars() + 4;
    for (let b = 0; b <= songLen; b++) {
      const x = HEADER_WIDTH + b * barW - scrollX;
      if (x < HEADER_WIDTH || x > W) continue;
      ctx.strokeStyle = '#15788c';
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, RULER_HEIGHT); ctx.stroke();
      ctx.fillStyle = '#ffb0a3';
      ctx.font = '6px "Press Start 2P"';
      ctx.fillText(b + 1, x + 2, 13);
    }

    // Loop region (only when loop is enabled)
    if (ProjectState.loopEnabled) {
      const lx1 = HEADER_WIDTH + ProjectState.loopStart * barW - scrollX;
      const lx2 = HEADER_WIDTH + ProjectState.loopEnd * barW - scrollX;
      ctx.fillStyle = 'rgba(0,185,190,0.2)';
      ctx.fillRect(lx1, 0, lx2 - lx1, RULER_HEIGHT);
      ctx.strokeStyle = '#00b9be';
      ctx.beginPath(); ctx.moveTo(lx1,0); ctx.lineTo(lx1,RULER_HEIGHT); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(lx2,0); ctx.lineTo(lx2,RULER_HEIGHT); ctx.stroke();
    }

    // Playhead
    const px = HEADER_WIDTH + ProjectState.playheadBar * barW - scrollX;
    ctx.strokeStyle = '#ffeecc';
    ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, RULER_HEIGHT); ctx.stroke();
  },

  _drawTracks(ctx, W, H) {
    const { HEADER_WIDTH, TRACK_HEIGHT, RULER_HEIGHT, scrollX, scrollY } = this;
    const barW = this.barWidth();

    ProjectState.tracks.forEach((track, i) => {
      const y = RULER_HEIGHT + i * TRACK_HEIGHT - scrollY;
      if (y + TRACK_HEIGHT < RULER_HEIGHT || y > H) return;

      // Header
      const _isDragTarget = this._trackDrag && this._trackDrag.track === track;
      ctx.fillStyle = _isDragTarget ? '#5a5680' : '#46425e';
      ctx.fillRect(0, y, HEADER_WIDTH, TRACK_HEIGHT);
      ctx.strokeStyle = _isDragTarget ? '#00ccaa' : '#15788c';
      ctx.lineWidth = _isDragTarget ? 2 : 2;
      ctx.strokeRect(0, y, HEADER_WIDTH, TRACK_HEIGHT);
      ctx.lineWidth = 1;

      // Track name
      ctx.fillStyle = track.muted ? '#ffb0a3' : '#ffeecc';
      ctx.font = '8px "Press Start 2P"';
      ctx.fillText(track.name.slice(0, 10), 8, y + 20);

      // M / S buttons
      ctx.fillStyle = track.muted ? '#ff6973' : '#15788c';
      ctx.fillRect(8, y + 38, 20, 14);
      ctx.fillStyle = '#ffeecc';
      ctx.font = '5px "Press Start 2P"';
      ctx.fillText('M', 14, y + 49);

      ctx.fillStyle = track.soloed ? '#ff6973' : '#15788c';
      ctx.fillRect(34, y + 38, 20, 14);
      ctx.fillStyle = '#ffeecc';
      ctx.fillText('S', 40, y + 49);

      if (track.channelType === 'dpcm') {
        const isArmed = ProjectState.armedTrackId === track.id;
        ctx.fillStyle = isArmed ? '#ff6973' : '#15788c';
        ctx.fillRect(60, y + 56, 36, 14);
        ctx.fillStyle = '#ffeecc';
        ctx.font = '5px "Press Start 2P"';
        ctx.fillText('REC', 66, y + 67);
      }

      // Volume bar slider — bottom aligned to y+52 (matches M/S buttons)
      ctx.fillStyle = '#ffb0a3';
      ctx.font = '5px "Press Start 2P"';
      ctx.fillText('VOL', 64, y + 35);
      ctx.fillStyle = '#2a2845';
      ctx.fillRect(64, y + 40, 80, 12);
      ctx.fillStyle = '#00b9be';
      ctx.fillRect(64, y + 40, track.volume * 0.8, 12);

      // Pan knob
      drawPanKnob(ctx, 168, y + 42, 12, track.pan, '#00b9be');

      // Timeline area
      ctx.fillStyle = '#46425e';
      ctx.fillRect(HEADER_WIDTH, y, W - HEADER_WIDTH, TRACK_HEIGHT);
      ctx.strokeStyle = '#15788c';
      ctx.lineWidth = 1;
      ctx.strokeRect(HEADER_WIDTH, y, W - HEADER_WIDTH, TRACK_HEIGHT);

      // Playhead line
      const px = HEADER_WIDTH + ProjectState.playheadBar * barW - scrollX;
      ctx.strokeStyle = 'rgba(255,105,115,0.3)';
      ctx.beginPath(); ctx.moveTo(px, y); ctx.lineTo(px, y + TRACK_HEIGHT); ctx.stroke();

      // Pattern blocks — clipped to timeline area so blocks slide under the header
      ctx.save();
      ctx.beginPath();
      ctx.rect(HEADER_WIDTH, y, W - HEADER_WIDTH, TRACK_HEIGHT);
      ctx.clip();

      const color = this.NOTE_COLORS[track.channelType] || '#ff6973';
      const isPitched = ['pulse50','pulse25','triangle','chord'].includes(track.channelType) && !isDrumChannel(track.channelType);
      for (const entry of track.arrangement) {
        const pat = track.patterns.find(p => p.id === entry.patternId);
        if (!pat) continue;
        const totalBars = entry.loopBars && entry.loopBars > pat.lengthBars ? entry.loopBars : pat.lengthBars;
        const bx = HEADER_WIDTH + entry.startBar * barW - scrollX;
        const contentW = pat.lengthBars * barW - 2;
        const bw = totalBars * barW - 2;
        if (bx + bw < HEADER_WIDTH || bx > W) continue;
        const blockY = y + 2;
        const blockH = TRACK_HEIGHT - 4;

        // Content block
        const isSelected = AV._selEntries.has(entry);
        ctx.fillStyle = _isDragTarget ? color + 'aa' : isSelected ? color + '99' : color + '55';
        ctx.fillRect(bx, blockY, contentW, blockH);
        ctx.strokeStyle = _isDragTarget ? '#00ccaa' : isSelected ? '#ffeecc' : color;
        ctx.lineWidth = (_isDragTarget || isSelected) ? 2 : 1;
        ctx.strokeRect(bx, blockY, contentW, blockH);
        ctx.lineWidth = 1;

        // Loop region (beyond content)
        if (entry.loopBars && entry.loopBars > pat.lengthBars) {
          ctx.fillStyle = color + '28';
          ctx.fillRect(bx + contentW, blockY, bw - contentW, blockH);
          ctx.strokeStyle = color + '88';
          ctx.strokeRect(bx + contentW, blockY, bw - contentW, blockH);
          ctx.save();
          ctx.strokeStyle = color + '66';
          ctx.setLineDash([3, 3]);
          for (let lb = pat.lengthBars; lb < totalBars; lb += pat.lengthBars) {
            const lx = bx + lb * barW;
            ctx.beginPath(); ctx.moveTo(lx, blockY); ctx.lineTo(lx, blockY + blockH); ctx.stroke();
          }
          ctx.setLineDash([]);
          ctx.restore();
        }

        ctx.fillStyle = color;
        ctx.font = '5px "Press Start 2P"';
        ctx.fillText(pat.name, bx + 3, blockY + 11);

        // Resize handle: top-right corner of content (6×8 px)
        ctx.fillStyle = color;
        ctx.fillRect(bx + contentW - 6, blockY, 6, 8);
        // Loop handle: bottom-right corner of content (6×8 px, dimmer)
        ctx.fillStyle = color + 'aa';
        ctx.fillRect(bx + contentW - 6, blockY + blockH - 8, 6, 8);

        // Note preview dots in content area
        ctx.save();
        ctx.beginPath(); ctx.rect(bx, blockY, contentW, blockH); ctx.clip();
        ctx.globalAlpha = 0.8; ctx.fillStyle = color;
        for (const note of pat.notes) {
          const nx = bx + (note.start / pat.lengthBars) * contentW;
          if (isPitched) {
            ctx.fillRect(nx, blockY + blockH - 4 - ((note.pitch / 127) * (blockH - 8)), 2, 2);
          } else {
            ctx.fillRect(nx, blockY + blockH / 2 - 1, 2, 2);
          }
        }
        ctx.globalAlpha = 1; ctx.restore();

        // Note preview dots in loop region
        if (entry.loopBars && entry.loopBars > pat.lengthBars) {
          ctx.save();
          ctx.beginPath(); ctx.rect(bx + contentW, blockY, bw - contentW, blockH); ctx.clip();
          ctx.globalAlpha = 0.4; ctx.fillStyle = color;
          for (let loopOff = pat.lengthBars; loopOff < totalBars; loopOff += pat.lengthBars) {
            for (const note of pat.notes) {
              const nx = bx + loopOff * barW + (note.start / pat.lengthBars) * contentW;
              if (isPitched) {
                ctx.fillRect(nx, blockY + blockH - 4 - ((note.pitch / 127) * (blockH - 8)), 2, 2);
              } else {
                ctx.fillRect(nx, blockY + blockH / 2 - 1, 2, 2);
              }
            }
          }
          ctx.globalAlpha = 1; ctx.restore();
        }
      }
      ctx.restore(); // end pattern blocks clip

      // Task 24: DPCM waveform canvas overlay
      if (track.channelType === 'dpcm') {
        const wc = document.getElementById('waveform-' + track.id);
        if (wc) {
          const panelRect = document.getElementById('arrangement-panel').getBoundingClientRect();
          const wcY = panelRect.top + y + 4;
          wc.style.display = (wcY < panelRect.top + RULER_HEIGHT || wcY > panelRect.bottom) ? 'none' : 'block';
          wc.style.position = 'absolute';
          wc.style.left = (panelRect.left + 64) + 'px';
          wc.style.top  = wcY + 'px';
          wc.style.pointerEvents = 'none';
          DPCMSampler.drawWaveform(track);
        }
      }

      // Mute overlay — gray out track when muted or when another track is soloed
      const soloActive = ProjectState.tracks.some(t => t.soloed);
      const effectivelyMuted = track.muted || (soloActive && !track.soloed);
      if (effectivelyMuted) {
        ctx.fillStyle = 'rgba(20, 18, 40, 0.55)';
        ctx.fillRect(0, y, W, TRACK_HEIGHT);
      }
    });
  }
};

AV.initEvents = function() {
  const canvas = this.getCanvas();
  let dragState = null;
  let loopDragState = null;
  let playheadDrag = false;

  const getHit = (mx, my) => {
    const { HEADER_WIDTH, TRACK_HEIGHT, RULER_HEIGHT, scrollX, scrollY } = this;
    const barW = this.barWidth();
    if (my < RULER_HEIGHT) return { zone: 'ruler' };
    const trackIdx = Math.floor((my - RULER_HEIGHT + scrollY) / TRACK_HEIGHT);
    if (trackIdx < 0 || trackIdx >= ProjectState.tracks.length) return null;
    const track = ProjectState.tracks[trackIdx];
    const ty = RULER_HEIGHT + trackIdx * TRACK_HEIGHT - scrollY;
    if (mx < HEADER_WIDTH) {
      if (mx >= 8 && mx <= 28 && my >= ty+38 && my <= ty+52) return { zone:'mute', track };
      if (mx >= 34 && mx <= 54 && my >= ty+38 && my <= ty+52) return { zone:'solo', track };
      return { zone: 'header', track, trackIdx };
    }
    const bar = Math.floor((mx - HEADER_WIDTH + scrollX) / barW);
    for (const entry of track.arrangement) {
      const pat = track.patterns.find(p => p.id === entry.patternId);
      if (!pat) continue;
      const totalBars = entry.loopBars && entry.loopBars > pat.lengthBars ? entry.loopBars : pat.lengthBars;
      const bx = HEADER_WIDTH + entry.startBar * barW - scrollX;
      const contentRight = bx + pat.lengthBars * barW - 2;
      const bw = totalBars * barW - 2;
      if (mx >= bx && mx <= bx + bw) {
        const blockMid = ty + TRACK_HEIGHT * 0.5;
        // Resize zone: right 8px of content edge, top half
        if (mx >= contentRight - 8 && mx <= contentRight + 4) {
          return my <= blockMid
            ? { zone: 'resize-pattern', track, entry, pat, bar }
            : { zone: 'loop-pattern', track, entry, pat, bar };
        }
        // Extend loop zone: right 8px of the looped block tail
        if (entry.loopBars && entry.loopBars > pat.lengthBars && mx >= bx + bw - 8) {
          return { zone: 'loop-pattern', track, entry, pat, bar };
        }
        return { zone: 'pattern', track, entry, pat, bar };
      }
    }
    return { zone:'empty', track, bar };
  };

  canvas.addEventListener('mousedown', (e) => {
    if (e.detail >= 2) return; // let dblclick handle double-clicks
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const hit = getHit(mx, my);
    if (!hit) return;

    if (hit.zone === 'ruler') {
      const { HEADER_WIDTH, scrollX } = this;
      const barW = this.barWidth();
      const bar = (mx - HEADER_WIDTH + scrollX) / barW;
      if (!e.shiftKey && ProjectState.loopEnabled) {
        const lx1 = HEADER_WIDTH + ProjectState.loopStart * barW - scrollX;
        const lx2 = HEADER_WIDTH + ProjectState.loopEnd * barW - scrollX;
        if (mx >= lx1 - 8 && mx <= lx1 + 8) {
          loopDragState = { type: 'resize-left', origStart: ProjectState.loopStart, origEnd: ProjectState.loopEnd, startX: mx, hasMoved: false };
          return;
        }
        if (mx >= lx2 - 8 && mx <= lx2 + 8) {
          loopDragState = { type: 'resize-right', origStart: ProjectState.loopStart, origEnd: ProjectState.loopEnd, startX: mx, hasMoved: false };
          return;
        }
        if (mx >= lx1 && mx <= lx2) {
          loopDragState = { type: 'move', origStart: ProjectState.loopStart, origEnd: ProjectState.loopEnd, startBar: bar, hasMoved: false };
          return;
        }
      }
      if (e.shiftKey) {
        // Shift+click starts a new loop region
        const snapped = Math.max(0, Math.floor(bar));
        ProjectState.loopStart = snapped;
        ProjectState.loopEnd = snapped + 1;
        ProjectState.loopEnabled = true;
        const btn = document.getElementById('btn-loop');
        if (btn) btn.classList.add('engaged');
        loopDragState = { type: 'resize-right', origStart: snapped, origEnd: snapped + 1, startX: mx, hasMoved: false };
      } else {
        // Plain click/drag moves playhead
        ProjectState.playheadBar = Math.max(0, bar);
        if (typeof Sequencer !== 'undefined') Sequencer._playStartBar = ProjectState.playheadBar;
        playheadDrag = true;
      }
      AV.draw();
      return;
    }
    if (hit.track) {
      const track = hit.track;
      const trackIdx = ProjectState.tracks.indexOf(track);
      if (track.channelType === 'dpcm') {
        const { RULER_HEIGHT, TRACK_HEIGHT, scrollY } = this;
        const ty = RULER_HEIGHT + trackIdx * TRACK_HEIGHT - scrollY;
        if (mx >= 60 && mx <= 96 && my >= ty+56 && my <= ty+70) {
          if (ProjectState.armedTrackId === track.id) {
            DPCMSampler.record(track);
          }
          return;
        }
      }
      // Volume bar slider drag (x 64-144, y+40 to y+52)
      if (hit.zone === 'header') {
        const { RULER_HEIGHT, TRACK_HEIGHT, scrollY } = this;
        const ty = RULER_HEIGHT + trackIdx * TRACK_HEIGHT - scrollY;
        if (mx >= 64 && mx <= 144 && my >= ty+40 && my <= ty+52) {
          // Direct x-position to volume mapping
          track.volume = Math.max(0, Math.min(100, Math.round((mx - 64) / 0.8)));
          AV.draw();
          const onMove = (ev) => {
            const rect = canvas.getBoundingClientRect();
            const cmx = ev.clientX - rect.left;
            track.volume = Math.max(0, Math.min(100, Math.round((cmx - 64) / 0.8)));
            AV.draw();
          };
          const onUp = () => { document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
          return;
        }
        // Pan knob drag
        if (mx >= 154 && mx <= 182 && my >= ty+29 && my <= ty+56) {
          const onMove = (ev) => {
            track.pan = Math.max(-1, Math.min(1, track.pan - ev.movementY * 0.02));
            AV.draw();
          };
          const onUp = () => { document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
          return;
        }
        // Default header click: begin track drag-or-settings gesture
        const _startX = e.clientX, _startY = e.clientY;
        this._trackDrag = { track, idx: trackIdx, startX: _startX, startY: _startY, insertIdx: trackIdx, dragging: false };
        AV.draw();
        const _onMove = (ev) => {
          const dx = ev.clientX - _startX, dy = ev.clientY - _startY;
          if (!this._trackDrag.dragging && Math.sqrt(dx*dx+dy*dy) > 6) {
            this._trackDrag.dragging = true;
          }
          if (this._trackDrag.dragging) {
            const rect2 = canvas.getBoundingClientRect();
            const my2 = ev.clientY - rect2.top;
            const { RULER_HEIGHT, TRACK_HEIGHT, scrollY } = this;
            const rawIdx = Math.round((my2 - RULER_HEIGHT + scrollY) / TRACK_HEIGHT);
            this._trackDrag.insertIdx = Math.max(0, Math.min(ProjectState.tracks.length, rawIdx));
            AV.draw();
          }
        };
        const _onUp = (ev) => {
          document.removeEventListener('mousemove', _onMove);
          document.removeEventListener('mouseup', _onUp);
          if (this._trackDrag.dragging) {
            // Perform reorder
            const from = this._trackDrag.idx;
            let to = this._trackDrag.insertIdx;
            if (to !== from && to !== from + 1) {
              History.push();
              const tracks = ProjectState.tracks;
              const [moved] = tracks.splice(from, 1);
              const dest = to > from ? to - 1 : to;
              tracks.splice(dest, 0, moved);
              AV.draw();
            }
          } else {
            showTrackSettings(track, ev.clientX, ev.clientY);
          }
          this._trackDrag = null;
          AV.draw();
        };
        document.addEventListener('mousemove', _onMove);
        document.addEventListener('mouseup', _onUp);
        return;
      }
    }
    if (hit.zone === 'mute') { hit.track.muted = !hit.track.muted; AV.draw(); return; }
    if (hit.zone === 'solo') { hit.track.soloed = !hit.track.soloed; AV.draw(); return; }
    if (hit.zone === 'empty') {
      AV._selEntries.clear();
      ProjectState.selectedPatternId = null;
      AV._avMarquee = { startX: mx, startY: my, currentX: mx, currentY: my };
      AV.draw();
      return;
    }
    if (hit.zone === 'resize-pattern') {
      AV._selEntries.clear();
      AV._selEntries.add(hit.entry);
      ProjectState.selectedTrackId = hit.track.id;
      ProjectState.selectedPatternId = hit.pat.id;
      dragState = {
        type: 'resize-pattern', entry: hit.entry, track: hit.track, pat: hit.pat,
        startX: mx, origLengthBars: hit.pat.lengthBars,
        snapshot: JSON.stringify(ProjectState)
      };
      return;
    }
    if (hit.zone === 'loop-pattern') {
      AV._selEntries.clear();
      AV._selEntries.add(hit.entry);
      ProjectState.selectedTrackId = hit.track.id;
      ProjectState.selectedPatternId = hit.pat.id;
      dragState = {
        type: 'loop-pattern', entry: hit.entry, track: hit.track, pat: hit.pat,
        startX: mx, origLoopBars: hit.entry.loopBars || hit.pat.lengthBars,
        snapshot: JSON.stringify(ProjectState)
      };
      return;
    }
    if (hit.zone === 'pattern') {
      // If clicking an unselected pattern, replace selection; if already selected, keep it (multi-drag)
      if (!AV._selEntries.has(hit.entry)) {
        AV._selEntries.clear();
        AV._selEntries.add(hit.entry);
      }
      ProjectState.selectedTrackId = hit.track.id;
      ProjectState.selectedPatternId = hit.pat.id;
      PR.open(hit.track, hit.pat);
      AV.draw();
      dragState = {
        type: 'move-pattern',
        entry: hit.entry, track: hit.track, pat: hit.pat,
        origTrack: hit.track,
        origTrackIdx: ProjectState.tracks.indexOf(hit.track),
        startX: mx, startY: my,
        origBar: hit.entry.startBar,
        isAlt: e.altKey,
        snapshot: JSON.stringify(ProjectState)
      };
    }
  });

  canvas.addEventListener('dblclick', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const hit = getHit(mx, my);
    if (!hit) return;
    if (hit.zone === 'empty') {
      History.push();
      addPattern(hit.track.id, Math.max(0, hit.bar), 2);
      AV.draw();
    } else if (hit.zone === 'pattern') {
      ProjectState.selectedTrackId = hit.track.id;
      ProjectState.selectedPatternId = hit.pat.id;
      PR.open(hit.track, hit.pat);
      AV.draw();
    }
  });

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    if (playheadDrag) {
      const barW = this.barWidth();
      const bar = (mx - this.HEADER_WIDTH + this.scrollX) / barW;
      ProjectState.playheadBar = Math.max(0, bar);
      if (typeof Sequencer !== 'undefined') Sequencer._playStartBar = ProjectState.playheadBar;
      AV.draw();
      if (PR.activePattern) PR.draw();
      return;
    }
    if (loopDragState) {
      const barW = this.barWidth();
      const bar = (mx - this.HEADER_WIDTH + this.scrollX) / barW;
      const { type, origStart, origEnd } = loopDragState;
      const cell = 1 / ProjectState.timeSignature[0]; // 1 beat in bar units
      const snap = (v) => Math.round(v / cell) * cell;
      if (type === 'resize-left') {
        const snapped = snap(bar);
        ProjectState.loopStart = Math.max(0, Math.min(origEnd - cell, snapped));
        loopDragState.hasMoved = true;
      } else if (type === 'resize-right') {
        const snapped = snap(bar);
        ProjectState.loopEnd = Math.max(origStart + cell, snapped);
        loopDragState.hasMoved = true;
      } else if (type === 'move') {
        const delta = snap(bar - loopDragState.startBar);
        const dur = origEnd - origStart;
        const newStart = Math.max(0, origStart + delta);
        ProjectState.loopStart = newStart;
        ProjectState.loopEnd = newStart + dur;
        if (Math.abs(delta) >= cell) loopDragState.hasMoved = true;
      }
      AV.draw();
      if (PR.activePattern) PR.draw();
      return;
    }
    if (this._avMarquee) {
      this._avMarquee.currentX = mx;
      this._avMarquee.currentY = my;
      AV.draw();
      return;
    }
    // Cursor feedback when not dragging
    if (!dragState) {
      if (my < this.RULER_HEIGHT && ProjectState.loopEnabled) {
        const barW = this.barWidth();
        const lx1 = this.HEADER_WIDTH + ProjectState.loopStart * barW - this.scrollX;
        const lx2 = this.HEADER_WIDTH + ProjectState.loopEnd * barW - this.scrollX;
        if (mx >= lx1 - 8 && mx <= lx1 + 8) { canvas.style.cursor = 'ew-resize'; return; }
        if (mx >= lx2 - 8 && mx <= lx2 + 8) { canvas.style.cursor = 'ew-resize'; return; }
        if (mx >= lx1 && mx <= lx2) { canvas.style.cursor = 'grab'; return; }
      }
      const hit = getHit(mx, my);
      if (hit?.zone === 'resize-pattern') canvas.style.cursor = 'ew-resize';
      else if (hit?.zone === 'loop-pattern') canvas.style.cursor = 'col-resize';
      else if (hit?.zone === 'pattern') canvas.style.cursor = e.altKey ? 'copy' : 'grab';
      else canvas.style.cursor = '';
      return;
    }
    const barW = this.barWidth();
    if (dragState.type === 'resize-pattern') {
      const deltaBars = (mx - dragState.startX) / barW;
      const newLen = Math.max(0.5, Math.round((dragState.origLengthBars + deltaBars) * 2) / 2);
      dragState.pat.lengthBars = newLen;
      if (dragState.entry.loopBars && dragState.entry.loopBars < newLen) dragState.entry.loopBars = newLen;
      AV.draw();
      return;
    }
    if (dragState.type === 'loop-pattern') {
      const deltaBars = (mx - dragState.startX) / barW;
      const newLoop = Math.max(dragState.pat.lengthBars, Math.round((dragState.origLoopBars + deltaBars) * 2) / 2);
      dragState.entry.loopBars = newLoop <= dragState.pat.lengthBars ? undefined : newLoop;
      AV.draw();
      return;
    }
    if (dragState.type === 'move-pattern') {
      const deltaBars = Math.round((mx - dragState.startX) / barW);
      // Determine which track the cursor is over
      const hoverTrackIdx = Math.floor((my - this.RULER_HEIGHT + this.scrollY) / this.TRACK_HEIGHT);
      const hoverTrack = (hoverTrackIdx >= 0 && hoverTrackIdx < ProjectState.tracks.length)
        ? ProjectState.tracks[hoverTrackIdx] : dragState.track;

      if (dragState.isAlt && !dragState.cloned) {
        const newPat = { id: makeId(), name: dragState.pat.name, lengthBars: dragState.pat.lengthBars,
          notes: (() => { const clonedNotes = JSON.parse(JSON.stringify(dragState.pat.notes)); for (const n of clonedNotes) delete n.selected; return clonedNotes; })() };
        dragState.track.patterns.push(newPat);
        const newEntry = { patternId: newPat.id, startBar: dragState.origBar };
        dragState.track.arrangement.push(newEntry);
        dragState.entry = newEntry; dragState.pat = newPat; dragState.cloned = true;
      }

      // Cross-track move: migrate entry to the hovered track
      if (hoverTrack !== dragState.track) {
        dragState.track.arrangement = dragState.track.arrangement.filter(en => en !== dragState.entry);
        dragState.track.patterns = dragState.track.patterns.filter(p => p !== dragState.pat);
        hoverTrack.patterns.push(dragState.pat);
        hoverTrack.arrangement.push(dragState.entry);
        dragState.track = hoverTrack;
      }

      dragState.entry.startBar = Math.max(0, dragState.origBar + deltaBars);
      AV.draw();
    }
  });

  canvas.addEventListener('mouseup', () => {
    if (dragState?.snapshot) {
      const changed = dragState.type === 'resize-pattern' ? dragState.pat.lengthBars !== dragState.origLengthBars
        : dragState.type === 'loop-pattern' ? (dragState.entry.loopBars || dragState.pat.lengthBars) !== dragState.origLoopBars
        : dragState.cloned || dragState.entry?.startBar !== dragState.origBar || dragState.track !== dragState.origTrack;
      if (changed) History._pushSnapshot(dragState.snapshot);
      // If pattern moved to a different track, update the piano roll reference
      if (dragState.type === 'move-pattern' && dragState.track !== dragState.origTrack) {
        PR.open(dragState.track, dragState.pat);
        ProjectState.selectedTrackId = dragState.track.id;
      }
    }
    if (loopDragState) {
      if (loopDragState.type === 'move' && !loopDragState.hasMoved) {
        // Click without drag on loop body → disable loop
        ProjectState.loopEnabled = false;
        const btn = document.getElementById('btn-loop');
        if (btn) btn.classList.remove('engaged');
        AV.draw(); if (PR.activePattern) PR.draw();
      }
      loopDragState = null;
      canvas.style.cursor = '';
    }
    if (AV._avMarquee) {
      const { startX, startY, currentX, currentY } = AV._avMarquee;
      const rx = Math.min(startX, currentX), ry = Math.min(startY, currentY);
      const rw = Math.abs(currentX - startX), rh = Math.abs(currentY - startY);
      if (rw > 4 || rh > 4) {
        AV._selEntries.clear();
        const barW = AV.barWidth();
        const { HEADER_WIDTH, TRACK_HEIGHT, RULER_HEIGHT } = AV;
        for (const track of ProjectState.tracks) {
          const trackIdx = ProjectState.tracks.indexOf(track);
          const ty = RULER_HEIGHT + trackIdx * TRACK_HEIGHT - AV.scrollY;
          if (ty + TRACK_HEIGHT < ry || ty > ry + rh) continue;
          for (const entry of track.arrangement) {
            const pat = track.patterns.find(p => p.id === entry.patternId);
            if (!pat) continue;
            const totalBars = entry.loopBars && entry.loopBars > pat.lengthBars ? entry.loopBars : pat.lengthBars;
            const bx = HEADER_WIDTH + entry.startBar * barW - AV.scrollX;
            const bw = totalBars * barW - 2;
            if (bx < rx + rw && bx + bw > rx) AV._selEntries.add(entry);
          }
        }
      }
      AV._avMarquee = null;
      AV.draw();
    }
    dragState = null; playheadDrag = false;
  });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const maxScrollY = Math.max(0, ProjectState.tracks.length * this.TRACK_HEIGHT - canvas.height + this.RULER_HEIGHT);
    if (e.shiftKey || Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
      let maxBar = 0;
      for (const track of ProjectState.tracks) {
        for (const entry of track.arrangement) {
          const pat = track.patterns.find(p => p.id === entry.patternId);
          if (pat) {
            const span = (entry.loopBars && entry.loopBars > pat.lengthBars) ? entry.loopBars : pat.lengthBars;
            maxBar = Math.max(maxBar, entry.startBar + span);
          }
        }
      }
      // Also account for the song-level loop region
      if (ProjectState.loopEnabled) maxBar = Math.max(maxBar, ProjectState.loopEnd);
      const barW = this.barWidth();
      const maxScrollX = Math.max(0, (maxBar + 1) * barW - (canvas.width - this.HEADER_WIDTH));
      this.scrollX = Math.max(0, Math.min(maxScrollX, this.scrollX + (e.deltaX || e.deltaY)));
    } else {
      this.scrollY = Math.max(0, Math.min(maxScrollY, this.scrollY + e.deltaY));
    }
    this.draw();
  }, { passive: false });

  // Touch scroll for arrangement view (mobile/tablet — no mouse wheel available)
  let _avTouch = null;
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    _avTouch = { x: t.clientX, y: t.clientY, scrolling: false };
  }, { passive: true });
  canvas.addEventListener('touchmove', (e) => {
    if (!_avTouch || e.touches.length !== 1) return;
    const t = e.touches[0];
    const dx = t.clientX - _avTouch.x;
    const dy = t.clientY - _avTouch.y;
    if (!_avTouch.scrolling && Math.abs(dy) < 6 && Math.abs(dx) < 6) return;
    if (!_avTouch.scrolling) _avTouch.scrolling = Math.abs(dy) >= Math.abs(dx);
    if (!_avTouch.scrolling) return;
    e.preventDefault();
    const maxSY = Math.max(0, ProjectState.tracks.length * AV.TRACK_HEIGHT - canvas.height + AV.RULER_HEIGHT);
    AV.scrollY = Math.max(0, Math.min(maxSY, AV.scrollY - dy));
    _avTouch.x = t.clientX; _avTouch.y = t.clientY;
    AV.draw();
  }, { passive: false });
  canvas.addEventListener('touchend', () => { _avTouch = null; }, { passive: true });

  canvas.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const hit = getHit(e.clientX - rect.left, e.clientY - rect.top);
    if (hit && hit.zone === 'pattern') {
      showContextMenu(e.clientX, e.clientY, [
        { label: 'Open in Piano Roll', action: () => {
          ProjectState.selectedTrackId = hit.track.id;
          ProjectState.selectedPatternId = hit.pat.id;
          PR.open(hit.track, hit.pat);
          AV.draw();
        }},
        { label: 'Rename', action: () => {
          const n = prompt('Pattern name:', hit.pat.name);
          if (n) { hit.pat.name = n; AV.draw(); }
        }},
        { label: 'Delete', action: () => {
          History.push();
          hit.track.arrangement = hit.track.arrangement.filter(en => en !== hit.entry);
          AV.draw();
        }}
      ]);
    }
  });
};

function showContextMenu(x, y, items) {
  let el = document.getElementById('ctx-menu');
  if (el) el.remove();
  el = document.createElement('div');
  el.id = 'ctx-menu';
  el.style.cssText = `position:fixed;left:${x}px;top:${y}px;background:#46425e;
    border:2px solid #15788c;z-index:1000;padding:2px;`;
  items.forEach(item => {
    const btn = document.createElement('div');
    btn.textContent = item.label;
    btn.style.cssText = 'padding:6px 10px;cursor:pointer;font:6px "Press Start 2P";color:#ffeecc;letter-spacing:0.05rem;';

}

// ---------------------------------------------------------------------------
// MIDI import helpers
// ---------------------------------------------------------------------------

function parseMidi(buffer) {
  const data = new Uint8Array(buffer);
  let pos = 0;

  function readUint32() {
    const v = (data[pos]<<24)|(data[pos+1]<<16)|(data[pos+2]<<8)|data[pos+3];
    pos += 4; return v >>> 0;
  }
  function readUint16() {
    const v = (data[pos]<<8)|data[pos+1]; pos += 2; return v;
  }
  function readVarLen() {
    let val = 0, b;
    do { b = data[pos++]; val = (val << 7) | (b & 0x7f); } while (b & 0x80);
    return val;
  }

  // MThd
  if (String.fromCharCode(data[0],data[1],data[2],data[3]) !== 'MThd') throw new Error('Not a MIDI file');
  pos = 4;
  readUint32(); // header length (always 6)
  const format  = readUint16();
  const numTrks = readUint16();
  const division = readUint16();
  if (division & 0x8000) throw new Error('SMPTE timecode MIDI not supported');
  const ppq = division; // ticks per quarter note

  const tracks = [];
  for (let t = 0; t < numTrks; t++) {
    if (pos + 4 > data.length) break;
    if (String.fromCharCode(data[pos],data[pos+1],data[pos+2],data[pos+3]) !== 'MTrk') {
      pos += 4; pos += readUint32(); continue;
    }
    pos += 4;
    const chunkLen = readUint32();
    const chunkEnd = pos + chunkLen;
    const events = [];
    let absoluteTick = 0;
    let lastStatus = 0;

    while (pos < chunkEnd) {
      const delta = readVarLen();
      absoluteTick += delta;

      let statusByte = data[pos];
      if (statusByte & 0x80) { lastStatus = statusByte; pos++; }
      else { statusByte = lastStatus; } // running status

      const type   = (statusByte >> 4) & 0xf;
      const channel = statusByte & 0xf;

      if (statusByte === 0xff) {
        // Meta event
        const metaType = data[pos++];
        const metaLen  = readVarLen();
        if (metaType === 0x51 && metaLen === 3) {
          // Set Tempo
          const uspqn = (data[pos]<<16)|(data[pos+1]<<8)|data[pos+2];
          events.push({ tick: absoluteTick, type: 'tempo', uspqn });
        }
        pos += metaLen;
        lastStatus = 0; // meta resets running status
      } else if (statusByte === 0xf0 || statusByte === 0xf7) {
        // SysEx
        const sLen = readVarLen();
        pos += sLen;
        lastStatus = 0;
      } else if (type === 0x9) {
        const pitch    = data[pos++];
        const velocity = data[pos++];
        // Note-on with vel=0 is note-off
        events.push({ tick: absoluteTick, type: velocity > 0 ? 'noteOn' : 'noteOff', channel, pitch, velocity });
      } else if (type === 0x8) {
        const pitch    = data[pos++];
        const velocity = data[pos++];
        events.push({ tick: absoluteTick, type: 'noteOff', channel, pitch, velocity });
      } else if (type === 0xa) { pos += 2; } // aftertouch
      else if (type === 0xb) { pos += 2; } // CC
      else if (type === 0xc) { pos += 1; } // program change
      else if (type === 0xd) { pos += 1; } // channel pressure
      else if (type === 0xe) { pos += 2; } // pitch bend
      else { pos = chunkEnd; break; } // unknown, bail
    }
    pos = chunkEnd;
    tracks.push({ events });
  }

  return { format, ppq, tracks };
}

function showMidiImportDialog(midiData, filename) {
  // Flatten all note-on/off events across tracks into a list of { pitch, startTick, durationTicks, velocity }
  const rawNotes = [];
  for (const track of midiData.tracks) {
    const openNotes = {}; // key: `${channel}-${pitch}` → { startTick, velocity }
    for (const ev of track.events) {
      const key = `${ev.channel}-${ev.pitch}`;
      if (ev.type === 'noteOn') {
        openNotes[key] = { startTick: ev.tick, velocity: ev.velocity };
      } else if (ev.type === 'noteOff') {
        if (openNotes[key]) {
          rawNotes.push({
            pitch:        ev.pitch,
            startTick:    openNotes[key].startTick,
            durationTicks: ev.tick - openNotes[key].startTick,
            velocity:     openNotes[key].velocity,
          });
          delete openNotes[key];
        }
      }
    }
  }

  if (rawNotes.length === 0) { alert('No notes found in MIDI file.'); return; }

  const trackTypes = [
    { value: 'pulse50',   label: 'Lead (Pulse 50%)' },
    { value: 'pulse25',   label: 'Harmony (Pulse 25%)' },
    { value: 'triangle',  label: 'Bass (Triangle)' },
    { value: 'chord',     label: 'Chord' },
    { value: 'noise',     label: 'Noise / Drums' },
  ];

  const el = document.createElement('div');
  el.style.cssText = `
    position:fixed; z-index:9999; background:#1a1a2e; border:2px solid #00ccaa;
    padding:16px; font:7px "Press Start 2P"; color:#e0e0ff;
    display:flex; flex-direction:column; gap:10px; min-width:240px;
  `;
  el.innerHTML = `
    <div style="color:#00ccaa;font-size:8px;letter-spacing:1px">IMPORT MIDI</div>
    <div style="color:#8888aa;word-break:break-all">${filename.replace(/</g,'&lt;')}</div>
    <div style="color:#8888aa">${rawNotes.length} notes detected</div>
    <div>
      <div style="margin-bottom:5px;color:#8888aa">TRACK NAME</div>
      <input id="midi-tname" type="text" value="${filename.replace(/\.midi?$/i,'').replace(/</g,'&lt;')}"
        style="background:#0d0d1a;border:2px solid #444466;color:#e0e0ff;font:7px 'Press Start 2P';
               padding:4px 6px;width:100%;box-sizing:border-box">
    </div>
    <div>
      <div style="margin-bottom:5px;color:#8888aa">TRACK TYPE</div>
      <select id="midi-ttype"
        style="background:#0d0d1a;border:2px solid #444466;color:#e0e0ff;font:7px 'Press Start 2P';
               padding:4px 6px;width:100%;box-sizing:border-box">
        ${trackTypes.map(t=>`<option value="${t.value}">${t.label}</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button id="midi-cancel"
        style="flex:1;background:#1a1a2e;border:2px solid #444466;color:#8888aa;
               font:7px 'Press Start 2P';padding:6px;cursor:pointer">CANCEL</button>
      <button id="midi-import"
        style="flex:1;background:#003322;border:2px solid #00ccaa;color:#00ccaa;
               font:7px 'Press Start 2P';padding:6px;cursor:pointer">IMPORT</button>
    </div>
  `;

  // Center popup
  el.style.left = '50%'; el.style.top = '50%';
  el.style.transform = 'translate(-50%,-50%)';
  document.body.appendChild(el);

  document.getElementById('midi-cancel').onclick = () => el.remove();

  document.getElementById('midi-import').onclick = () => {
    const trackName = document.getElementById('midi-tname').value.trim() || 'MIDI Track';
    const channelType = document.getElementById('midi-ttype').value;

    // Convert ticks → bars using NESForge tempo
    // bpm from ProjectState; ppq from MIDI header
    const bpm = ProjectState.bpm || 120;
    const ppq = midiData.ppq;
    const beatsPerBar = ProjectState.timeSignature ? ProjectState.timeSignature[0] : 4;
    const ticksPerBar = ppq * beatsPerBar;

    // Build notes array
    const notes = rawNotes.map(n => ({
      pitch:    Math.max(0, Math.min(127, n.pitch)),
      start:    n.startTick / ticksPerBar,
      duration: Math.max(1/32, n.durationTicks / ticksPerBar),
      velocity: Math.max(1, Math.min(127, n.velocity)),
    }));

    // Determine pattern length (round up to whole bar)
    const maxEnd = notes.reduce((m, n) => Math.max(m, n.start + n.duration), 0);
    const patternBars = Math.max(1, Math.ceil(maxEnd));

    // Create track + pattern
    const newTrack = {
      id:          makeId(),
      name:        trackName,
      channelType,
      volume:      80,
      pan:         0,
      muted:       false,
      soloed:      false,
      patterns:    [],
      arrangement: [],
    };
    const newPattern = {
      id:         makeId(),
      name:       'Pattern 1',
      lengthBars: patternBars,
      notes,
    };
    newTrack.patterns.push(newPattern);
    newTrack.arrangement.push({ patternId: newPattern.id, startBar: 0 });

    History.push();
    ProjectState.tracks.push(newTrack);
    AV.draw();
    el.remove();
  };
}

// MODULE: ChordTool
// ============================================================
const ChordTool = {
  // Scale degree intervals (from root) for triads and 7ths
  DEGREE_OFFSETS: [0,2,4,6], // indices into scale degrees for chord tones (triad: 0,2,4; 7th: 0,2,4,6)
  DEGREE_NAMES: ['I','II','III','IV','V','VI','VII'],

  getDiatonicChords(key, scaleName) {
    const root = Scales.getRootSemitone(key);
    const intervals = Scales.SCALES[scaleName] || Scales.SCALES['Major'];
    const scaleNotes = intervals.map(i => (root + i) % 12);

    return scaleNotes.map((notePC, degreeIdx) => {
      const baseMIDI = 60 + notePC - (notePC >= root ? 0 : 12); // near C4
      // Triad: 1st, 3rd, 5th scale degrees from this root
      const getScaleNote = (offset) => {
        const idx = (degreeIdx + offset) % scaleNotes.length;
        let pc = scaleNotes[idx];
        let midi = baseMIDI;
        // Ensure ascending
        while (pc < (midi % 12)) pc += 12;
        // Find MIDI note at correct octave
        const base = baseMIDI - (baseMIDI % 12) + (pc % 12);
        return base + (base < baseMIDI ? 12 : 0);
      };

      const triadNotes = [getScaleNote(0), getScaleNote(2), getScaleNote(4)];
      const seventhNote = getScaleNote(6);

      // Chord quality detection
      const thirdInterval = triadNotes[1] - triadNotes[0];
      const fifthInterval = triadNotes[2] - triadNotes[0];
      let quality = thirdInterval === 4 ? (fifthInterval === 7 ? 'maj' : 'aug') :
                    thirdInterval === 3 ? (fifthInterval === 7 ? 'm' : 'dim') : '?';
      const seventh = seventhNote - triadNotes[0];
      let quality7 = quality + (seventh === 11 ? 'maj7' : seventh === 10 ? '7' : '?');

      return {
        degree: this.DEGREE_NAMES[degreeIdx],
        rootName: Scales.NOTE_ORDER[notePC],
        triad: { name: `${Scales.NOTE_ORDER[notePC]}${quality}`, notes: triadNotes },
        seventh: { name: `${Scales.NOTE_ORDER[notePC]}${quality7}`, notes: [...triadNotes, seventhNote] }
      };
    });
  },

  _insertChord(chordNotes, startBar, label) {
    const ap = PR.activePattern;
    if (!ap) return;
    const id = makeId();
    const sixteenth = (PR.sixteenthWidth() / PR.barWidth());
    ap.pattern.notes.forEach(n => { n.selected = false; });
    chordNotes.forEach(pitch => {
      ap.pattern.notes.push({ pitch, start: startBar, duration: sixteenth * 2, velocity: 100,
        chordId: id, chordLabel: label, selected: true });
    });
    PR.draw(); PR.drawVelocity();
  },

  pasteAtPlayhead(chordNotes, label) {
    const ap = PR.activePattern;
    if (!ap) return;
    const entry = ap.track.arrangement.find(e => e.patternId === ap.pattern.id);
    const relBar = ProjectState.playheadBar - (entry ? entry.startBar : 0);
    const sixteenth = PR.sixteenthWidth() / PR.barWidth();
    const snapped = Math.max(0, Math.floor(relBar / sixteenth) * sixteenth);
    History.push();
    this._insertChord(chordNotes, snapped, label);
    // Auto-extend if chord lands beyond pattern end
    const chordEnd = snapped + sixteenth * 2;
    if (chordEnd > ap.pattern.lengthBars) {
      ap.pattern.lengthBars = Math.ceil(chordEnd);
      if (entry && entry.loopBars && entry.loopBars < ap.pattern.lengthBars) entry.loopBars = ap.pattern.lengthBars;
      AV.draw();
    }
  },

  openInlinePicker(startBar, screenX, screenY) {
    let el = document.getElementById('chord-picker');
    if (el) el.remove();
    el = document.createElement('div');
    el.id = 'chord-picker';
    el.style.cssText = `position:fixed;left:${screenX}px;top:${screenY}px;background:#46425e;
      border:2px solid #15788c;z-index:999;padding:6px;max-width:300px;`;

    const chords = this.getDiatonicChords(ProjectState.key, ProjectState.scale);
    const title = document.createElement('div');
    title.textContent = `${ProjectState.key} ${ProjectState.scale}`;
    title.style.cssText = 'font:6px "Press Start 2P";color:#00b9be;margin-bottom:6px;';
    el.appendChild(title);

    chords.forEach(ch => {
      ['triad','seventh'].forEach(type => {
        const btn = document.createElement('button');
        btn.className = 'nes-btn';
        btn.style.margin = '2px';
        btn.textContent = ch[type].name;
        btn.onclick = () => {
          History.push();
          this._insertChord(ch[type].notes, startBar, ch[type].name);
          el.remove();
        };
        el.appendChild(btn);
      });
    });

    document.body.appendChild(el);
    // Clamp to viewport
    const _cpr = el.getBoundingClientRect();
    if (_cpr.right  > window.innerWidth)  el.style.left = `${Math.max(0, window.innerWidth  - _cpr.width  - 4)}px`;
    if (_cpr.bottom > window.innerHeight) el.style.top  = `${Math.max(0, window.innerHeight - _cpr.height - 4)}px`;
    el.addEventListener('mousedown', e => e.stopPropagation());
    setTimeout(() => document.addEventListener('mousedown', () => el.remove(), { once: true }), 100);
  },

  renderPalette() {
    const panel = document.getElementById('chord-panel');
    if (!panel) return;
    const chords = this.getDiatonicChords(ProjectState.key, ProjectState.scale);
    panel.innerHTML = `<div style="padding:6px;font:6px 'Press Start 2P';color:#00b9be;border-bottom:1px solid #15788c;margin-bottom:4px;">${ProjectState.key} ${ProjectState.scale} CHORDS</div>`;
    chords.forEach(ch => {
      ['triad','seventh'].forEach(type => {
        const btn = document.createElement('button');
        btn.className = 'nes-btn';
        btn.style.margin = '2px';
        btn.textContent = ch[type].name;
        btn.onclick = () => this.pasteAtPlayhead(ch[type].notes, ch[type].name);
        panel.appendChild(btn);
      });
    });
  }
};

// ============================================================
// MODULE: DPCMSampler
// ============================================================
const DPCMSampler = {
  MAX_DURATION: 2, // seconds
  TARGET_RATE: 8000,
  BIT_DEPTH: 4, // 16 levels

  async record(track) {
    if (!navigator.mediaDevices) {
      alert('Mic access unavailable on file:// — serve from localhost for recording.');
      return;
    }
    let stream;
    try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
    catch(e) { alert('Mic access denied: ' + e.message); return; }

    const ctx = getAudioCtx();
    const src = ctx.createMediaStreamSource(stream);
    const scriptProc = ctx.createScriptProcessor(4096, 1, 1);
    const recorded = [];

    scriptProc.onaudioprocess = (e) => {
      const buf = e.inputBuffer.getChannelData(0);
      recorded.push(new Float32Array(buf));
    };

    src.connect(scriptProc);
    scriptProc.connect(ctx.destination);

    // Stop after MAX_DURATION
    await new Promise(r => setTimeout(r, this.MAX_DURATION * 1000));

    scriptProc.disconnect(); src.disconnect();
    stream.getTracks().forEach(t => t.stop());

    // Concatenate
    const total = recorded.reduce((s, b) => s + b.length, 0);
    const full = new Float32Array(total);
    let offset = 0;
    for (const chunk of recorded) { full.set(chunk, offset); offset += chunk.length; }

    const processed = this.bitcrush(this.downsample(full, ctx.sampleRate));
    track.sample = processed;
    this.drawWaveform(track);
    EventBus.emit('dpcm:recorded', { track });
  },

  downsample(samples, srcRate) {
    const ratio = srcRate / this.TARGET_RATE;
    const outLen = Math.floor(samples.length / ratio);
    const out = new Float32Array(outLen);
    for (let i = 0; i < outLen; i++) {
      out[i] = samples[Math.floor(i * ratio)];
    }
    return out;
  },

  bitcrush(samples) {
    const levels = Math.pow(2, this.BIT_DEPTH); // 16
    const out = new Float32Array(samples.length);
    for (let i = 0; i < samples.length; i++) {
      out[i] = Math.round((samples[i] + 1) * (levels / 2)) / (levels / 2) - 1;
    }
    return out;
  },

  drawWaveform(track) {
    const canvasId = 'waveform-' + track.id;
    const canvas = document.getElementById(canvasId);
    if (!canvas || !track.sample) return;
    const ctx = canvas.getContext('2d');
    const { width: W, height: H } = canvas;
    ctx.fillStyle = '#46425e';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#ffb0a3';
    ctx.beginPath();
    const step = track.sample.length / W;
    for (let x = 0; x < W; x++) {
      const val = track.sample[Math.floor(x * step)];
      const y = H / 2 - val * (H / 2 - 1);
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
};

EventBus.on('track:added', (track) => {
  if (track.channelType === 'dpcm') {
    // Create waveform canvas element (rendered by AV as an overlay)
    const wc = document.createElement('canvas');
    wc.id = 'waveform-' + track.id;
    wc.width = 80; wc.height = 30;
    wc.style.cssText = 'position:absolute;display:none;'; // positioned by AV
    document.body.appendChild(wc);
  }
});
