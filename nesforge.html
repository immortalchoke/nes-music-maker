          const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;
          const bpm = Math.round(60000 / avg);
          if (bpm >= 20 && bpm <= 300) {
            ProjectState.bpm = bpm;
            document.getElementById('mob-bpm-display').textContent = bpm;
            if (typeof Sequencer !== 'undefined') Sequencer.updateTiming && Sequencer.updateTiming();
          }
        }
        // Reset tap times after 2s of no taps
        clearTimeout(this._tapResetTimer);
        this._tapResetTimer = setTimeout(() => { this._tapTimes = []; }, 2000);
      });

      // Bar navigation
      document.getElementById('mob-prev-bar').addEventListener('click', () => {
        if (this.currentBar > 0) {
          this.currentBar--;
          this._renderBarDots();
          this._renderGrid();
        }
      });
      document.getElementById('mob-next-bar').addEventListener('click', () => {
        if (this.currentBar < this.numBars - 1) {
          this.currentBar++;
          this._renderBarDots();
          this._renderGrid();
        }
      });

      // Add bar
      document.getElementById('mob-add-bar').addEventListener('click', () => {
        this.numBars++;
        // Sync all tracks' mobile patterns to new length
        for (const track of ProjectState.tracks) {
          const pat = this._getMobilePattern(track);
          // _getMobilePattern already ensures pat.lengthBars >= numBars
        }
        // Update loop region if needed
        if (ProjectState.loopEnabled) {
          ProjectState.loopEnd = Math.max(ProjectState.loopEnd, this.numBars);
        }
        this._renderBarDots();
        this._showToast('BARS: ' + this.numBars);
      });

      // Remove bar
      document.getElementById('mob-rem-bar').addEventListener('click', () => {
        if (this.numBars <= 1) { this._showToast('MIN 1 BAR'); return; }
        this.numBars--;
        if (this.currentBar >= this.numBars) {
          this.currentBar = this.numBars - 1;
        }
        this._renderBarDots();
        this._renderGrid();
        this._showToast('BARS: ' + this.numBars);
      });

      // Clear track — removes all notes for the active track
      document.getElementById('mob-clear-track').addEventListener('click', () => {
        const track = ProjectState.tracks.find(t => t.id === this.activeTrackId);
        if (!track) return;
        const pat = this._getMobilePattern(track);
        if (!pat.notes.length) return;
        History.push();
        pat.notes = [];
        this._renderGrid();
        this._showToast('CLEARED');
      });

      // Swipe on grid area
      const gridArea = document.getElementById('mob-grid-area');
      gridArea.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          this._swipeStartX = e.touches[0].clientX;
          this._swipeStartY = e.touches[0].clientY;
        }
      }, { passive: true });
      gridArea.addEventListener('touchend', (e) => {
        if (this._swipeStartX === null) return;
        const dx = e.changedTouches[0].clientX - this._swipeStartX;
        const dy = e.changedTouches[0].clientY - this._swipeStartY;
        if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          if (dx < 0 && this.currentBar < this.numBars - 1) {
            this.currentBar++;
            this._renderBarDots();
            this._renderGrid();
          } else if (dx > 0 && this.currentBar > 0) {
            this.currentBar--;
            this._renderBarDots();
            this._renderGrid();
          }
        }
        this._swipeStartX = null;
        this._swipeStartY = null;
      }, { passive: true });

      // Export button
      document.getElementById('mob-export-btn').addEventListener('click', () => {
        document.getElementById('mob-export-dialog').classList.add('open');
      });
      document.getElementById('mob-export-close-btn').addEventListener('click', () => {
        document.getElementById('mob-export-dialog').classList.remove('open');
      });
      document.getElementById('mob-export-dialog').addEventListener('click', (e) => {
        if (e.target === document.getElementById('mob-export-dialog')) {
          document.getElementById('mob-export-dialog').classList.remove('open');
        }
      });
      document.getElementById('mob-exp-share').addEventListener('click', async () => {
        document.getElementById('mob-export-dialog').classList.remove('open');
        await this._shareAudio();
      });
      document.getElementById('mob-exp-wav').addEventListener('click', async () => {
        document.getElementById('mob-export-dialog').classList.remove('open');
        ExportEngine._promptFilename('nesforge-export', 'EXPORT', async (name) => {
          const filename = name.endsWith('.wav') ? name : name + '.wav';
          this._showToast('RENDERING... 0%');
          try {
            const buf = await ExportEngine.renderOffline(p => this._showToast('RENDERING... ' + Math.round(p * 100) + '%'));
            const wav = ExportEngine.encodeWAV(buf);
            ExportEngine.downloadBlob(wav, filename, 'audio/wav');
          } catch (err) {
            this._showToast('ERROR: ' + err.message);
          }
        });
      });
      document.getElementById('mob-exp-mp3').addEventListener('click', async () => {
        document.getElementById('mob-export-dialog').classList.remove('open');
        if (!window.lamejs) {
          this._showToast('MP3 ENCODER NOT LOADED YET — TRY AGAIN');
          return;
        }
        ExportEngine._promptFilename('nesforge-export', 'EXPORT', async (name) => {
          const filename = name.endsWith('.mp3') ? name : name + '.mp3';
          this._showToast('RENDERING... 0%');
          try {
            // Phase 1: offline render
            const audioBuffer = await ExportEngine.renderOffline(
              p => this._showToast('RENDERING... ' + Math.round(p * 100) + '%')
            );
            // Phase 2: lamejs MP3 encode
            this._showToast('ENCODING MP3... 0%');
            const blob = await ExportEngine._encodeToMP3(audioBuffer,
              p => this._showToast('ENCODING MP3... ' + Math.round(p * 100) + '%')
            );
            const file = new File([blob], filename, { type: 'audio/mpeg' });
            let shared = false;
            if (navigator.canShare?.({ files: [file] })) {
              try { await navigator.share({ files: [file], title: 'NESForge Export' }); shared = true; }
              catch (err) { if (err.name !== 'AbortError') throw err; shared = true; }
            }
            if (!shared) ExportEngine.downloadBlob(blob, filename, 'audio/mpeg');
            this._showToast('DONE');
          } catch (err) {
            this._showToast('ERROR: ' + err.message);
          }
        });
      });
      document.getElementById('mob-exp-midi').addEventListener('click', () => {
        document.getElementById('mob-export-dialog').classList.remove('open');
        ExportEngine.exportMIDICombined();
      });

      // Velocity picker done button
      document.getElementById('mob-vel-done').addEventListener('click', () => {
        this._closeVelPicker();
      });
      document.getElementById('mob-vel-slider').addEventListener('input', (e) => {
        const val = parseInt(e.target.value, 10);
        document.getElementById('mob-vel-picker-label').textContent = 'VELOCITY: ' + val;
        if (this._velPickerStep !== null) {
          this._applyVelocity(this._velPickerStep, val);
        }
      });

      // Re-sync when a project is loaded (e.g. from file) so numBars updates.
      EventBus.on('project:loaded', () => {
        if (!this.isMobile()) return;
        this._syncFromProject();
        this._renderTracks();
      });

      // Double rAF: first fires before paint, second fires after layout is committed
      // Single rAF is not enough on iOS Safari/Chrome — grid has 0 width on first frame
      this._renderKeyboard();
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          this._renderTracks();
          this._renderBarDots();
          this._renderGrid();
          // Force grid reflow by reading offsetWidth then re-rendering
          const grid = document.getElementById('mob-grid');
          if (grid && grid.offsetWidth < 100) {
            // Grid still hasn't expanded — try once more after a tick
            setTimeout(() => { this._renderGrid(); }, 50);
          }
        });
      });
    },

    _syncFromProject() {
      // Sync BPM display
      document.getElementById('mob-bpm-display').textContent = ProjectState.bpm;
      // Sync key/scale selects
      const keySel = document.getElementById('mob-key-sel');
      const scaleSel = document.getElementById('mob-scale-sel');
      if (keySel) keySel.value = ProjectState.key;
      if (scaleSel) scaleSel.value = ProjectState.scale;

      // Sync numBars from the arrangement — use max container length across all tracks.
      // Count loopBars (stretched containers) as well as pat.lengthBars.
      const maxBars = ProjectState.tracks.reduce((max, track) => {
        const entry = track.arrangement.find(e => e.startBar === 0);
        if (!entry) return max;
        const pat = track.patterns.find(p => p.id === entry.patternId);
        if (!pat) return max;
        const total = (entry.loopBars && entry.loopBars > pat.lengthBars) ? entry.loopBars : pat.lengthBars;
        return Math.max(max, total);
      }, 1);
      this.numBars = maxBars;
      if (this.currentBar >= this.numBars) this.currentBar = 0;
      if (this._initialized) {
        this._renderBarDots();
        this._renderGrid();
      }
    },

    _getMobilePattern(track) {
      // Find pattern at startBar === 0
      let entry = track.arrangement.find(e => e.startBar === 0);
      let pat = null;
      if (entry) {
        pat = track.patterns.find(p => p.id === entry.patternId);
      }
      if (!pat) {
        pat = addPattern(track.id, 0, this.numBars);
      }
      // Ensure length >= numBars (never shrink)
      if (pat.lengthBars < this.numBars) {
        pat.lengthBars = this.numBars;
      }
      return pat;
    },

    _getSteps() {
      const track = ProjectState.tracks.find(t => t.id === this.activeTrackId);
      if (!track) return new Array(16).fill(null);
      const pat = this._getMobilePattern(track);
      const bar = this.currentBar;
      const steps = new Array(16).fill(null);
      for (const note of pat.notes) {
        if (Math.abs(note.pitch - this.currentPitch) < 0.5) {
          const stepFloat = (note.start - bar) * 16;
          const stepIdx = Math.round(stepFloat);
          if (stepIdx >= 0 && stepIdx < 16 && Math.abs(stepFloat - stepIdx) < 0.05) {
            steps[stepIdx] = note;
          }
        }
      }
      return steps;
    },

    _toggleStep(stepIdx) {
      const track = ProjectState.tracks.find(t => t.id === this.activeTrackId);
      if (!track) return;
      const pat = this._getMobilePattern(track);
      const noteStart = this.currentBar + stepIdx / 16;
      const noteDur = 1 / 16;

      // Check if note exists at this step+pitch
      const existingIdx = pat.notes.findIndex(n =>
        Math.abs(n.start - noteStart) < 0.002 &&
        Math.abs(n.pitch - this.currentPitch) < 0.5
      );

      if (existingIdx >= 0) {
        // Remove note
        pat.notes.splice(existingIdx, 1);
      } else {
        // Add note
        const newNote = {
          id: makeId(),
          pitch: this.currentPitch,
          start: noteStart,
          duration: noteDur,
          velocity: 100
        };
        pat.notes.push(newNote);
        // Preview sound — wait for context to be running first
        ensureAudioCtxRunning().then(ctx => {
          try { playNote(track, newNote, ctx.currentTime + 0.05); } catch(e) {}
        });
      }
      this._renderGrid();
    },

    _applyVelocity(stepIdx, velocity) {
      const track = ProjectState.tracks.find(t => t.id === this.activeTrackId);
      if (!track) return;
      const pat = this._getMobilePattern(track);
      const noteStart = this.currentBar + stepIdx / 16;
      const note = pat.notes.find(n =>
        Math.abs(n.start - noteStart) < 0.002 &&
        Math.abs(n.pitch - this.currentPitch) < 0.5
      );
      if (note) {
        note.velocity = velocity;
        this._renderGrid();
      }
    },

    _renderTracks() {
      const container = document.getElementById('mob-tracks');
      if (!container) return;
      container.innerHTML = '';
      for (const track of ProjectState.tracks) {
        const btn = document.createElement('button');
        btn.className = 'mob-track-btn' + (track.id === this.activeTrackId ? ' active' : '');
        const color = (typeof PR !== 'undefined' && PR.NOTE_COLORS && PR.NOTE_COLORS[track.channelType]) || '#ff6973';
        const dot = document.createElement('div');
        dot.className = 'mob-track-color-dot';
        dot.style.background = color;
        btn.appendChild(dot);
        const label = document.createElement('span');
        label.textContent = (track.name || track.channelType).substring(0, 6);
        btn.appendChild(label);
        // Pointer-based drag-reorder vs tap
        let _pdStartX, _pdStartY, _pdDragging = false, _pdPlaceholder = null;
        btn.addEventListener('pointerdown', (pe) => {
          btn.setPointerCapture(pe.pointerId);
          _pdStartX = pe.clientX; _pdStartY = pe.clientY; _pdDragging = false;
        });
        btn.addEventListener('pointermove', (pe) => {
          if (!pe.buttons) return;
          const dx = pe.clientX - _pdStartX, dy = pe.clientY - _pdStartY;
          if (!_pdDragging && Math.sqrt(dx*dx+dy*dy) > 8) {
            _pdDragging = true;
            btn.style.opacity = '0.4';
            _pdPlaceholder = document.createElement('div');
            _pdPlaceholder.style.cssText = `min-width:56px;height:52px;border:2px dashed var(--hi);border-radius:4px;flex-shrink:0;`;
            container.insertBefore(_pdPlaceholder, btn);
          }
          if (_pdDragging && _pdPlaceholder) {
            // Find insert position from x coordinate
            const siblings = [...container.children].filter(c => c !== btn && c !== _pdPlaceholder);
            let insertBefore = null;
            for (const sib of siblings) {
              const r = sib.getBoundingClientRect();
              if (pe.clientX < r.left + r.width / 2) { insertBefore = sib; break; }
            }
            container.insertBefore(_pdPlaceholder, insertBefore);
          }
        });
        btn.addEventListener('pointerup', () => {
          if (_pdDragging && _pdPlaceholder) {
            btn.style.opacity = '';
            const siblings = [...container.children].filter(c => c !== btn && c !== _pdPlaceholder);
            const newOrder = [...container.children]
              .filter(c => c !== btn)
              .map(c => c === _pdPlaceholder ? track : siblings[siblings.indexOf(c)] ? ProjectState.tracks.find(t => {
                const lbl = c.querySelector('span');
                return lbl && t.name && lbl.textContent === (t.name||t.channelType).substring(0,6);
              }) : null)
              .filter(Boolean);
            // Simpler: record placeholder's index among non-btn non-placeholder children
            const allChildren = [...container.children];
            const phIdx = allChildren.indexOf(_pdPlaceholder);
            const fromIdx = ProjectState.tracks.indexOf(track);
            // Count real track buttons before placeholder
            let toIdx = 0;
            for (let i = 0; i < phIdx; i++) {
              if (allChildren[i] !== btn && allChildren[i] !== _pdPlaceholder && allChildren[i].classList.contains('mob-track-btn')) toIdx++;
            }
            _pdPlaceholder.remove();
            if (toIdx !== fromIdx) {
              History.push();
              const [moved] = ProjectState.tracks.splice(fromIdx, 1);
              ProjectState.tracks.splice(toIdx, 0, moved);
            }
          } else if (!_pdDragging) {
            this.activeTrackId = track.id;
            ensureAudioCtxRunning().then(ctx => {
              try {
                const fakeNote = { pitch: this.currentPitch, duration: 1/16, velocity: 100 };
                playNote(track, fakeNote, ctx.currentTime + 0.01);
              } catch (e) { /* silent */ }
            });
          }
          _pdDragging = false; _pdPlaceholder = null;
          this._renderTracks(); this._renderGrid();
        });
        btn.addEventListener('pointercancel', () => {
          if (_pdPlaceholder) _pdPlaceholder.remove();
          btn.style.opacity = '';
          _pdDragging = false; _pdPlaceholder = null;
          this._renderTracks();
        });
        container.appendChild(btn);
      }

      // "+" add-track button always at end
      const addBtn = document.createElement('button');
      addBtn.className = 'mob-track-btn';
      addBtn.style.cssText = 'border-style:dashed;border-color:var(--bg-disabled);color:var(--text-dim);font-size:18px;';
      addBtn.textContent = '+';
      addBtn.addEventListener('click', () => {
        const rect = addBtn.getBoundingClientRect();
        showContextMenu(rect.left, rect.bottom + 4, [
          { label: 'LEAD  (Pulse)',    action: () => { const t = addTrack('pulse50',  'LEAD');  addPattern(t.id, 0, this.numBars); this.activeTrackId = t.id; this._renderTracks(); this._renderGrid(); } },
          { label: 'HARMONY (Pulse)', action: () => { const t = addTrack('pulse25',  'HARM');  addPattern(t.id, 0, this.numBars); this.activeTrackId = t.id; this._renderTracks(); this._renderGrid(); } },
          { label: 'BASS  (Triangle)',action: () => { const t = addTrack('triangle', 'BASS');  addPattern(t.id, 0, this.numBars); this.activeTrackId = t.id; this._renderTracks(); this._renderGrid(); } },
          { label: 'CHORD',           action: () => { const t = addTrack('chord',    'CHORD'); addPattern(t.id, 0, this.numBars); this.activeTrackId = t.id; this._renderTracks(); this._renderGrid(); } },
          { label: 'NOISE / DRUMS',   action: () => { const t = addTrack('noise',    'DRUMS'); addPattern(t.id, 0, this.numBars); this.activeTrackId = t.id; this._renderTracks(); this._renderGrid(); } },
          { label: 'DRUMS (PCM7)',    action: () => { const t = addTrack('pcm7',     'DRUMS'); addPattern(t.id, 0, this.numBars); this.activeTrackId = t.id; this._renderTracks(); this._renderGrid(); } },
        ]);
      });
      container.appendChild(addBtn);

      // If no active track, pick first
      if (!this.activeTrackId && ProjectState.tracks.length > 0) {
        this.activeTrackId = ProjectState.tracks[0].id;
        this._renderTracks();
      }
    },

    _renderGrid() {
      const container = document.getElementById('mob-grid');
      if (!container) return;
      container.innerHTML = '';
      const track = ProjectState.tracks.find(t => t.id === this.activeTrackId);
      const steps = this._getSteps();
      const color = track ? ((typeof PR !== 'undefined' && PR.NOTE_COLORS && PR.NOTE_COLORS[track.channelType]) || '#ff6973') : '#ff6973';

      for (let i = 0; i < 16; i++) {
        const btn = document.createElement('button');
        btn.className = 'mob-step' + (steps[i] ? ' on' : '');
        btn.dataset.step = i;
        if (steps[i]) {
          btn.style.background = color;
        } else {
          btn.style.background = '';
        }
        // Beat marker (every 4 steps = 1 beat)
        if (i % 4 === 0) {
          const marker = document.createElement('div');
          marker.className = 'mob-step-beat-marker';
          marker.textContent = (i / 4 + 1);
          btn.appendChild(marker);
        }
        // Velocity indicator
        if (steps[i]) {
          const vel = steps[i].velocity || 100;
          const bars = vel >= 90 ? '▮▮▮' : vel >= 55 ? '▮▮' : '▮';
          const velEl = document.createElement('div');
          velEl.className = 'mob-step-vel';
          velEl.textContent = bars;
          btn.appendChild(velEl);
        }

        // Touch/pointer events for tap + long press
        let pressTimer = null;
        let didLongPress = false;

        btn.addEventListener('pointerdown', (e) => {
          ensureAudioCtxRunning();
          didLongPress = false;
          pressTimer = setTimeout(() => {
            didLongPress = true;
            if (steps[i]) {
              this._openVelPicker(i, steps[i].velocity || 100, e);
            }
          }, 500);
        });

        btn.addEventListener('pointerup', () => {
          clearTimeout(pressTimer);
          if (!didLongPress) {
            this._toggleStep(i);
          }
        });

        btn.addEventListener('pointercancel', () => {
          clearTimeout(pressTimer);
        });

        container.appendChild(btn);
      }

      // Restore active step highlight
      if (this._lastActiveStep >= 0) {
        const el = container.querySelector('[data-step="' + this._lastActiveStep + '"]');
        if (el) el.classList.add('active-step');
      }
    },

    _renderKeyboard() {
      const wrap = document.getElementById('mob-keyboard-wrap');
      if (!wrap) return;
      wrap.innerHTML = '';

      const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
      const BLACK_NOTES = new Set([1, 3, 6, 8, 10]); // C#, D#, F#, G#, A#

      // Build keys from MIDI 36 (C2) to 83 (B5)
      const keys = [];
      for (let midi = 36; midi <= 83; midi++) {
        const pc = midi % 12;
        const isBlack = BLACK_NOTES.has(pc);
        keys.push({ midi, pc, isBlack });
      }

      // Do NOT set minWidth on wrap — it inflates parent layout and breaks grid width.
      // The inner container is wider than the wrap; overflow-x:auto handles scrolling.
      wrap.style.minWidth = '';

      // Use a flex row with relative positioning tricks
      // Simpler: render all as inline blocks with margin adjustments
      const container = document.createElement('div');
      container.style.cssText = 'position:relative; display:flex; flex-direction:row; align-items:flex-end; height:48px; flex-shrink:0; width:max-content;';
      wrap.appendChild(container);

      for (const key of keys) {
        const btn = document.createElement('button');
        btn.className = 'mob-piano-key ' + (key.isBlack ? 'black-key' : 'white-key');
        btn.dataset.midi = key.midi;
        if (key.midi === this.currentPitch) btn.classList.add('active-pitch');
        if (!key.isBlack && key.pc === 0) {
          const label = document.createElement('span');
          label.textContent = NOTE_NAMES[0] + Math.floor(key.midi / 12 - 1);
          btn.appendChild(label);
        }
        btn.addEventListener('click', () => {
          this.currentPitch = key.midi;
          document.getElementById('mob-pitch-label').textContent = NOTE_NAMES[key.pc] + Math.floor(key.midi / 12 - 1);
          // Update active key highlight
          wrap.querySelectorAll('.mob-piano-key').forEach(k => k.classList.remove('active-pitch'));
          btn.classList.add('active-pitch');
          // Preview
          const track = ProjectState.tracks.find(t => t.id === this.activeTrackId);
          if (track) {
            ensureAudioCtxRunning().then(ctx => {
              try {
                const fakeNote = { pitch: key.midi, duration: 1/16, velocity: 100 };
                playNote(track, fakeNote, ctx.currentTime + 0.01);
              } catch (e) { /* silent */ }
            });
          }
          this._renderGrid();
        });
        container.appendChild(btn);
      }

      // Scroll to show currentPitch
      setTimeout(() => {
        const activeBtn = wrap.querySelector('.active-pitch');
        if (activeBtn) {
          activeBtn.scrollIntoView({ behavior: 'instant', block: 'nearest', inline: 'center' });
        }
      }, 50);
    },

    _renderBarDots() {
      const container = document.getElementById('mob-bar-dots');
      if (!container) return;
      container.innerHTML = '';
      for (let i = 0; i < this.numBars; i++) {
        const dot = document.createElement('div');
        dot.className = 'mob-bar-dot' + (i === this.currentBar ? ' active' : '');
        dot.addEventListener('click', () => {
          this.currentBar = i;
          this._renderBarDots();
          this._renderGrid();
        });
        container.appendChild(dot);
      }
    },

    _openVelPicker(stepIdx, currentVel, pointerEvent) {
      this._velPickerStep = stepIdx;
      const picker = document.getElementById('mob-vel-picker');
      const slider = document.getElementById('mob-vel-slider');
      slider.value = currentVel;
      document.getElementById('mob-vel-picker-label').textContent = 'VELOCITY: ' + currentVel;

      // Position near the pointer
      const x = Math.min(pointerEvent.clientX, window.innerWidth - 160);
      const y = Math.max(pointerEvent.clientY - 120, 8);
      picker.style.left = x + 'px';
      picker.style.top = y + 'px';
      picker.classList.add('open');
    },

    _closeVelPicker() {
      this._velPickerStep = null;
      document.getElementById('mob-vel-picker').classList.remove('open');
    },

    _startRaf() {
      if (this._rafId) return;
      const tick = () => {
        if (!this.isMobile()) { this._rafId = null; return; }
        // Update playhead
        if (typeof Sequencer !== 'undefined' && Sequencer._playing) {
          const bar = ProjectState.playheadBar;
          const relBar = ((bar % this.numBars) - this.currentBar);
          const pct = Math.max(0, Math.min(100, relBar * 100));
          const fill = document.getElementById('mob-playhead-fill');
          if (fill) fill.style.width = pct + '%';

          // Active step highlight
          const barFraction = bar - Math.floor(bar / this.numBars) * this.numBars;
          const activeStep = (barFraction >= this.currentBar && barFraction < this.currentBar + 1)
            ? Math.floor((barFraction - this.currentBar) * 16)
            : -1;

          if (activeStep !== this._lastActiveStep) {
            const grid = document.getElementById('mob-grid');
            if (grid) {
              if (this._lastActiveStep >= 0) {
                const prev = grid.querySelector('[data-step="' + this._lastActiveStep + '"]');
                if (prev) prev.classList.remove('active-step');
              }
              if (activeStep >= 0 && activeStep < 16) {
                const cur = grid.querySelector('[data-step="' + activeStep + '"]');
                if (cur) cur.classList.add('active-step');
              }
            }
            this._lastActiveStep = activeStep;
          }
        } else {
          // Not playing — clear playhead
          const fill = document.getElementById('mob-playhead-fill');
          if (fill && fill.style.width !== '0%') {
            fill.style.width = '0%';
          }
          if (this._lastActiveStep >= 0) {
            const grid = document.getElementById('mob-grid');
            if (grid) {
              const prev = grid.querySelector('[data-step="' + this._lastActiveStep + '"]');
              if (prev) prev.classList.remove('active-step');
            }
            this._lastActiveStep = -1;
          }
        }
        this._rafId = requestAnimationFrame(tick);
      };
      this._rafId = requestAnimationFrame(tick);
    },

    _stopRaf() {
      if (this._rafId) {
        cancelAnimationFrame(this._rafId);
        this._rafId = null;
      }
    },

    _showToast(msg) {
      const toast = document.getElementById('mob-toast');
      if (!toast) return;
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(this._toastTimer);
      this._toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
    },

    _hideToast() {
      const t = document.getElementById('mob-toast');
      if (t) t.classList.remove('show');
    },

    async _shareAudio() {
      this._showToast('RENDERING... 0%');
      try {
        const buf = await ExportEngine.renderOffline(p => this._showToast('RENDERING... ' + Math.round(p * 100) + '%'));
        const wavData = ExportEngine.encodeWAV(buf);
        const fileName = 'nesforge-' + Date.now() + '.wav';

        // Dismiss rendering toast before opening share sheet
        this._hideToast();

        // Try Web Share API (requires HTTPS — will fail on file://)
        let shared = false;
        if (window.location.protocol === 'https:' &&
            navigator.canShare &&
            typeof navigator.share === 'function') {
          try {
            const wavBlob = new Blob([wavData], { type: 'audio/wav' });
            const file = new File([wavBlob], fileName, { type: 'audio/wav' });
            if (navigator.canShare({ files: [file] })) {
              await navigator.share({ files: [file], title: 'NESForge Track' });
              shared = true;
            }
          } catch(shareErr) {
            if (shareErr.name === 'AbortError') return; // user cancelled — do nothing
            // Any other error: fall through to download
          }
        }

        if (!shared) {
          // Fall back to download + explain why
          ExportEngine.downloadBlob(wavData, fileName, 'audio/wav');
          if (window.location.protocol !== 'https:') {
            this._showToast('OPEN VIA HTTPS TO SHARE DIRECTLY');
          } else {
            this._showToast('SAVED — CHECK YOUR DOWNLOADS');
          }
        }

      } catch (err) {
        if (err && err.name === 'AbortError') return;
        this._showToast('ERROR: ' + (err && err.message ? err.message.substring(0, 30) : 'RENDER FAILED'));
        console.error('Share audio error:', err);
      }
    }
  };

  function stepByScale(pitch, steps) {
    const inScale = Scales.getInScalePitches(ProjectState.key, ProjectState.scale);
    const scalePitches = [];
    for (let p = 0; p <= 127; p++) {
      if (inScale.has(p % 12)) scalePitches.push(p);
    }
    const snapped = Scales.snapToScale(pitch, ProjectState.key, ProjectState.scale);
    const idx = scalePitches.indexOf(snapped);
    const base = idx === -1 ? 0 : idx;
    const newIdx = Math.max(0, Math.min(scalePitches.length - 1, base + steps));
    return scalePitches[newIdx];
  }

  function _wirePRTopbar() {
    if (!PR._tool) PR._tool = 'default';

    if (PR._stampCount === undefined) PR._stampCount = 4;

        PR._glideDragTarget = null;

    };

    // Sync initial tool if NoteSeq was already engaged (e.g. re-opening panel)
    if (NoteSeq.engaged) PR._tool = 'sequencer';

    document.getElementById('pr-tool-default').onclick = () => setTool('default');
    document.getElementById('pr-tool-stamp').onclick   = () => setTool('stamp');
    document.getElementById('pr-tool-noteseq').onclick   = () => setTool(PR._tool === 'sequencer' ? 'default' : 'sequencer');
    document.getElementById('pr-tool-glide').onclick   = () => setTool(PR._tool === 'glide' ? 'default' : 'glide');

    // LEN select — sets _stampDuration so single-note placement also benefits

    document.getElementById('pr-stamp-pitch-up').onclick = () => { PR._stampPitchDelta = Math.min(24,  PR._stampPitchDelta + 1); pitchEl.textContent = PR._stampPitchDelta; };

    // INTERVAL select
    const intSel = document.getElementById('pr-stamp-interval');

  function _wire() {
    const el = document.getElementById('prog-builder-content');
    if (!el) return;

    document.getElementById('pb-close').onclick = close;

    const keyEl = document.getElementById('pb-key');
    if (keyEl) keyEl.onchange = () => {
      ProjectState.key = keyEl.value;
      const ks = document.getElementById('key-sel');
      if (ks) ks.value = keyEl.value;
      _render();
    };
    const scaleEl = document.getElementById('pb-scale');
    if (scaleEl) scaleEl.onchange = () => {
      ProjectState.scale = scaleEl.value;
      const ss = document.getElementById('scale-sel');
      if (ss) ss.value = scaleEl.value;
      _render();
    };
    const _pbSetBpm = (val) => {
      val = Math.max(40, Math.min(300, Math.round(val) || 120));
      ProjectState.bpm = val;
      const disp = document.getElementById('pb-bpm-display');
      if (disp) disp.textContent = val;
      const bd = document.getElementById('bpm-display');
      if (bd) bd.textContent = val;
      const bi = document.getElementById('bpm-input');
      if (bi) bi.value = val;
      if (typeof Sequencer !== 'undefined') Sequencer.updateTiming();
    };
    document.getElementById('pb-bpm-up').onclick   = () => _pbSetBpm(ProjectState.bpm + 1);
    document.getElementById('pb-bpm-down').onclick = () => _pbSetBpm(ProjectState.bpm - 1);
    const pbDisp = document.getElementById('pb-bpm-display');
    pbDisp.addEventListener('wheel', (e) => {
      e.preventDefault();
      _pbSetBpm(ProjectState.bpm + (e.deltaY > 0 ? 1 : -1));
    }, { passive: false });
    pbDisp.addEventListener('click', () => {
      let popup = document.getElementById('pb-bpm-popup');
      if (popup) { popup.remove(); return; }
      popup = document.createElement('div');
      popup.id = 'pb-bpm-popup';
      popup.className = 'modal modal--sm';
      const anchor = pbDisp.getBoundingClientRect();
      popup.style.cssText = `position:fixed;left:${anchor.left}px;top:${anchor.bottom+4}px;z-index:9000;display:flex;flex-direction:column;align-items:center;gap:6px;`;
      const inp = document.createElement('input');
      inp.type = 'text'; inp.inputMode = 'numeric'; inp.value = ProjectState.bpm;
      inp.className = 'field-input';
      inp.style.cssText = 'width:64px;text-align:center;outline:none;';
      const lbl = document.createElement('div');
      lbl.className = 'modal-label';
      lbl.textContent = 'BPM';
      const confirm = (v) => { const n = parseInt(v,10); if (!isNaN(n)) _pbSetBpm(n); popup.remove(); };
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') confirm(inp.value);
        if (e.key === 'Escape') popup.remove();
      });
      popup.appendChild(lbl); popup.appendChild(inp);
      document.body.appendChild(popup); inp.select();
      setTimeout(() => document.addEventListener('mousedown', function _dismiss(ev) {
        if (!popup.contains(ev.target) && ev.target !== pbDisp) { confirm(inp.value); document.removeEventListener('mousedown', _dismiss); }
      }), 100);
    });

    const presetSel = document.getElementById('pb-preset-sel');
    if (presetSel) presetSel.onchange = () => {
      const pi = parseInt(presetSel.value);
      if (pi >= 0) { _steps = PB_PRESETS[pi].steps.map(s=>({...s})); _render(); }
    };

    el.querySelectorAll('.pb-step-deg').forEach(sel=>{
      sel.onchange = ()=>{
        const i = parseInt(sel.dataset.si);
        _steps[i].d = parseInt(sel.value);
        const stepEl = sel.closest('.pb-step');
        const lbl = stepEl?.querySelector('.pb-step-label');
        if (lbl) lbl.textContent = DEGREE_NAMES[_steps[i].d];
        const chords = ChordTool.getDiatonicChords(
          ProjectState.key, ProjectState.scale);
        const chordEl = stepEl?.querySelector('.pb-step-chord');
        if (chordEl) chordEl.textContent =
          chords[_steps[i].d % chords.length]?.triad?.name || '';
      };
    });

    el.querySelectorAll('.pb-step-dur').forEach(btn=>{
      btn.onclick = ()=>{
        const i = parseInt(btn.dataset.si);
        _steps[i].b = parseInt(btn.dataset.dur);
        btn.closest('.pb-step').querySelectorAll('.pb-step-dur')
          .forEach(b=>b.classList.toggle('on',
            parseInt(b.dataset.dur)===_steps[i].b));
        const tot = document.querySelector('.pb-total');
        if (tot) tot.textContent = `TOTAL: ${_total()} BARS`;
      };
    });

    el.querySelectorAll('.pb-step-del').forEach(btn=>{
      btn.onclick = ()=>{
        if (_steps.length>1){ _steps.splice(parseInt(btn.dataset.si),1);
          _render(); }
      };
    });

    const addBtn = document.getElementById('pb-add-step');
    if (addBtn) addBtn.onclick = ()=>{
      if (_steps.length<16){ _steps.push({d:0,b:1}); _render(); }
    };

    el.querySelectorAll('.pb-voicing').forEach(btn=>{
      btn.onclick = ()=>{ _voicing=btn.dataset.v; _render(); };
    });
    el.querySelectorAll('.pb-arp').forEach(btn=>{
      btn.onclick = ()=>{ _arpPat=btn.dataset.a; _render(); };
    });
    el.querySelectorAll('.pb-bass').forEach(btn=>{
      btn.onclick = ()=>{ _bass=btn.dataset.b; _render(); };
    });
    el.querySelectorAll('.pb-rep').forEach(btn=>{
      btn.onclick = ()=>{
        _repeat=parseInt(btn.dataset.r);
        el.querySelectorAll('.pb-rep').forEach(b=>
          b.classList.toggle('on',parseInt(b.dataset.r)===_repeat));
        const tot = document.querySelector('.pb-total');
        if (tot) tot.textContent = `TOTAL: ${_total()} BARS`;
      };
    });

    document.getElementById('pb-save-lib').onclick = _saveToLib;
    document.getElementById('pb-export-btn').onclick = ()=>
      _exportNFPROG({nfprog:1,steps:_steps,voicing:_voicing,
        bass:_bass,repeat:_repeat,key:ProjectState.key,
        scale:ProjectState.scale},'progression.nfprog');

    const importBtn = document.getElementById('pb-import-btn');
    const importInp = document.getElementById('pb-import-input');
    importBtn.onclick = ()=>importInp.click();
    importInp.onchange = e=>{
      if(e.target.files[0]) _importNFPROG(e.target.files[0]);
    };

    el.querySelectorAll('.pb-lib-load').forEach(btn=>{
      btn.onclick=()=>_loadFromLib(_libLoad()[parseInt(btn.dataset.li)]);
    });
    el.querySelectorAll('.pb-lib-exp').forEach(btn=>{
      btn.onclick=()=>{
        const e=_libLoad()[parseInt(btn.dataset.li)];
        _exportNFPROG({nfprog:1,...e},
          (e.name||'progression').replace(/\s+/g,'_')+'.nfprog');
      };
    });
    el.querySelectorAll('.pb-lib-del').forEach(btn=>{
      btn.onclick=()=>{
        if(confirm('Delete this progression?'))
          _deleteFromLib(parseInt(btn.dataset.li));
      };
    });

    document.getElementById('pb-gen-bass').onchange = e => {
      _genTracks.bass = e.target.checked; _refreshGenerateBtn(); };
    document.getElementById('pb-gen-chords').onchange = e => {
      _genTracks.chords = e.target.checked; _refreshGenerateBtn(); };
    document.getElementById('pb-gen-lead').onchange = e => {
      _genTracks.lead = e.target.checked; _refreshGenerateBtn(); };
    el.querySelectorAll('.pb-lead-sty').forEach(btn => {
      btn.onclick = () => { _leadStyle = btn.dataset.ls; _render(); };
    });
    document.getElementById('pb-generate').onclick = _generate;
  }

  function _refreshGenerateBtn() {
    const btn = document.getElementById('pb-generate');
    if (!btn) return;
    const anyOn = _genTracks.bass || _genTracks.chords || _genTracks.lead;
    btn.disabled = !anyOn;
    btn.style.opacity = anyOn ? '1' : '0.4';
    btn.style.cursor  = anyOn ? 'pointer' : 'not-allowed';
  }

  function _generate() {
    if (_ctx==='topbar') {
      const trackList = [
        _genTracks.bass   && 'BASS',
        _genTracks.chords && 'CHORDS',
        _genTracks.lead   && 'LEAD SLOT',
      ].filter(Boolean).join(', ');
      if (!confirm(`Add ${trackList} track(s) to your project?`)) return;
    }

    const chords = ChordTool.getDiatonicChords(
      ProjectState.key, ProjectState.scale);
    const totalBars = _total();

    const timeline = [];
    let cursor = 0;
    for (let rep=0; rep<_repeat; rep++) {
      for (const step of _steps) {
        const ch = chords[step.d % chords.length];
        const chordNotes = _voicing==='seventh'
          ? ch.seventh.notes : ch.triad.notes;
        timeline.push({
          chordNotes, rootMidi: chordNotes[0],
          startBar: cursor, durBars: step.b
        });
        cursor += step.b;
      }
    }

    // BASS track (Triangle)
    if (_genTracks.bass) {
      const bassTrack = addTrack('triangle','BASS');
      const bassPat   = addPattern(bassTrack.id, 0, totalBars);
      for (const seg of timeline) {
        let root = seg.rootMidi - 12;
        while (root > 48) root -= 12;
        while (root < 24) root += 12;
        const fifth = Math.min(127, root+7);
        const step  = _bass==='eighth' ? 0.125 : 0.25;
        const beats = Math.round(seg.durBars / step);
        for (let k=0; k<beats; k++) {
          const start = seg.startBar + k*step;
          if (start >= totalBars) break;
          const pitch = _bass==='rootfifth'
            ? (k%2===0 ? root : fifth) : root;
          bassPat.notes.push({id:makeId(), pitch, start,
            duration:step*0.9, velocity:90, selected:false});
        }
      }
    }

    // CHORD track (Pulse 50%)
    if (_genTracks.chords) {
      const chordTrack = addTrack('pulse50','CHORDS');
      const chordPat   = addPattern(chordTrack.id, 0, totalBars);
      for (const seg of timeline) {
        if (_voicing==='arpeggio') {
          const base = seg.chordNotes.slice();
          const withOct = [...base, base[0]+12];
          let seq;
          if (_arpPat==='up')     seq = withOct;
          else if (_arpPat==='down')   seq = [...withOct].reverse();
          else if (_arpPat==='updown') seq = [
            ...withOct, ...withOct.slice(1,-1).reverse()];
          else seq = [...withOct].sort(()=>Math.random()-0.5);
          const sixteenth = 0.0625;
          const count = Math.round(seg.durBars / sixteenth);
          for (let k=0; k<count; k++) {
            const start = seg.startBar + k*sixteenth;
            if (start >= totalBars) break;
            chordPat.notes.push({id:makeId(),
              pitch: seq[k%seq.length], start,
              duration: sixteenth*0.9, velocity:85, selected:false});
          }
        } else {
          for (const pitch of seg.chordNotes) {
            chordPat.notes.push({id:makeId(), pitch,
              start: seg.startBar,
              duration: seg.durBars - 0.0625,
              velocity:85, selected:false});
          }
        }
      }
    }

    // LEAD track (Pulse 25%)
    if (_genTracks.lead) {
      const leadTrack = addTrack('pulse25', 'LEAD');
      const leadPat   = addPattern(leadTrack.id, 0, totalBars);

      // Build sorted list of in-scale MIDI pitches in NES lead range C3–C6
      const inScale = Scales.getInScalePitches(ProjectState.key, ProjectState.scale);
      const scalePitches = [];
      for (let p = 48; p <= 84; p++) {
        if (inScale.has(p % 12)) scalePitches.push(p);
      }
      if (scalePitches.length === 0) {
        for (let p = 48; p <= 84; p++) scalePitches.push(p);
      }

      function nearestScale(target) {
        return scalePitches.reduce((best, p) =>
          Math.abs(p - target) < Math.abs(best - target) ? p : best,
          scalePitches[0]);
      }
      function scaleAt(idx) {
        return scalePitches[Math.max(0, Math.min(scalePitches.length - 1, idx))];
      }

      if (_leadStyle === 'scale') {
        // Ascending/descending ping-pong at 8th notes
        const step = 0.125;
        const totalSteps = Math.round(totalBars / step);
        const halfLen = scalePitches.length;
        const cycle = halfLen > 1 ? (halfLen - 1) * 2 : 1;
        for (let k = 0; k < totalSteps; k++) {
          const start = k * step;
          if (start >= totalBars) break;
          const pos = k % cycle;
          const idx = pos < halfLen ? pos : cycle - pos;
          leadPat.notes.push({ id: makeId(),
            pitch: scalePitches[idx], start,
            duration: step * 0.85, velocity: 85, selected: false });
        }

      } else if (_leadStyle === 'chord-melody') {
        // Chord tone on downbeats, scale passing tones between
        for (const seg of timeline) {
          const chordTones = seg.chordNotes.map(n => nearestScale(n));
          const rootTone  = chordTones[0];
          const thirdTone = chordTones[1] || rootTone;
          const beats = seg.durBars * 4; // 16th note steps
          for (let k = 0; k < beats; k++) {
            if (k % 2 !== 0) continue; // only 8th notes
            const start = seg.startBar + k * 0.0625;
            if (start >= totalBars) break;
            let pitch;
            if (k === 0) {
              pitch = rootTone;
            } else if (k % 4 === 0) {
              pitch = k % 8 === 0 ? rootTone : thirdTone;
            } else {
              const prevTone = k % 4 <= 2 ? rootTone : thirdTone;
              const nextTone = k % 4 <= 2 ? thirdTone : rootTone;
              const prevIdx  = scalePitches.indexOf(prevTone);
              const nextIdx  = scalePitches.indexOf(nextTone);
              const base     = prevIdx === -1 ? Math.floor(scalePitches.length / 2) : prevIdx;
              const dir      = nextIdx > prevIdx ? 1 : -1;
              pitch = scaleAt(base + dir * (k % 4));
            }
            leadPat.notes.push({ id: makeId(), pitch, start,
              duration: 0.1, velocity: 90, selected: false });
          }
        }

      } else if (_leadStyle === 'riff') {
        // 4-note motif transposed to each chord root
        const motifIntervals = [0, 2, -1, 3];
        const motifRhythm    = [0.125, 0.125, 0.0625, 0.1875];
        for (const seg of timeline) {
          const anchorPitch = nearestScale(seg.rootMidi);
          const anchorIdx   = scalePitches.indexOf(anchorPitch);
          const base = anchorIdx === -1
            ? Math.floor(scalePitches.length / 2) : anchorIdx;
          let cursor = seg.startBar;
          while (cursor < seg.startBar + seg.durBars - 0.001) {
            for (let m = 0; m < motifIntervals.length; m++) {
              if (cursor >= seg.startBar + seg.durBars) break;
              if (cursor >= totalBars) break;
              leadPat.notes.push({ id: makeId(),
                pitch: scaleAt(base + motifIntervals[m]),
                start: cursor,
                duration: motifRhythm[m] * 0.85,
                velocity: m === 0 ? 100 : 80,
                selected: false });
              cursor += motifRhythm[m];
            }
          }
        }

      } else { // 'random'
        // Stepwise random walk with occasional leaps
        let idx = Math.floor(scalePitches.length * 0.4);
        const rhythmPool = [0.0625, 0.0625, 0.125, 0.125, 0.125, 0.25];
        let cursor = 0;
        while (cursor < totalBars - 0.001) {
          const dur   = rhythmPool[Math.floor(Math.random() * rhythmPool.length)];
          const leap  = Math.random() < 0.15;
          const steps = leap
            ? (Math.random() < 0.5 ? 3 : -3)
            : (Math.random() < 0.5 ? 1 : -1);
          idx = Math.max(0, Math.min(scalePitches.length - 1, idx + steps));
          leadPat.notes.push({ id: makeId(),
            pitch: scalePitches[idx], start: cursor,
            duration: dur * 0.8,
            velocity: 75 + Math.floor(Math.random() * 20),
            selected: false });
          cursor += dur;
        }
      }
    }

    // Set loop region
    ProjectState.loopStart   = 0;
    ProjectState.loopEnd     = totalBars;
    ProjectState.loopEnabled = true;
    const lb = document.getElementById('btn-loop');
    if (lb) lb.style.color = '';

    AV.resize(); AV.draw();
    close();
  }

  function openStartup() {
    _ctx = 'startup';
    document.getElementById('prog-startup-modal')?.classList.add('open');
  }
  function openTopbar() {
    _ctx = 'topbar';
    document.getElementById('prog-startup-modal')?.classList.remove('open');
    _render();
    document.getElementById('prog-builder-modal')?.classList.add('open');
  }
  function close() {
    document.getElementById('prog-startup-modal')?.classList.remove('open');
    document.getElementById('prog-builder-modal')?.classList.remove('open');
  }

  return { openStartup, openTopbar, close };
})();

  window.addEventListener('DOMContentLoaded', () => {

      ProjectState.tracks = [];

    requestAnimationFrame(() => { AV.resize(); AV.draw(); });

      MobileUI.checkLayout();

    });

      window.visualViewport.addEventListener('resize', () => {
        MobileUI.checkLayout();

        if (MobileUI.isMobile()) { requestAnimationFrame(() => { MobileUI._renderGrid(); MobileUI._renderTracks(); }); }
      });
    }

    // iOS Web Audio unlock — must create AudioContext AND play audio SYNCHRONOUSLY
    // inside a real user gesture. Show overlay on touch devices only.
    (function() {
      var overlay  = document.getElementById('audio-unlock-overlay');
      var statusEl = document.getElementById('auo-status');
      var promptEl = document.getElementById('auo-prompt');
      var _unlocked = false;

      function _setStatus(msg, color) {
        if (statusEl) { statusEl.textContent = msg; statusEl.style.color = color || 'var(--text-dim)'; }
      }

      function _syncUnlock() {
        if (_unlocked) return;
        _unlocked = true;
        _setStatus('Unlocking audio...', 'var(--text)');
        if (promptEl) promptEl.style.animationName = 'none';

        try {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          audioCtx.resume();

          // Play audible beep — confirms audio unlock AND tests device audio output
          var osc = audioCtx.createOscillator();
          var g   = audioCtx.createGain();
          osc.frequency.value = 523.25; // C5
          g.gain.setValueAtTime(0.3, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
          osc.connect(g);
          g.connect(audioCtx.destination);
          osc.start(audioCtx.currentTime);
          osc.stop(audioCtx.currentTime + 0.25);
          getMasterGain();

          _setStatus('state: ' + audioCtx.state, '#aaaacc');

          // Watch for context to actually run
          var _watch = setInterval(function() {
            if (!audioCtx) { clearInterval(_watch); return; }
            _setStatus('state: ' + audioCtx.state + ' | t=' + audioCtx.currentTime.toFixed(3), '#aaaacc');
            if (audioCtx.state === 'running') {
              clearInterval(_watch);
              _setStatus('AUDIO OK', '#00ccaa');
              setTimeout(function() {
                if (overlay) overlay.style.display = 'none';
              }, 400);
            }
          }, 100);

          // Dismiss anyway after 3s even if state never updates
          setTimeout(function() {
            clearInterval(_watch);
            if (overlay) overlay.style.display = 'none';
          }, 3000);

        } catch(e) {
          _setStatus('Error: ' + e.message, 'var(--accent)');
        }
      }

      // Show overlay only on touch devices
      if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        if (overlay) overlay.style.display = 'flex';
        overlay.addEventListener('touchend', function(e) {
          e.preventDefault();
          _syncUnlock();
        }, { passive: false });
        overlay.addEventListener('click', _syncUnlock);
      }

      // Re-unlock on every gesture in case iOS suspends after interruption
      function _relock() {
        if (!audioCtx) return;
        if (audioCtx.state !== 'running') {
          audioCtx.resume();
          try {
            var buf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
            var src = audioCtx.createBufferSource();
            src.buffer = buf; src.connect(audioCtx.destination); src.start(0);
          } catch(e) {}
        }
      }
      document.addEventListener('touchstart', _relock, { capture: true, passive: true });
      document.addEventListener('touchend',   _relock, { capture: true, passive: true });
      document.addEventListener('click',      _relock, { capture: true, passive: true });
    })();
    document.getElementById('btn-prog').onclick = () => ProgBuilder.openTopbar();

    // MOVE / CUT tool toggle
    const _setAvTool = (tool) => {
      AV._avTool = tool;
      document.getElementById('btn-av-move').classList.toggle('btn--engaged', tool === 'move');
      document.getElementById('btn-av-cut').classList.toggle('btn--engaged', tool === 'cut');
    };
    document.getElementById('btn-av-move').onclick = () => _setAvTool('move');
    document.getElementById('btn-av-cut').onclick  = () => _setAvTool('cut');
    requestAnimationFrame(() => ProgBuilder.openStartup());
  });

  </script>
