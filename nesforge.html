// MODULE: DPCMSampler
// ============================================================
const DPCMSampler = {
  TARGET_RATE:  8000,
  MAX_DURATION: 5,    // seconds
  BIT_DEPTH:    4,

  // ── Internal state ────────────────────────────────────────
  _targetTrack:    null,
  _rawSamples:     null,
  _rawRate:        0,
  _trimStart:      0,
  _trimEnd:        1,
  _bitDepth:       4,
  _filter:         'lo',
  _recording:      false,
  _stream:         null,
  _recInterval:    null,
  _recStart:       0,
  _stopFn:         null,
  _recordedChunks: null,
  _samplerMode:    'oneshot',
  _targetPad:      null,
  _targetZone:     null,
  _rootNote:       60,

  // ── Public entry point ─────────────────────────────────────
  open(track, name) {
    this._targetTrack  = track || null;
    this._newTrackName = name || 'SAMPLE';
    this._rawSamples   = null;
    this._rawRate      = 0;
    this._trimStart    = 0;
    this._trimEnd      = 1;
    this._bitDepth     = 4;
    this._filter       = 'lo';
    this._recording    = false;
    this._samplerMode  = track ? (track.samplerMode || 'oneshot') : 'oneshot';
    this._targetPad    = null;
    this._targetZone   = null;
    this._rootNote     = 60;
    if (this._stream) {
      this._stream.getTracks().forEach(t => t.stop());
      this._stream = null;
    }
    this._renderSource();
    document.getElementById('nes-sampler-modal').classList.add('open');
  },

  close() {
    if (this._recording) this._stopRecording();
    if (this._stream) {
      this._stream.getTracks().forEach(t => t.stop());
      this._stream = null;
    }
    document.getElementById('nes-sampler-modal').classList.remove('open');
  },

  // ── PHASE A: Source selection ──────────────────────────────
  _renderSource() {
    const el = document.getElementById('nes-sampler-content');
    const modeDesc = {
      oneshot: 'ONE SAMPLE \u00b7 PITCHED ACROSS ALL KEYS',
      pitched: 'MULTIPLE SAMPLES AT SPECIFIC PITCHES \u00b7 BEST QUALITY',
      pads:    'DIFFERENT SAMPLE PER KEY \u00b7 DRUM KIT STYLE'
    };
    el.innerHTML = `
      <div class="nss-title">
        <span>&#9636; NES SAMPLER</span>
        <button class="btn btn--sm btn--danger" id="nss-close">&#x2715;</button>
      </div>

      <div class="nss-section">
        <div class="nss-label">SAMPLE TYPE</div>
        <div style="display:flex;gap:0;">
          ${[['oneshot','ONE SHOT'],['pitched','PITCHED'],['pads','PADS']]
            .map(([v,l],i) => `
            <button class="btn btn--sm nss-mode-tog${this._samplerMode===v?' btn--primary':''}"
              data-mode="${v}"
              style="flex:1;border-radius:0;${i>0?'margin-left:-2px;':''}
                z-index:${this._samplerMode===v?2:1};position:relative;">
              ${l}
            </button>`).join('')}
        </div>
        <div style="font-size:var(--t-xs);color:var(--text-dim);margin-top:var(--space-1);">
          ${modeDesc[this._samplerMode]}
        </div>
      </div>

      <div class="nss-section">
        <div class="nss-label">TARGET</div>
        ${this._buildTargetOptions()}
      </div>

      <div class="nss-section">
        <div class="nss-label">SOURCE</div>
        <div class="nss-row">
          <button class="btn btn--primary" id="nss-mic-btn" style="flex:1;">&#127897; RECORD MIC</button>
          <button class="btn" id="nss-file-btn" style="flex:1;">&#128193; UPLOAD FILE</button>
          <input type="file" id="nss-file-input" accept="audio/*" style="display:none;">
        </div>
      </div>
    `;

    el.querySelectorAll('.nss-mode-tog').forEach(btn => {
      btn.onclick = () => {
        this._samplerMode = btn.dataset.mode;
        this._targetTrack = null;
        this._targetPad   = null;
        this._targetZone  = null;
        this._renderSource();
      };
    });
    this._wireTargetOptions();
    document.getElementById('nss-close').onclick = () => this.close();
    document.getElementById('nss-mic-btn').onclick = () => this._renderRecord();
    document.getElementById('nss-file-btn').onclick =
      () => document.getElementById('nss-file-input').click();
    document.getElementById('nss-file-input').onchange = (e) => {
      if (e.target.files[0]) this._loadFile(e.target.files[0]);
    };
  },

  _buildTargetOptions() {
    const NS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const samplerTracks = ProjectState.tracks.filter(
      t => t.channelType === 'sampler' && t.samplerMode === this._samplerMode);

    if (this._samplerMode === 'oneshot') {
      let html = `<label style="display:flex;align-items:center;gap:var(--space-2);
          margin-bottom:var(--space-1);font-size:var(--t-xs);cursor:pointer;">
          <input type="radio" name="nss-target" value="new"
            ${!this._targetTrack ? 'checked' : ''}>
          NEW ONE SHOT TRACK
        </label>`;
      samplerTracks.forEach(t => {
        html += `<label style="display:flex;align-items:center;gap:var(--space-2);
            margin-bottom:var(--space-1);font-size:var(--t-xs);cursor:pointer;">
            <input type="radio" name="nss-target" value="track-${t.id}"
              ${this._targetTrack?.id === t.id ? 'checked' : ''}>
            REPLACE SAMPLE ON: ${t.name}
          </label>`;
      });
      return html;

    } else if (this._samplerMode === 'pads') {
      const track = this._targetTrack;
      let trackSel = `<div style="margin-bottom:var(--space-2);">
          <span style="font-size:var(--t-xs);color:var(--text-dim);">TRACK: </span>
          <select id="nss-pad-track" style="font-size:var(--t-xs);
            background:var(--bg);color:var(--text);border:1px solid var(--bg3);
            padding:2px 4px;font-family:'Press Start 2P',monospace;">
            <option value="new">+ NEW PAD TRACK</option>
            ${samplerTracks.map(t =>
              `<option value="${t.id}"${this._targetTrack?.id === t.id ? ' selected' : ''}>${t.name}</option>`
            ).join('')}
          </select>
        </div>`;
      let grid = `<div style="display:grid;grid-template-columns:repeat(12,1fr);gap:2px;">`;
      for (let midi = 24; midi <= 47; midi++) {
        const pc = midi % 12;
        const oct = Math.floor(midi / 12) - 1;
        const name = NS[pc];
        const isBlack = [1,3,6,8,10].includes(pc);
        const hasSample = track?.pads?.[midi]?.sample;
        const isSelected = this._targetPad === midi;
        grid += `<button class="btn btn--sm nss-pad-btn" data-midi="${midi}"
            style="padding:2px;min-width:0;font-size:6px;
              ${isBlack ? 'background:var(--bg-deep);color:var(--text-dim);' : ''}
              ${hasSample ? 'border-color:var(--hi);color:var(--hi);' : ''}
              ${isSelected ? 'background:var(--hi);color:var(--bg-deep);border-color:var(--hi);' : ''}"
            title="${name}${oct}">${name}${oct}</button>`;
      }
      grid += '</div>';
      return trackSel + grid;

    } else {
      // PITCHED
      const track = this._targetTrack;
      let trackSel = `<div style="margin-bottom:var(--space-2);">
          <span style="font-size:var(--t-xs);color:var(--text-dim);">TRACK: </span>
          <select id="nss-zone-track" style="font-size:var(--t-xs);
            background:var(--bg);color:var(--text);border:1px solid var(--bg3);
            padding:2px 4px;font-family:'Press Start 2P',monospace;">
            <option value="new">+ NEW PITCHED TRACK</option>
            ${samplerTracks.map(t =>
              `<option value="${t.id}"${this._targetTrack?.id === t.id ? ' selected' : ''}>${t.name}</option>`
            ).join('')}
          </select>
        </div>`;
      const zones = track?.zones || [];
      let zoneList = zones.length === 0
        ? `<div style="font-size:var(--t-xs);color:var(--text-dim);">
             NO ZONES YET \u2014 ADD FIRST SAMPLE BELOW</div>`
        : zones.map((z, i) => {
            const rn = NS[z.rootNote % 12] + Math.floor(z.rootNote / 12);
            return `<div style="display:flex;align-items:center;gap:6px;font-size:var(--t-xs);
                padding:3px 0;color:${this._targetZone === i ? 'var(--hi)' : 'var(--text)'};">
                <span>ZONE ${i+1}: ROOT ${rn}</span>
                <button class="btn btn--sm btn--danger nss-del-zone" data-zi="${i}"
                  style="padding:1px 4px;font-size:6px;">\u00d7</button>
              </div>`;
          }).join('');
      return trackSel +
        `<div style="margin-bottom:var(--space-1);">${zoneList}</div>
         <div style="font-size:var(--t-xs);color:var(--text-dim);">
           + RECORD OR UPLOAD BELOW TO ADD A NEW ZONE</div>`;
    }
  },

  _wireTargetOptions() {
    const el = document.getElementById('nes-sampler-content');

    el.querySelectorAll('input[name="nss-target"]').forEach(radio => {
      radio.onchange = () => {
        const v = radio.value;
        this._targetTrack = v === 'new' ? null
          : ProjectState.tracks.find(t => t.id === v.replace('track-', '')) || null;
      };
    });

    const padTrackSel = document.getElementById('nss-pad-track');
    if (padTrackSel) {
      padTrackSel.onchange = () => {
        const v = padTrackSel.value;
        this._targetTrack = v === 'new' ? null
          : ProjectState.tracks.find(t => t.id === v) || null;
        this._targetPad = null;
        this._renderSource();
      };
    }

    el.querySelectorAll('.nss-pad-btn').forEach(btn => {
      btn.onclick = () => {
        this._targetPad = parseInt(btn.dataset.midi);
        el.querySelectorAll('.nss-pad-btn').forEach(b => {
          const isThis = parseInt(b.dataset.midi) === this._targetPad;
          const hasSample = this._targetTrack?.pads?.[parseInt(b.dataset.midi)]?.sample;
          b.style.background = isThis ? 'var(--hi)' : (hasSample ? '' : '');
          b.style.color = isThis ? 'var(--bg-deep)' : '';
          b.style.borderColor = isThis ? 'var(--hi)' : (hasSample ? 'var(--hi)' : '');
        });
      };
    });

    const zoneTrackSel = document.getElementById('nss-zone-track');
    if (zoneTrackSel) {
      zoneTrackSel.onchange = () => {
        const v = zoneTrackSel.value;
        this._targetTrack = v === 'new' ? null
          : ProjectState.tracks.find(t => t.id === v) || null;
        this._targetZone = null;
        this._renderSource();
      };
    }

    el.querySelectorAll('.nss-del-zone').forEach(btn => {
      btn.onclick = () => {
        const zi = parseInt(btn.dataset.zi);
        if (this._targetTrack?.zones) {
          History.push();
          this._targetTrack.zones.splice(zi, 1);
          this._renderSource();
        }
      };
    });
  },

  // ── PHASE B: Recording ─────────────────────────────────────
  _renderRecord() {
    const el = document.getElementById('nes-sampler-content');
    el.innerHTML = `
      <div class="nss-title">
        <span>&#127897; RECORD</span>
        <button class="btn btn--sm btn--danger" id="nss-close">&#x2715;</button>
      </div>
      <div class="nss-section">
        <div class="nss-label">MIC INPUT LEVEL</div>
        <div class="nss-row">
          <div class="nss-meter"><div class="nss-meter-fill"
            id="nss-level-fill"></div></div>
        </div>
      </div>
      <div class="nss-section">
        <div class="nss-label">RECORDING</div>
        <div style="font-size:var(--t-md);color:var(--text);
          margin-bottom:var(--space-2);" id="nss-rec-time">0.0s / 5.0s</div>
        <div style="height:6px;background:#0a0a1a;
          border:1px solid var(--bg3);border-radius:2px;margin-bottom:var(--space-2);">
          <div id="nss-rec-bar" style="height:100%;width:0%;
            background:var(--accent);transition:none;"></div>
        </div>
        <button class="btn btn--danger btn--full" id="nss-rec-btn">
          <span class="nss-rec-dot"></span>START RECORDING
        </button>
      </div>
      <div class="nss-status" id="nss-rec-status">
        TAP RECORD &mdash; MAX 5 SECONDS
      </div>
      <button class="btn btn--sm" id="nss-back-btn"
        style="margin-top:var(--space-2);">&#8592; BACK</button>
    `;
    document.getElementById('nss-close').onclick  = () => this.close();
    document.getElementById('nss-back-btn').onclick = () => this._renderSource();
    document.getElementById('nss-rec-btn').onclick = () => {
      if (this._recording) this._stopRecording();
      else this._startRecording();
    };
  },

  async _startRecording() {
    if (!navigator.mediaDevices) {
      const s = document.getElementById('nss-rec-status');
      if (s) s.textContent = 'MIC UNAVAILABLE — USE HTTPS OR LOCALHOST';
      return;
    }
    try {
      this._stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch(e) {
      const s = document.getElementById('nss-rec-status');
      if (s) s.textContent = 'MIC ACCESS DENIED: ' +
        e.message.substring(0, 30).toUpperCase();
      return;
    }

    this._recording      = true;
    this._recStart       = Date.now();
    this._recordedChunks = [];
    const ctx      = getAudioCtx();
    this._rawRate   = ctx.sampleRate;
    const src       = ctx.createMediaStreamSource(this._stream);
    const proc      = ctx.createScriptProcessor(4096, 1, 1);
    const analyser  = ctx.createAnalyser();
    analyser.fftSize = 256;
    const levelData = new Uint8Array(analyser.frequencyBinCount);

    proc.onaudioprocess = (e) => {
      if (!this._recording) return;
      this._recordedChunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    };

    src.connect(analyser);
    src.connect(proc);
    proc.connect(ctx.destination);

    const btn = document.getElementById('nss-rec-btn');
    if (btn) btn.innerHTML = '<span class="nss-rec-dot"></span>STOP RECORDING';

    this._stopFn = () => {
      proc.disconnect();
      src.disconnect();
      analyser.disconnect();
    };

    this._recInterval = setInterval(() => {
      if (!this._recording) return;
      const elapsed = (Date.now() - this._recStart) / 1000;

      analyser.getByteFrequencyData(levelData);
      const avg  = levelData.reduce((a, b) => a + b, 0) / levelData.length;
      const fill = document.getElementById('nss-level-fill');
      if (fill) fill.style.width = Math.min(100, (avg / 128) * 100) + '%';

      const timeEl = document.getElementById('nss-rec-time');
      if (timeEl) timeEl.textContent =
        elapsed.toFixed(1) + 's / ' + this.MAX_DURATION.toFixed(1) + 's';

      const bar = document.getElementById('nss-rec-bar');
      if (bar) bar.style.width =
        Math.min(100, (elapsed / this.MAX_DURATION) * 100) + '%';

      if (elapsed >= this.MAX_DURATION) this._stopRecording();
    }, 50);
  },

  _stopRecording() {
    if (!this._recording) return;
    this._recording = false;
    clearInterval(this._recInterval);
    if (this._stopFn) { this._stopFn(); this._stopFn = null; }
    if (this._stream) {
      this._stream.getTracks().forEach(t => t.stop());
      this._stream = null;
    }
    const chunks = this._recordedChunks || [];
    const total  = chunks.reduce((s, b) => s + b.length, 0);
    const full   = new Float32Array(total);
    let off = 0;
    for (const c of chunks) { full.set(c, off); off += c.length; }
    this._rawSamples = full;
    this._renderTrim();
  },

  // ── PHASE C: File loading ──────────────────────────────────
  async _loadFile(file) {
    const el = document.getElementById('nes-sampler-content');
    el.innerHTML = `
      <div class="nss-title"><span>&#9636; NES SAMPLER</span></div>
      <div style="font-size:var(--t-base);color:var(--text-dim);
        padding:var(--space-4);text-align:center;">DECODING AUDIO...</div>
    `;
    try {
      const arrayBuf  = await file.arrayBuffer();
      const ctx       = getAudioCtx();
      const decoded   = await ctx.decodeAudioData(arrayBuf);
      const mono      = new Float32Array(decoded.length);
      for (let ch = 0; ch < decoded.numberOfChannels; ch++) {
        const data = decoded.getChannelData(ch);
        for (let i = 0; i < data.length; i++) mono[i] += data[i];
      }
      if (decoded.numberOfChannels > 1) {
        for (let i = 0; i < mono.length; i++)
          mono[i] /= decoded.numberOfChannels;
      }
      this._rawSamples = mono;
      this._rawRate    = decoded.sampleRate;
      this._renderTrim();
    } catch(e) {
      this._renderSource();
      const content = document.getElementById('nes-sampler-content');
      if (content) content.insertAdjacentHTML('beforeend',
        `<div style="font-size:var(--t-xs);color:var(--accent);
          margin-top:var(--space-2);">
          DECODE FAILED: ${e.message.substring(0, 40).toUpperCase()}
         </div>`);
    }
  },

  // ── PHASE D: Trim + settings (shared by mic and file paths) ──
  _renderTrim() {
    const el = document.getElementById('nes-sampler-content');
    const durSec       = this._rawSamples.length / this._rawRate;
    const trimStartSec = (this._trimStart * durSec).toFixed(2);
    const trimEndSec   = (this._trimEnd   * durSec).toFixed(2);
    const trimDurSec   = ((this._trimEnd - this._trimStart) * durSec).toFixed(2);

    el.innerHTML = `
      <div class="nss-title">
        <span>&#9636; NES SAMPLER</span>
        <button class="btn btn--sm btn--danger" id="nss-close">&#x2715;</button>
      </div>

      <div class="nss-section">
        <div class="nss-label">TRIM SAMPLE
          <span style="color:var(--text-dim);margin-left:8px;">
            ${trimStartSec}s &ndash; ${trimEndSec}s
            (${trimDurSec}s selected)
          </span>
        </div>
        <div class="nss-trim-wrap" id="nss-trim-wrap">
          <canvas class="nss-canvas" id="nss-trim-canvas"></canvas>
          <div class="nss-trim-shade" id="nss-shade-left"></div>
          <div class="nss-trim-shade" id="nss-shade-right"></div>
          <div class="nss-trim-handle" id="nss-handle-start"
            style="left:${this._trimStart * 100}%;"></div>
          <div class="nss-trim-handle" id="nss-handle-end"
            style="left:${this._trimEnd * 100}%;"></div>
        </div>
        <div class="nss-status" id="nss-trim-status">
          DRAG HANDLES TO SET START AND END POINTS
        </div>
      </div>

      <div class="nss-section">
        <div class="nss-label">BIT DEPTH</div>
        <div class="nss-row">
          <button class="btn nss-tog${this._bitDepth === 4 ? ' on' : ''}"
            id="nss-bit-4">4-BIT (NES)</button>
          <button class="btn nss-tog${this._bitDepth === 6 ? ' on' : ''}"
            id="nss-bit-6">6-BIT (LO-FI)</button>
        </div>
      </div>

      <div class="nss-section">
        <div class="nss-label">FILTER SHAPE</div>
        <div class="nss-row">
          <button class="btn nss-tog${this._filter === 'lo'  ? ' on' : ''}"
            id="nss-flt-lo">LO (WARM)</button>
          <button class="btn nss-tog${this._filter === 'mid' ? ' on' : ''}"
            id="nss-flt-mid">MID (NASAL)</button>
          <button class="btn nss-tog${this._filter === 'hi'  ? ' on' : ''}"
            id="nss-flt-hi">HI (BRIGHT)</button>
        </div>
      </div>

      ${this._samplerMode !== 'pads' ? `
      <div class="nss-section">
        <div class="nss-label">ROOT NOTE
          <span style="color:var(--text-dim);margin-left:8px;font-size:var(--t-xs);">
            WHAT NOTE IS THIS RECORDING?
          </span>
        </div>
        <div class="nss-row">
          <select id="nss-root-oct" style="font-size:var(--t-xs);background:var(--bg);
            color:var(--text);border:1px solid var(--bg3);padding:3px 5px;
            font-family:'Press Start 2P',monospace;">
            ${[0,1,2,3,4,5,6,7,8].map(o =>
              `<option value="${o}"${Math.floor(this._rootNote/12)===o?' selected':''}>${o}</option>`
            ).join('')}
          </select>
          <select id="nss-root-pc" style="font-size:var(--t-xs);background:var(--bg);
            color:var(--text);border:1px solid var(--bg3);padding:3px 5px;
            font-family:'Press Start 2P',monospace;">
            ${['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'].map((n,i) =>
              `<option value="${i}"${this._rootNote%12===i?' selected':''}>${n}</option>`
            ).join('')}
          </select>
          <span style="font-size:var(--t-xs);color:var(--hi);" id="nss-root-display">
            ${'ABCDEFG'[0]} <!-- placeholder, set in RAF -->
          </span>
        </div>
      </div>` : ''}

      <div class="nss-row" style="margin-top:var(--space-3);">
        <button class="btn" id="nss-preview-btn" style="flex:1;">
          &#9654; PREVIEW</button>
        <button class="btn btn--primary" id="nss-create-btn" style="flex:2;">
          ${this._samplerMode === 'pads' ? 'ASSIGN PAD' : this._samplerMode === 'pitched' ? 'ADD ZONE' : 'CREATE TRACK'}
        </button>
      </div>
    `;

    requestAnimationFrame(() => {
      this._drawTrimCanvas();
      this._updateShades();
      this._wireTrimHandles();
    });

    document.getElementById('nss-close').onclick = () => this.close();

    document.getElementById('nss-bit-4').onclick = () => {
      this._bitDepth = 4; this._renderTrim(); };
    document.getElementById('nss-bit-6').onclick = () => {
      this._bitDepth = 6; this._renderTrim(); };

    ['lo', 'mid', 'hi'].forEach(f => {
      document.getElementById('nss-flt-' + f).onclick = () => {
        this._filter = f; this._renderTrim(); };
    });

    // Root note selectors (only present for oneshot/pitched modes)
    const _updateRootDisplay = () => {
      const NS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
      const d = document.getElementById('nss-root-display');
      if (d) d.textContent = NS[this._rootNote % 12] + Math.floor(this._rootNote / 12);
    };
    const octSel = document.getElementById('nss-root-oct');
    const pcSel  = document.getElementById('nss-root-pc');
    if (octSel) {
      octSel.onchange = () => {
        this._rootNote = parseInt(octSel.value) * 12 + (this._rootNote % 12);
        _updateRootDisplay();
      };
    }
    if (pcSel) {
      pcSel.onchange = () => {
        this._rootNote = Math.floor(this._rootNote / 12) * 12 + parseInt(pcSel.value);
        _updateRootDisplay();
      };
    }
    _updateRootDisplay();

    document.getElementById('nss-preview-btn').onclick =
      () => this._previewSample();
    document.getElementById('nss-create-btn').onclick =
      () => this._commitSample();
  },

  _drawTrimCanvas() {
    const canvas = document.getElementById('nss-trim-canvas');
    if (!canvas || !this._rawSamples) return;
    canvas.width  = canvas.offsetWidth  || 480;
    canvas.height = canvas.offsetHeight || 80;
    const ctx = canvas.getContext('2d');
    const { width: W, height: H } = canvas;
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);

    const samples = this._rawSamples;
    const step    = samples.length / W;
    ctx.strokeStyle = 'var(--hi-dim, #00b9be)';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const val = samples[Math.floor(x * step)];
      const y   = H / 2 - val * (H / 2 - 2);
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    const sx = this._trimStart * W;
    const ex = this._trimEnd   * W;
    ctx.fillStyle = 'rgba(0,204,170,.12)';
    ctx.fillRect(sx, 0, ex - sx, H);
  },

  _updateShades() {
    const wrap = document.getElementById('nss-trim-wrap');
    if (!wrap) return;
    const sl = document.getElementById('nss-shade-left');
    const sr = document.getElementById('nss-shade-right');
    const hs = document.getElementById('nss-handle-start');
    const he = document.getElementById('nss-handle-end');
    if (!sl || !sr || !hs || !he) return;
    sl.style.left  = '0';
    sl.style.width = (this._trimStart * 100) + '%';
    sr.style.right = '0';
    sr.style.width = ((1 - this._trimEnd) * 100) + '%';
    hs.style.left  = (this._trimStart * 100) + '%';
    he.style.left  = (this._trimEnd   * 100) + '%';
    const durSec = this._rawSamples.length / this._rawRate;
    const selSec = ((this._trimEnd - this._trimStart) * durSec).toFixed(2);
    const status = document.getElementById('nss-trim-status');
    if (status) status.textContent = selSec + 's SELECTED';
  },

  _wireTrimHandles() {
    const wrap = document.getElementById('nss-trim-wrap');
    if (!wrap) return;

    const drag = (handleId, which) => {
      const handle = document.getElementById(handleId);
      if (!handle) return;
      let dragging = false;

      const onMove = (e) => {
        if (!dragging) return;
        const rect    = wrap.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let frac      = (clientX - rect.left) / rect.width;
        frac = Math.max(0, Math.min(1, frac));
        if (which === 'start') {
          this._trimStart = Math.min(frac, this._trimEnd - 0.02);
        } else {
          this._trimEnd = Math.max(frac, this._trimStart + 0.02);
        }
        this._drawTrimCanvas();
        this._updateShades();
      };

      const onUp = () => {
        dragging = false;
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup',   onUp);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend',  onUp);
      };

      handle.addEventListener('mousedown', (e) => {
        dragging = true; e.preventDefault();
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup',   onUp);
      });
      handle.addEventListener('touchstart', (e) => {
        dragging = true; e.preventDefault();
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend',  onUp);
      }, { passive: false });
    };

    drag('nss-handle-start', 'start');
    drag('nss-handle-end',   'end');
  },

  // ── Process and commit ─────────────────────────────────────
  _getProcessedSample() {
    if (!this._rawSamples) return null;
    const start    = Math.floor(this._trimStart * this._rawSamples.length);
    const end      = Math.floor(this._trimEnd   * this._rawSamples.length);
    const slice    = this._rawSamples.slice(start, end);
    const filtered = this._applyFilter(slice, this._rawRate);
    return this.bitcrush(this.downsample(filtered, this._rawRate), this._bitDepth);
  },

  _applyFilter(samples, rate) {
    const out = new Float32Array(samples.length);
    if (this._filter === 'lo') {
      const N = Math.max(1, Math.round(rate / 2000));
      for (let i = 0; i < samples.length; i++) {
        let sum = 0, count = 0;
        for (let k = 0; k < N && i + k < samples.length; k++) {
          sum += samples[i + k]; count++;
        }
        out[i] = sum / count;
      }
    } else if (this._filter === 'mid') {
      const Nlo = Math.max(1, Math.round(rate / 500));
      const Nhi = Math.max(1, Math.round(rate / 4000));
      for (let i = 0; i < samples.length; i++) {
        let loSum = 0, hiSum = 0, loC = 0, hiC = 0;
        for (let k = 0; k < Nlo && i + k < samples.length; k++) {
          loSum += samples[i + k]; loC++;
        }
        for (let k = 0; k < Nhi && i + k < samples.length; k++) {
          hiSum += samples[i + k]; hiC++;
        }
        out[i] = samples[i] - (loSum / loC) * 0.4 + (hiSum / hiC) * 0.2;
      }
    } else {
      // hi — highpass: subtract lowpass
      const N = Math.max(1, Math.round(rate / 1000));
      for (let i = 0; i < samples.length; i++) {
        let sum = 0, count = 0;
        for (let k = 0; k < N && i + k < samples.length; k++) {
          sum += samples[i + k]; count++;
        }
        out[i] = samples[i] - sum / count;
      }
    }
    return out;
  },

  _previewSample() {
    const processed = this._getProcessedSample();
    if (!processed) return;
    const ctx = getAudioCtx();
    const buf = ctx.createBuffer(1, processed.length, this.TARGET_RATE);
    buf.getChannelData(0).set(processed);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start();
    src.stop(ctx.currentTime + processed.length / this.TARGET_RATE + 0.05);
    const btn = document.getElementById('nss-preview-btn');
    if (btn) {
      btn.textContent = '▶ PLAYING...';
      setTimeout(() => {
        if (document.getElementById('nss-preview-btn'))
          document.getElementById('nss-preview-btn').innerHTML = '&#9654; PREVIEW';
      }, (processed.length / this.TARGET_RATE) * 1000 + 100);
    }
  },

  _commitSample() {
    const processed = this._getProcessedSample();
    if (!processed) return;
    History.push();
    const NS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

    if (this._samplerMode === 'pads') {
      let track = this._targetTrack;
      if (!track) {
        track = addTrack('sampler', this._newTrackName || 'PADS');
        track.samplerMode = 'pads';
        addPattern(track.id, 0, 4);
      }
      const padNote = this._targetPad ?? 36;
      if (!track.pads) track.pads = {};
      track.pads[padNote] = {
        sample:   processed,
        rootNote: padNote,
        name:     NS[padNote % 12] + Math.floor(padNote / 12)
      };
      track.sample = processed;
      this.drawWaveform(track);
      EventBus.emit('dpcm:recorded', { track });

    } else if (this._samplerMode === 'pitched') {
      let track = this._targetTrack;
      if (!track) {
        track = addTrack('sampler', this._newTrackName || 'PITCHED');
        track.samplerMode = 'pitched';
        track.zones = [];
        addPattern(track.id, 0, 4);
      }
      if (!track.zones) track.zones = [];
      const root = this._rootNote ?? 60;
      track.zones.push({ sample: processed, rootNote: root, minNote: root - 6, maxNote: root + 6 });
      track.zones.sort((a, b) => a.rootNote - b.rootNote);
      track.sample = processed;
      this.drawWaveform(track);
      EventBus.emit('dpcm:recorded', { track });

    } else {
      // ONE SHOT
      let track = this._targetTrack;
      if (!track) {
        track = addTrack('sampler', this._newTrackName || 'SAMPLE');
        track.samplerMode = 'oneshot';
        addPattern(track.id, 0, 4);
      }
      track.sample    = processed;
      track.rootNote  = this._rootNote ?? 60;
      this.drawWaveform(track);
      EventBus.emit('dpcm:recorded', { track });
    }

    this.close();
    AV.resize();
    AV.draw();
  },

  // ── Helpers (preserved from original) ─────────────────────
  downsample(samples, srcRate) {
    const ratio  = srcRate / this.TARGET_RATE;
    const outLen = Math.floor(samples.length / ratio);
    const out    = new Float32Array(outLen);
    for (let i = 0; i < outLen; i++) {
      out[i] = samples[Math.floor(i * ratio)];
    }
    return out;
  },

  bitcrush(samples, depth) {
    const d      = depth || this.BIT_DEPTH;
    const levels = Math.pow(2, d);
    const out    = new Float32Array(samples.length);
    for (let i = 0; i < samples.length; i++) {
      out[i] = Math.round((samples[i] + 1) * (levels / 2)) / (levels / 2) - 1;
    }
    return out;
  },

  drawWaveform(track) {
    const canvasId = 'waveform-' + track.id;
    const canvas   = document.getElementById(canvasId);
    if (!canvas || !track.sample) return;
    const ctx = canvas.getContext('2d');
    const { width: W, height: H } = canvas;
    ctx.fillStyle = '#46425e';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#ffb0a3';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    const step = track.sample.length / W;
    for (let x = 0; x < W; x++) {
      const val = track.sample[Math.floor(x * step)];
      const y   = H / 2 - val * (H / 2 - 1);
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  },

  // Legacy shim — called by old record() references if any remain
  record(track) { this.open(track); }
};

EventBus.on('track:added', (track) => {
  if (track.channelType === 'dpcm' || track.channelType === 'sampler') {
    // Create waveform canvas element (rendered by AV as an overlay)
    const wc = document.createElement('canvas');
    wc.id = 'waveform-' + track.id;
    wc.width = 80; wc.height = 30;
    wc.style.cssText = 'position:absolute;display:none;'; // positioned by AV
    document.body.appendChild(wc);
  }
});

// ============================================================
// MODULE: Sequencer
// ============================================================
const Sequencer = {
  _timer: null,
  _playing: false,
  _playStartTime: 0,       // audioCtx.currentTime when play pressed
  _playStartBar: 0,        // ProjectState.playheadBar when play pressed
  _scheduledUpToTime: 0,
  LOOK_AHEAD: 0.15,        // seconds
  TICK_MS: 25,
  _followPlayback: true,   // auto-scroll views to track the playhead (Logic-style)
  _avFollowScrollX: 0,     // current locked scrollX for AV during follow
  _prFollowScrollX: 0,     // current locked scrollX for PR during follow

  play() {
    if (this._playing) return;
    this._playing = true;
    this._playStartBar = ProjectState.loopEnabled ? ProjectState.loopStart : ProjectState.playheadBar;
    this._followPlayback = true;
    this._avFollowScrollX = this._playStartBar * AV.barWidth();
    this._prFollowScrollX = this._playStartBar * PR.barWidth();
    AV.scrollX = this._avFollowScrollX;
    if (PR.activePattern) PR.scrollX = this._prFollowScrollX;
    this._updatePlayBtn(true);
    const ctx = getAudioCtx();
    const _doStart = () => {
      this._playStartTime = ctx.currentTime + 0.05;
      this._scheduledUpToTime = this._playStartTime;
      this._timer = setInterval(() => this._tick(), this.TICK_MS);
      this._raf();
    };
    if (ctx.state === 'running') {
      _doStart();
    } else {
      // Context not yet running (iOS unlocking) — defer until it transitions.
      ctx.resume();
      // Fallback: if statechange never fires (some iOS versions), force-start after 600ms.
      var _fallback = setTimeout(() => { if (this._playing && !this._timer) _doStart(); }, 600);
      var _onState = () => {
        if (ctx.state === 'running') {
          clearTimeout(_fallback);
          ctx.removeEventListener('statechange', _onState);
          _doStart();
        }
      };
      ctx.addEventListener('statechange', _onState);
    }
  },

  stop() {
    this._playing = false;
    if (this._timer) { clearInterval(this._timer); this._timer = null; }
    // Close the AudioContext immediately — kills all scheduled nodes mid-playback.
    // getMasterGain() and getAudioCtx() recreate lazily on next play.
    if (audioCtx) { try { audioCtx.close(); } catch(e) {} audioCtx = null; }
    masterGain.node = null;
    if (ProjectState.loopEnabled) ProjectState.playheadBar = ProjectState.loopStart;
    AV.draw();
    if (PR.activePattern) PR.draw();
    this._updatePlayBtn(false);
  },

  _updatePlayBtn(playing) {
    const btn = document.getElementById('btn-play');
    if (!btn) return;
    const stopIcon = `<svg viewBox="0 0 512 512" width="18" height="18" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><rect x="90.35" y="90.35" width="331.29" height="331.29"/></svg>`;
    const playIcon = `<svg viewBox="0 0 512 512" width="18" height="18" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><rect x="30.12" y="30.12" width="60.24" height="30.12"/><rect x="30.12" y="60.24" width="120.47" height="30.12"/><rect x="30.12" y="90.35" width="180.71" height="30.12"/><rect x="30.12" y="120.47" width="240.94" height="30.12"/><rect x="30.12" y="150.59" width="301.18" height="30.12"/><rect x="30.12" y="180.71" width="361.41" height="30.12"/><rect x="30.12" y="210.82" width="421.65" height="30.12"/><rect x="30.12" y="240.94" width="451.76" height="60.24"/><rect x="30.12" y="301.18" width="421.65" height="30.12"/><rect x="30.12" y="331.29" width="361.41" height="30.12"/><rect x="30.12" y="361.41" width="301.18" height="30.12"/><rect x="30.12" y="391.53" width="240.94" height="30.12"/><rect x="30.12" y="421.65" width="180.71" height="30.12"/><rect x="30.12" y="451.76" width="120.47" height="30.12"/><rect x="30.12" y="481.88" width="60.24" height="30.12"/></svg>`;
    btn.innerHTML = playing ? stopIcon : playIcon;
    btn.title = playing ? 'Stop (Space)' : 'Play / Stop (Space)';
    btn.style.color = playing ? 'var(--accent)' : '';
  },

  updateTiming() { /* BPM change: timing adjusts automatically since we recompute each tick */ },

  _barToAbsTime(bar) {
    return this._playStartTime + barToSeconds(bar - this._playStartBar);
  },

  _tick() {
    const ctx = getAudioCtx();
    const scheduleUntil = ctx.currentTime + this.LOOK_AHEAD;
    const loopEnabled = ProjectState.loopEnabled;
    const loopStart = ProjectState.loopStart;
    const loopEnd   = ProjectState.loopEnd;
    const loopLen   = loopEnd - loopStart;
    const loopDur   = (loopEnabled && loopLen > 0) ? barToSeconds(loopLen) : 0;

    for (const track of ProjectState.tracks) {
      for (const entry of track.arrangement) {
        const pat = track.patterns.find(p => p.id === entry.patternId);
        if (!pat) continue;
        // totalBars: how far the entry spans in the arrangement (may be > pat.lengthBars when tiled)
        const totalBars = (entry.loopBars && entry.loopBars > pat.lengthBars)
          ? entry.loopBars : pat.lengthBars;

        for (const note of pat.notes) {
          // Skip notes that fall outside the pattern's visible length (trimmed off)
          if (note.start >= pat.lengthBars) continue;
          // Tile the note across all repetitions within the entry's total span
          for (let rep = 0; ; rep++) {
            const noteAbsBar = entry.startBar + note.start + rep * pat.lengthBars;
            if (noteAbsBar >= entry.startBar + totalBars) break;

            // Song-level loop: notes at or beyond loopEnd are unreachable; further reps are even further right
            if (loopDur > 0 && noteAbsBar >= loopEnd) break;

            const baseAbsTime = this._barToAbsTime(noteAbsBar);

            if (loopDur <= 0 || noteAbsBar < loopStart) {
              // Outside song loop region: schedule once at its absolute time.
              if (baseAbsTime >= this._scheduledUpToTime && baseAbsTime <= scheduleUntil) {
                playNote(track, note, baseAbsTime);
              }
            } else {
              // Inside song loop region [loopStart, loopEnd): repeat every loopDur.
              const startK = Math.max(0, Math.floor((this._scheduledUpToTime - baseAbsTime) / loopDur));
              const endK   = Math.ceil((scheduleUntil - baseAbsTime) / loopDur);
              for (let k = startK; k <= endK; k++) {
                const t = baseAbsTime + k * loopDur;
                if (t < this._scheduledUpToTime) continue;
                if (t > scheduleUntil) break;
                playNote(track, note, t);
              }
            }
          }
        }
      }
    }

    this._scheduledUpToTime = scheduleUntil;
  },

  _raf() {
    if (!this._playing) return;
    const ctx = getAudioCtx();
    const elapsed = ctx.currentTime - this._playStartTime;
    const secsPerBar = barToSeconds(1);
    let bar = this._playStartBar + elapsed / secsPerBar;

    if (ProjectState.loopEnabled) {
      const loopLen = ProjectState.loopEnd - ProjectState.loopStart;
      if (loopLen > 0 && bar >= ProjectState.loopEnd) {
        bar = ProjectState.loopStart + ((bar - ProjectState.loopStart) % loopLen);
      }
    }

    ProjectState.playheadBar = bar;

    if (this._followPlayback) {
      const avCanvas = AV.getCanvas();
      const avVisible = avCanvas.width - AV.HEADER_WIDTH;
      const avCursorPx = bar * AV.barWidth();
      if (avCursorPx < this._avFollowScrollX || avCursorPx >= this._avFollowScrollX + avVisible) {
        this._avFollowScrollX = avCursorPx;
      }
      AV.scrollX = this._avFollowScrollX;
      if (PR.activePattern) {
        const prCanvas = PR.getCanvas();
        const prVisible = prCanvas.width - PR.KEY_WIDTH;
        const prCursorPx = bar * PR.barWidth();
        if (prCursorPx < this._prFollowScrollX || prCursorPx >= this._prFollowScrollX + prVisible) {
          this._prFollowScrollX = prCursorPx;
        }
        PR.scrollX = this._prFollowScrollX;
      }
    }

    AV.draw();
    if (PR.activePattern) PR.draw();
    requestAnimationFrame(() => this._raf());
  }
};

// ============================================================
// Clipboard (copy/paste for piano roll notes)
// ============================================================
let _clipboard = null; // array of note objects with start relative to earliest note
let _avClipboard = null; // array of { pat, trackId } cut from arrangement view

function _copySelected() {
  const ap = PR.activePattern;
  if (!ap) return;
  const selected = ap.pattern.notes.filter(n => n.selected);
  if (!selected.length) return;
  const minStart = Math.min(...selected.map(n => n.start));
  _clipboard = JSON.parse(JSON.stringify(selected)).map(n => {
    n.start -= minStart;
    delete n.chordId;    // pasted notes are always independent
    delete n.chordLabel;
    delete n.glideTo;    // glide links don't survive copy/paste (IDs change)
    delete n.selected;
    return n;
  });
}

function _paste() {
  const ap = PR.activePattern;
  if (!ap || !_clipboard) return;
  History.push();
  const entry = ap.track.arrangement.find(en => en.patternId === ap.pattern.id);
  const patStartBar = entry ? entry.startBar : 0;
  const relBar = ProjectState.playheadBar - patStartBar;
  const sixteenth = PR.sixteenthWidth() / PR.barWidth();
  // No upper clamp — allow pasting past the current pattern end (auto-extends below)
  const snapped = Math.max(0, Math.floor(relBar / sixteenth) * sixteenth);
  ap.pattern.notes.forEach(n => { n.selected = false; });
  const isTargetDrum = isDrumChannel(ap.track.channelType);
  const drumRows = PR.DRUM_ROWS; // [46,42,39,37,38,36]

  for (const note of _clipboard) {
    let pitch = note.pitch;

    if (isTargetDrum) {
      // If pitch is already a valid drum row, keep it.
      // Otherwise snap to the nearest valid drum row by absolute distance.
      if (!drumRows.includes(pitch)) {
        pitch = drumRows.reduce((best, row) =>
          Math.abs(row - pitch) < Math.abs(best - pitch) ? row : best,
          drumRows[0]
        );
      }
    }

    ap.pattern.notes.push({
      ...note,
      pitch,
      start: snapped + note.start,
      selected: true,
      glideTo: null,  // glide links don't survive paste
    });
  }
  // Auto-extend pattern and container if pasted notes exceed current length
  const maxEnd = Math.max(..._clipboard.map(n => snapped + n.start + n.duration));
  if (maxEnd > ap.pattern.lengthBars) {
    ap.pattern.lengthBars = Math.ceil(maxEnd);
    if (entry && entry.loopBars && entry.loopBars < ap.pattern.lengthBars) {
      entry.loopBars = ap.pattern.lengthBars;
    }
    AV.draw();
    if (typeof MobileUI !== 'undefined' && MobileUI._initialized && MobileUI.isMobile()) {
      MobileUI._syncFromProject();
    }
  }
  PR.draw(); PR.drawVelocity();
}

// Wire transport buttons (after buildTopBar is called)
// ─── Piano Roll panel open/close with slide animation ─────────────────
let _prAnimRAF = null;

function openPianoRoll(track, pat) {
  if (_prAnimRAF) { cancelAnimationFrame(_prAnimRAF); _prAnimRAF = null; }
  const prPanel = document.getElementById('pianoroll-panel');
  const avPanel = document.getElementById('arrangement-panel');
  const divider  = document.getElementById('panel-divider');

  PR.activePattern = { track, pattern: pat };
  divider.style.display = 'block';
  if (typeof buildPRTopbar === 'function') buildPRTopbar();

  // If panel is already visible just refresh content — no slide needed
  if (prPanel.style.display !== 'none' && prPanel.offsetHeight > 10) {
    AV.resize(); AV.draw();
    PR.resizeCanvases();
    _prApplyScrollY(track, pat);
    PR.draw(); PR.drawVelocity();
    _prScrollIfCovered(track);
    return;
  }

  // Slide in from 0
  const avH0      = avPanel.getBoundingClientRect().height;
  const targetPrH = Math.max(150, Math.round(avH0 / 2));
  const targetAvH = avH0 - targetPrH;

  avPanel.style.flex = 'none'; avPanel.style.height = avH0 + 'px';
  prPanel.style.display  = 'flex';
  prPanel.style.flex     = 'none';
  prPanel.style.minHeight = '0';
  prPanel.style.overflow = 'hidden';
  prPanel.style.height   = '0px';

  let curPrH = 0, curAvH = avH0;
  const tick = () => {
    const pd = targetPrH - curPrH, ad = targetAvH - curAvH;
    if (Math.abs(pd) < 0.5) {
      // Settle — hand layout back to CSS flex
      prPanel.style.height = ''; prPanel.style.minHeight = '';
      prPanel.style.overflow = ''; prPanel.style.flex = '';
      avPanel.style.flex = ''; avPanel.style.height = '';
      _prAnimRAF = null;
      AV.resize(); AV.draw();
      PR.resizeCanvases();
      _prApplyScrollY(track, pat);
      PR.draw(); PR.drawVelocity();
      _prScrollIfCovered(track);
      return;
    }
    curPrH += pd * 0.2; curAvH += ad * 0.2;
    prPanel.style.height = Math.round(curPrH) + 'px';
    avPanel.style.height = Math.round(curAvH) + 'px';
    AV.resize(); AV.draw();
    PR.resizeCanvases(); PR.draw();
    _prAnimRAF = requestAnimationFrame(tick);
  };
  tick();
}

function _prApplyScrollY(track, pat) {
  const isDrum = track.channelType === 'noise' || track.channelType === 'pcm7';
  if (isDrum) { PR.scrollY = 0; return; }
  if (!pat.notes.length) return;
  const sorted = pat.notes.map(n => n.pitch).sort((a, b) => a - b);
  const mid = sorted[Math.floor(sorted.length / 2)];
  const H = PR.getCanvas().height;
  PR.scrollY = Math.max(0, (127 - mid) * PR.ROW_HEIGHT - Math.floor(H / 2) + PR.ROW_HEIGHT / 2);
}

function _prScrollIfCovered(track) {
  const canvas = AV.getCanvas();
  const idx = ProjectState.tracks.indexOf(track);
  const trackBottom = AV.RULER_HEIGHT + (idx + 1) * AV.TRACK_HEIGHT - AV.scrollY;
  if (trackBottom > canvas.height) {
    AV.animateScrollY(Math.max(0, idx * AV.TRACK_HEIGHT));
  }
}

function closePianoRoll(onDone) {
  if (_prAnimRAF) { cancelAnimationFrame(_prAnimRAF); _prAnimRAF = null; }
  const prPanel = document.getElementById('pianoroll-panel');
  const avPanel = document.getElementById('arrangement-panel');
  const divider  = document.getElementById('panel-divider');

  const prH0 = prPanel.getBoundingClientRect().height;
  const avH0 = avPanel.getBoundingClientRect().height;

  if (!prH0 || prPanel.style.display === 'none') {
    prPanel.style.display = 'none'; divider.style.display = 'none';
    avPanel.style.flex = ''; avPanel.style.height = '';
    PR.activePattern = null;
    requestAnimationFrame(() => { AV.resize(); AV.draw(); });
    if (onDone) onDone();
    return;
  }

  const targetAvH = avH0 + prH0;
  avPanel.style.flex = 'none'; avPanel.style.height = avH0 + 'px';
  prPanel.style.flex = 'none'; prPanel.style.minHeight = '0';
  prPanel.style.overflow = 'hidden'; prPanel.style.height = prH0 + 'px';

  let curPrH = prH0, curAvH = avH0;
  const tick = () => {
    if (curPrH < 0.5) {
      prPanel.style.display = 'none';
      prPanel.style.height = ''; prPanel.style.minHeight = '';
      prPanel.style.overflow = ''; prPanel.style.flex = '';
      divider.style.display = 'none';
      avPanel.style.flex = ''; avPanel.style.height = '';
      PR.activePattern = null; _prAnimRAF = null;
      requestAnimationFrame(() => { AV.resize(); AV.draw(); });
      if (onDone) onDone();
      return;
    }
    curPrH += (0 - curPrH) * 0.2;
    curAvH += (targetAvH - curAvH) * 0.2;
    prPanel.style.height = Math.max(0, Math.round(curPrH)) + 'px';
    avPanel.style.height = Math.round(curAvH) + 'px';
    AV.resize(); AV.draw();
    _prAnimRAF = requestAnimationFrame(tick);
  };
  tick();
}

function wireDivider() {
  const divider = document.getElementById('panel-divider');
  const avPanel = document.getElementById('arrangement-panel');
  const prPanel = document.getElementById('pianoroll-panel');
  function _startDividerDrag(startY) {
    divider.classList.add('dragging');
    const startAvH = avPanel.getBoundingClientRect().height;
    const startPrH = prPanel.getBoundingClientRect().height;
    const onMove = (clientY) => {
      const delta = clientY - startY;
      avPanel.style.flex = 'none';
      avPanel.style.height = Math.max(60, startAvH + delta) + 'px';
      prPanel.style.height = Math.max(150, startPrH - delta) + 'px';
      AV.resize(); AV.draw();
      PR.resizeCanvases(); PR.draw(); PR.drawVelocity();
    };
    const onUp = () => {
      divider.classList.remove('dragging');
      document.removeEventListener('mousemove', _mouseMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', _touchMove);
      document.removeEventListener('touchend', onUp);
    };
    const _mouseMove = (ev) => onMove(ev.clientY);
    const _touchMove = (ev) => { ev.preventDefault(); onMove(ev.touches[0].clientY); };
    document.addEventListener('mousemove', _mouseMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', _touchMove, { passive: false });
    document.addEventListener('touchend', onUp);
  }
  divider.addEventListener('mousedown', (e) => { e.preventDefault(); _startDividerDrag(e.clientY); });
  divider.addEventListener('touchstart', (e) => { e.preventDefault(); _startDividerDrag(e.touches[0].clientY); }, { passive: false });
}

function wireTransport() {
  document.getElementById('btn-undo').onclick = () => History.undo();
  document.getElementById('btn-redo').onclick = () => History.redo();
  document.getElementById('btn-play').onclick = () => {
    _iosUnlock(); // must be synchronous in gesture — unlocks Web Audio on iOS
    if (Sequencer._playing) {
      Sequencer.stop();
    } else {
      Sequencer.play();
    }
  };
  document.addEventListener('keydown', (e) => {
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if ((e.metaKey || e.ctrlKey) && e.code === 'KeyZ') {
      e.preventDefault();
      if (e.shiftKey) History.redo(); else History.undo();
      return;
    }
    if ((e.metaKey || e.ctrlKey) && e.code === 'KeyC') {
      e.preventDefault();
      if (AV._selEntries.size > 0) {
        // Copy selected arrangement blocks
        _avClipboard = [];
        for (const track of ProjectState.tracks) {
          for (const en of track.arrangement) {
            if (!AV._selEntries.has(en)) continue;
            const pat = track.patterns.find(p => p.id === en.patternId);
            if (pat) _avClipboard.push({ pat: JSON.parse(JSON.stringify(pat)), trackId: track.id });
          }
        }
      } else {
        _copySelected();
      }
      return;
    }
    if ((e.metaKey || e.ctrlKey) && e.code === 'KeyX') {
      e.preventDefault();
      // Cut selected arrangement blocks
      if (AV._selEntries.size > 0) {
        History.push();
        _avClipboard = [];
        for (const track of ProjectState.tracks) {
          for (const en of [...track.arrangement]) {
            if (!AV._selEntries.has(en)) continue;
            const pat = track.patterns.find(p => p.id === en.patternId);
            if (pat) _avClipboard.push({ pat: JSON.parse(JSON.stringify(pat)), trackId: track.id });
            track.arrangement = track.arrangement.filter(e => e !== en);
          }
        }
        AV._selEntries.clear();
        AV.draw();
      }
      return;
    }
    if ((e.metaKey || e.ctrlKey) && e.code === 'KeyV') {
      e.preventDefault();
      // Paste arrangement blocks if we have a block clipboard and no piano-roll note clipboard
      if (_avClipboard && !_clipboard) {
        const targetTrack = ProjectState.tracks.find(t => t.id === ProjectState.selectedTrackId)
          || ProjectState.tracks[0];
        if (targetTrack) {
          History.push();
          AV._selEntries.clear();
          for (const item of _avClipboard) {
            const newPat = { ...item.pat, id: makeId() };
            targetTrack.patterns.push(newPat);
            const entry = { patternId: newPat.id, startBar: Math.round(ProjectState.playheadBar) };
            targetTrack.arrangement.push(entry);
            AV._selEntries.add(entry);
          }
          AV.draw();
        }
        return;
      }
      _paste();
      return;
    }
    if ((e.metaKey || e.ctrlKey) && e.code === 'KeyA') {
      e.preventDefault();
      const ap = PR.activePattern;
      if (ap) { ap.pattern.notes.forEach(n => { n.selected = true; }); PR.draw(); }
      return;
    }
    if (e.code === 'Space') {
      e.preventDefault();
      if (Sequencer._playing) Sequencer.stop(); else Sequencer.play();
    } else if (e.code === 'Delete' || e.code === 'Backspace') {
      // Piano roll selected notes take priority over arrangement selection
      const ap = PR.activePattern;
      if (ap && ap.pattern.notes.some(n => n.selected)) {
        e.preventDefault();
        History.push();
        ap.pattern.notes = ap.pattern.notes.filter(n => !n.selected);
        PR.draw(); PR.drawVelocity();
        return;
      }
      // Delete selected arrangement pattern block(s)
      if (AV._selEntries.size > 0) {
        e.preventDefault();
        History.push();
        for (const track of ProjectState.tracks) {
          const before = track.arrangement.length;
          track.arrangement = track.arrangement.filter(en => !AV._selEntries.has(en));
          if (before !== track.arrangement.length && ap) {
            const stillExists = track.arrangement.some(en => en.patternId === ap.pattern.id);
            if (!stillExists) {
              closePianoRoll();
            }
          }
        }
        AV._selEntries.clear();
        ProjectState.selectedPatternId = null;
        AV.draw();
        return;
      }
    }
  });
  document.getElementById('btn-rec').onclick = () => {
    // If a DPCM track is selected, open sampler to replace its sample.
    // Otherwise open sampler to create a new DPCM track.
    const t = ProjectState.tracks.find(
      t => t.id === ProjectState.selectedTrackId &&
           (t.channelType === 'dpcm' || t.channelType === 'sampler'));
    DPCMSampler.open(t || null);
    // Clear any previously armed state — no longer needed with modal flow
    ProjectState.armedTrackId = null;
    const recBtn = document.getElementById('btn-rec');
    if (recBtn) recBtn.classList.remove('armed');
  };
}

// ============================================================
// MODULE: ExportEngine
// ============================================================
const ExportEngine = {

  async renderOffline(onProgress) {
    const songBars = getSongLengthBars();
    const durationSecs = barToSeconds(songBars) + 0.5; // pad
    // Use real context sample rate — iOS defaults to 48000, not 44100
    const sampleRate = getAudioCtx().sampleRate;
    const offCtx = new OfflineAudioContext(2, Math.ceil(sampleRate * durationSecs), sampleRate);

    // Swap audioCtx temporarily
    const realCtx = audioCtx;
    audioCtx = offCtx;
    masterGain.node = null;
    _reverbCache['room'] = null; _reverbCache['hall'] = null;
    // Clear PCM7 noise buffer cache — AudioBuffers from the real context cannot
    // be used in the OfflineAudioContext and would throw InvalidStateError.
    for (const k in _pcm7NoiseCache) delete _pcm7NoiseCache[k];

    // Schedule all notes, tiling patterns that have loopBars > pat.lengthBars
    for (const track of ProjectState.tracks) {
      for (const entry of track.arrangement) {
        const pat = track.patterns.find(p => p.id === entry.patternId);
        if (!pat) continue;
        const totalBars = (entry.loopBars && entry.loopBars > pat.lengthBars)
          ? entry.loopBars : pat.lengthBars;
        for (const note of pat.notes) {
          if (note.start >= pat.lengthBars) continue; // skip notes trimmed off by pattern shortening
          for (let rep = 0; ; rep++) {
            const noteBar = entry.startBar + note.start + rep * pat.lengthBars;
            if (noteBar >= entry.startBar + totalBars) break;
            const t = barToSeconds(noteBar);
            if (t >= durationSecs) break;
            playNote(track, note, t);
          }
        }
      }
    }

    // Poll progress via a timer — OfflineAudioContext has no progress event.
    // Use an exponential approach (1 - e^(-t/T)) so the bar always moves forward
    // and never freezes at a cap, even for very long songs where rendering takes
    // longer than the optimistic estimate.
    let pollTimer = null;
    if (onProgress) {
      const startWall = performance.now();
      // Half-life: estimated time to reach ~63%. Use 8× real-time (conservative
      // enough for complex multi-track songs; short songs finish well before it).
      const halfLifeMs = (durationSecs / 8) * 1000;
      pollTimer = setInterval(() => {
        const elapsed = performance.now() - startWall;
        onProgress(1 - Math.exp(-elapsed / halfLifeMs));
      }, 80);
    }

    let rendered;
    try {
      rendered = await offCtx.startRendering();
    } finally {
      if (pollTimer) clearInterval(pollTimer);
    }
    if (onProgress) onProgress(1);

    // Restore real context. Clear caches — nodes/buffers from the offline context
    // cannot be reused in the live AudioContext.
    audioCtx = realCtx;
    masterGain.node = null;
    for (const k in _reverbCache) delete _reverbCache[k];
    for (const k in _pcm7NoiseCache) delete _pcm7NoiseCache[k];

    return rendered;
  },

  encodeWAV(audioBuffer) {
    const numCh = audioBuffer.numberOfChannels;
    const sr = audioBuffer.sampleRate;
    const bps = 16;
    const blockAlign = numCh * (bps / 8);
    const dataLen = audioBuffer.length * blockAlign;
    const buf = new ArrayBuffer(44 + dataLen);
    const v = new DataView(buf);
    const ws = (off, s) => { for (let i=0;i<s.length;i++) v.setUint8(off+i, s.charCodeAt(i)); };
    ws(0,'RIFF'); v.setUint32(4, 36+dataLen, true);
    ws(8,'WAVE'); ws(12,'fmt ');
    v.setUint32(16,16,true); v.setUint16(20,1,true);
    v.setUint16(22,numCh,true); v.setUint32(24,sr,true);
    v.setUint32(28,sr*blockAlign,true);
    v.setUint16(32,blockAlign,true); v.setUint16(34,bps,true);
    ws(36,'data'); v.setUint32(40,dataLen,true);
    let off = 44;
    for (let i=0;i<audioBuffer.length;i++) {
      for (let ch=0;ch<numCh;ch++) {
        const s = Math.max(-1, Math.min(1, audioBuffer.getChannelData(ch)[i]));
        v.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        off += 2;
      }
    }
    return buf;
  },

  downloadBlob(data, filename, mime) {
    const blob = new Blob([data], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
  },

  async exportWAV() {
    this._promptFilename('nesforge-export', 'EXPORT', async (name) => {
      const filename = name.endsWith('.wav') ? name : name + '.wav';
      const btn = document.getElementById('exp-wav');

      // Build inline progress bar
      let progressEl = document.getElementById('exp-wav-progress');
      if (!progressEl) {
        progressEl = document.createElement('div');
        progressEl.id = 'exp-wav-progress';
        progressEl.style.cssText = 'margin-top:8px;height:6px;background:var(--bg-deep);border:1px solid var(--bg3);border-radius:0;overflow:hidden;';
        const fill = document.createElement('div');
        fill.id = 'exp-wav-progress-fill';
        fill.style.cssText = 'height:100%;width:0%;background:var(--hi-dim);transition:width 0.1s linear;';
        progressEl.appendChild(fill);
        if (btn) btn.parentNode.insertBefore(progressEl, btn.nextSibling);
      }
      const fill = document.getElementById('exp-wav-progress-fill');
      const setProgress = (p) => { if (fill) fill.style.width = Math.round(p * 100) + '%'; };

      if (btn) btn.textContent = 'RENDERING...';
      setProgress(0);
      try {
        const buf = await this.renderOffline(setProgress);
        const wav = this.encodeWAV(buf);
        this.downloadBlob(wav, filename, 'audio/wav');
      } catch(e) {
        alert('WAV export failed: ' + e.message);
      } finally {
        if (btn) btn.textContent = 'EXPORT WAV';
        setTimeout(() => { if (progressEl) progressEl.remove(); }, 800);
      }
    });
  },

  // Encode an AudioBuffer to MP3 using lamejs.
  // setProgress(0–1) is called periodically so callers can update UI.
  // Yields to the event loop every 100 chunks so the page stays responsive.
  async _encodeToMP3(audioBuffer, setProgress) {
    if (!window.lamejs) throw new Error('MP3 encoder (lamejs) not loaded');
    const sr  = audioBuffer.sampleRate;
    const enc = new lamejs.Mp3Encoder(2, sr, 128); // stereo, native sample rate, 128 kbps

    const left  = audioBuffer.getChannelData(0);
    const right = audioBuffer.numberOfChannels >= 2
      ? audioBuffer.getChannelData(1) : left;
    const total = left.length;

    // Float32 → Int16
    const toI16 = (f32) => {
      const i16 = new Int16Array(f32.length);
      for (let i = 0; i < f32.length; i++) {
        const s = Math.max(-1, Math.min(1, f32[i]));
        i16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      return i16;
    };
    const lI16 = toI16(left);
    const rI16 = toI16(right);

    const CHUNK = 1152; // lamejs requires multiples of 576 (1152 = 2×576)
    const mp3   = [];
    const totalChunks = Math.ceil(total / CHUNK);

    for (let i = 0; i < totalChunks; i++) {
      // Yield every 100 chunks so progress bar updates and page stays responsive
      if (i % 100 === 0) {
        if (setProgress) setProgress(i / totalChunks);
        await new Promise(r => setTimeout(r, 0));
      }
      const s = i * CHUNK;
      const buf = enc.encodeBuffer(lI16.subarray(s, s + CHUNK), rI16.subarray(s, s + CHUNK));
      if (buf.length > 0) mp3.push(buf);
    }
    const tail = enc.flush();
    if (tail.length > 0) mp3.push(tail);
    if (setProgress) setProgress(1);

    return new Blob(mp3, { type: 'audio/mpeg' });
  },

  async exportMP3() {
    if (!window.lamejs) {
      alert('MP3 encoder not loaded yet — please wait a moment and try again.');
      return;
    }

    this._promptFilename('nesforge-export', 'EXPORT', async (name) => {
      const filename = name.endsWith('.mp3') ? name : name + '.mp3';
      const btn = document.getElementById('exp-mp3');
      const origText = btn?.textContent || '';

      // Inline progress bar — same pattern as exportWAV
      let progressEl = document.getElementById('exp-mp3-progress');
      if (!progressEl) {
        progressEl = document.createElement('div');
        progressEl.id = 'exp-mp3-progress';
        progressEl.style.cssText = 'margin-top:8px;height:6px;background:var(--bg-deep);border:1px solid var(--bg3);border-radius:0;overflow:hidden;';
        const fill = document.createElement('div');
        fill.id = 'exp-mp3-progress-fill';
        fill.style.cssText = 'height:100%;width:0%;background:var(--hi-dim);transition:width 0.1s linear;';
        progressEl.appendChild(fill);
        if (btn) btn.parentNode.insertBefore(progressEl, btn.nextSibling);
      }
      const fill = document.getElementById('exp-mp3-progress-fill');
      const setProgress = (p) => { if (fill) fill.style.width = Math.round(p * 100) + '%'; };

      if (btn) btn.textContent = 'RENDERING...';
      setProgress(0);
      try {
        // Phase 1: offline render → progress 0–50%
        const audioBuffer = await this.renderOffline(p => setProgress(p * 0.5));

        // Phase 2: lamejs MP3 encode → progress 50–100%
        if (btn) btn.textContent = 'ENCODING MP3...';
        const blob = await this._encodeToMP3(audioBuffer, p => setProgress(0.5 + p * 0.5));
        this.downloadBlob(blob, filename, 'audio/mpeg');
      } catch (e) {
        alert('MP3 export failed: ' + e.message);
      } finally {
        if (btn) btn.textContent = origText;
        setTimeout(() => { if (progressEl) progressEl.remove(); }, 800);
      }
    });
  },

  // --- MIDI Binary Encoding ---
  encodeVarLen(v) {
    const out = [];
    out.push(v & 0x7F);
    v >>= 7;
    while (v > 0) { out.push((v & 0x7F) | 0x80); v >>= 7; }
    return out.reverse();
  },

  buildMIDITrack(notes, bpm, ticksPerBeat) {
    const usecsPerBeat = Math.round(60000000 / bpm);
    const events = [];

    // Tempo meta event at time 0
    events.push({ tick: 0, bytes: [0xFF, 0x51, 0x03,
      (usecsPerBeat >> 16) & 0xFF, (usecsPerBeat >> 8) & 0xFF, usecsPerBeat & 0xFF] });

    // Convert notes to on/off events
    const noteEvents = [];
    for (const note of notes) {
      const startTick = Math.round(note.start * ProjectState.timeSignature[0] * ticksPerBeat);
      const durTick = Math.round(note.duration * ProjectState.timeSignature[0] * ticksPerBeat);
      noteEvents.push({ tick: startTick, bytes: [0x90, note.pitch, note.velocity || 100] });
      noteEvents.push({ tick: startTick + durTick, bytes: [0x80, note.pitch, 0] });
    }
    noteEvents.sort((a,b) => a.tick - b.tick);
    events.push(...noteEvents);
    events.push({ tick: events.reduce((m,e) => Math.max(m,e.tick), 0) + ticksPerBeat,
      bytes: [0xFF, 0x2F, 0x00] }); // end of track

    // Build bytes with delta times
    let lastTick = 0;
    const bytes = [];
    for (const ev of events) {
      const delta = ev.tick - lastTick;
      lastTick = ev.tick;
      bytes.push(...this.encodeVarLen(delta));
      bytes.push(...ev.bytes);
    }

    // MTrk chunk
    const header = [0x4D,0x54,0x72,0x6B]; // MTrk
    const lenBytes = [(bytes.length>>24)&0xFF,(bytes.length>>16)&0xFF,(bytes.length>>8)&0xFF,bytes.length&0xFF];
    return [...header, ...lenBytes, ...bytes];
  },

  buildMIDIFile(trackDataArrays) {
    const ticksPerBeat = 480;
    const nTracks = trackDataArrays.length;
    // MThd header
    const header = [
      0x4D,0x54,0x68,0x64, // MThd
      0,0,0,6,             // chunk length
      0,1,                 // format 1
      (nTracks>>8)&0xFF, nTracks&0xFF,
      (ticksPerBeat>>8)&0xFF, ticksPerBeat&0xFF
    ];
    const all = [...header];
    for (const td of trackDataArrays) all.push(...td);
    return new Uint8Array(all).buffer;
  },

  // Remap a drum note pitch to its canonical GM export pitch
  _drumExportPitch(pitch) {
    const preset = DRUM_MIDI[pitch];
    return preset ? (DRUM_MIDI_EXPORT[preset] ?? pitch) : pitch;
  },

  exportMIDICombined() {
    this._promptFilename('nesforge-combined', 'EXPORT', (name) => {
      const filename = name.endsWith('.mid') ? name : name + '.mid';
      const ticksPerBeat = 480;
      const trackData = ProjectState.tracks.map(track => {
        const isDrumTrack = track.channelType === 'noise' || track.channelType === 'pcm7';
        const allNotes = [];
        for (const entry of track.arrangement) {
          const pat = track.patterns.find(p => p.id === entry.patternId);
          if (!pat) continue;
          for (const note of pat.notes) {
            const exportPitch = isDrumTrack ? this._drumExportPitch(note.pitch) : note.pitch;
            allNotes.push({ ...note, start: note.start + entry.startBar, pitch: exportPitch });
          }
        }
        return this.buildMIDITrack(allNotes, ProjectState.bpm, ticksPerBeat);
      });
      // Add tempo track as first track
      const tempoTrack = this.buildMIDITrack([], ProjectState.bpm, ticksPerBeat);
      const midi = this.buildMIDIFile([tempoTrack, ...trackData]);
      this.downloadBlob(midi, filename, 'audio/midi');
    });
  },

  async exportMIDIStems() {
    this._promptFilename('nesforge-stems', 'EXPORT', async (name) => {
      const filename = name.endsWith('.zip') ? name : name + '.zip';
      const ticksPerBeat = 480;
      const zip = new JSZip();
      for (const track of ProjectState.tracks) {
        const isDrumTrack = track.channelType === 'noise' || track.channelType === 'pcm7';
        const allNotes = [];
        for (const entry of track.arrangement) {
          const pat = track.patterns.find(p => p.id === entry.patternId);
          if (!pat) continue;
          for (const note of pat.notes) {
            const exportPitch = isDrumTrack ? this._drumExportPitch(note.pitch) : note.pitch;
            allNotes.push({ ...note, start: note.start + entry.startBar, pitch: exportPitch });
          }
        }
        const trackData = this.buildMIDITrack(allNotes, ProjectState.bpm, ticksPerBeat);
        const tempoTrack = this.buildMIDITrack([], ProjectState.bpm, ticksPerBeat);
        const midi = this.buildMIDIFile([tempoTrack, trackData]);
        zip.file(track.name.replace(/[^a-zA-Z0-9]/g,'_') + '.mid', midi);
      }
      const blob = await zip.generateAsync({ type: 'blob' });
      this.downloadBlob(blob, filename, 'application/zip');
    });
  },

  _promptFilename(defaultName, actionLabel, onConfirm) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.style.cssText = 'z-index:var(--z-system,10000);';
    overlay.innerHTML = `
      <div class="modal modal--sm" style="min-width:260px;">
        <div class="modal-title">FILE NAME</div>
        <input id="_pfn-inp" type="text" value="${defaultName}" class="field-input">
        <div class="modal-actions">
          <button id="_pfn-cancel" class="btn" style="flex:1;">CANCEL</button>
          <button id="_pfn-ok" class="btn btn--primary" style="flex:1;">${actionLabel}</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const inp = overlay.querySelector('#_pfn-inp');
    inp.focus(); inp.select();
    const confirm = () => { const v = inp.value.trim() || defaultName; overlay.remove(); onConfirm(v); };
    overlay.querySelector('#_pfn-ok').onclick = confirm;
    overlay.querySelector('#_pfn-cancel').onclick = () => overlay.remove();
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') confirm(); else if (e.key === 'Escape') overlay.remove(); });
  },

  saveProject() {
    this._promptFilename('nesforge-project', 'SAVE', (name) => {
      const filename = name.endsWith('.json') ? name : name + '.json';
      const state = JSON.parse(JSON.stringify(ProjectState));
      // Serialize Float32Arrays as base64
      for (const track of state.tracks) {
        if (track.sample) {
          const bytes = new Uint8Array(track.sample.buffer);
          let b64 = '';
          for (let i = 0; i < bytes.length; i++) b64 += String.fromCharCode(bytes[i]);
          track.sample = { _base64: btoa(b64) };
        }
      }
      for (const track of state.tracks)
        for (const pat of track.patterns)
          for (const note of pat.notes)
            delete note.selected;
      this.downloadBlob(JSON.stringify(state, null, 2), filename, 'application/json');
    });
  },

  loadProject(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const state = JSON.parse(e.target.result);
      for (const track of state.tracks) {
        if (track.sample && track.sample._base64) {
          const bin = atob(track.sample._base64);
          const bytes = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
          track.sample = new Float32Array(bytes.buffer);
        }
      }
      Object.assign(ProjectState, state);
      // Sync topbar controls to loaded state
      const _bi = document.getElementById('bpm-input');   if (_bi) _bi.value = state.bpm;
      const _bd = document.getElementById('bpm-display'); if (_bd) _bd.textContent = state.bpm;
      const _mb = document.getElementById('mob-bpm-display'); if (_mb) _mb.textContent = state.bpm;
      const _ks = document.getElementById('key-sel');     if (_ks) _ks.value = state.key;
      const _ss = document.getElementById('scale-sel');   if (_ss) _ss.value = state.scale;
      Sequencer.updateTiming();
      // Recreate waveform canvas elements for DPCM tracks (EventBus.on('track:added') is not fired during load)
      for (const track of ProjectState.tracks) {
        if ((track.channelType === 'dpcm' || track.channelType === 'sampler') && !document.getElementById('waveform-' + track.id)) {
          const wc = document.createElement('canvas');
          wc.id = 'waveform-' + track.id;
          wc.width = 80; wc.height = 30;
          wc.style.cssText = 'position:absolute;display:none;';
          document.body.appendChild(wc);
        }
      }
      AV.resize(); AV.draw();
      if (PR.activePattern) PR.draw();
      EventBus.emit('project:loaded');
    };
    reader.readAsText(file);
  },

  showModal() {
    let modal = document.getElementById('export-modal');
    modal.style.display = 'flex';
    modal.innerHTML = `
      <div class="modal modal--sm" style="min-width:240px;">
        <div class="modal-title">EXPORT</div>
        <div class="modal-section" style="gap:6px;">
          <button class="btn btn--full" id="exp-wav">EXPORT WAV</button>
          <button class="btn btn--full" id="exp-mp3">EXPORT AUDIO (COMPRESSED)</button>
          <button class="btn btn--full" id="exp-midi">EXPORT MIDI</button>
          <button class="btn btn--full" id="exp-stems">EXPORT STEMS</button>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="document.getElementById('export-modal').style.display='none'">CLOSE</button>
        </div>
      </div>`;
    modal.style.cssText = 'display:flex;position:fixed;inset:0;background:rgba(0,0,0,0.7);' +
      'align-items:center;justify-content:center;z-index:2000;';
    document.getElementById('exp-wav').onclick = () => ExportEngine.exportWAV();
    document.getElementById('exp-mp3').onclick = () => ExportEngine.exportMP3();
    document.getElementById('exp-midi').onclick = () => ExportEngine.exportMIDICombined();
    document.getElementById('exp-stems').onclick = () => ExportEngine.exportMIDIStems();
  }
};
