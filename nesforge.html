// ============================================================
// MODULE: DPCMSampler
// ============================================================
const DPCMSampler = {
  MAX_DURATION: 2, // seconds
  TARGET_RATE: 8000,
  BIT_DEPTH: 4, // 16 levels

  async record(track) {
    if (!navigator.mediaDevices) {
      alert('Mic access unavailable on file:// — serve from localhost for recording.');
      return;
    }
    let stream;
    try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
    catch(e) { alert('Mic access denied: ' + e.message); return; }

    const ctx = getAudioCtx();
    const src = ctx.createMediaStreamSource(stream);
    const scriptProc = ctx.createScriptProcessor(4096, 1, 1);
    const recorded = [];

    scriptProc.onaudioprocess = (e) => {
      const buf = e.inputBuffer.getChannelData(0);
      recorded.push(new Float32Array(buf));
    };

    src.connect(scriptProc);
    scriptProc.connect(ctx.destination);

    // Stop after MAX_DURATION
    await new Promise(r => setTimeout(r, this.MAX_DURATION * 1000));

    scriptProc.disconnect(); src.disconnect();
    stream.getTracks().forEach(t => t.stop());

    // Concatenate
    const total = recorded.reduce((s, b) => s + b.length, 0);
    const full = new Float32Array(total);
    let offset = 0;
    for (const chunk of recorded) { full.set(chunk, offset); offset += chunk.length; }

    const processed = this.bitcrush(this.downsample(full, ctx.sampleRate));
    track.sample = processed;
    this.drawWaveform(track);
    EventBus.emit('dpcm:recorded', { track });
  },

  downsample(samples, srcRate) {
    const ratio = srcRate / this.TARGET_RATE;
    const outLen = Math.floor(samples.length / ratio);
    const out = new Float32Array(outLen);
    for (let i = 0; i < outLen; i++) {
      out[i] = samples[Math.floor(i * ratio)];
    }
    return out;
  },

  bitcrush(samples) {
    const levels = Math.pow(2, this.BIT_DEPTH); // 16
    const out = new Float32Array(samples.length);
    for (let i = 0; i < samples.length; i++) {
      out[i] = Math.round((samples[i] + 1) * (levels / 2)) / (levels / 2) - 1;
    }
    return out;
  },

  drawWaveform(track) {
    const canvasId = 'waveform-' + track.id;
    const canvas = document.getElementById(canvasId);
    if (!canvas || !track.sample) return;
    const ctx = canvas.getContext('2d');
    const { width: W, height: H } = canvas;
    ctx.fillStyle = '#46425e';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#ffb0a3';
    ctx.beginPath();
    const step = track.sample.length / W;
    for (let x = 0; x < W; x++) {
      const val = track.sample[Math.floor(x * step)];
      const y = H / 2 - val * (H / 2 - 1);
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
};

EventBus.on('track:added', (track) => {
  if (track.channelType === 'dpcm') {
    // Create waveform canvas element (rendered by AV as an overlay)
    const wc = document.createElement('canvas');
    wc.id = 'waveform-' + track.id;
    wc.width = 80; wc.height = 30;
    wc.style.cssText = 'position:absolute;display:none;'; // positioned by AV
    document.body.appendChild(wc);
  }
});

// ============================================================
// MODULE: Sequencer
// ============================================================
const Sequencer = {
  _timer: null,
  _playing: false,
  _playStartTime: 0,       // audioCtx.currentTime when play pressed
  _playStartBar: 0,        // ProjectState.playheadBar when play pressed
  _scheduledUpToTime: 0,
  LOOK_AHEAD: 0.15,        // seconds
  TICK_MS: 25,

  play() {
    if (this._playing) return;
    getAudioCtx().resume();
    this._playing = true;
    this._playStartBar = ProjectState.loopEnabled ? ProjectState.loopStart : ProjectState.playheadBar;
    this._playStartTime = getAudioCtx().currentTime + 0.05;
    this._scheduledUpToTime = this._playStartTime;
    this._timer = setInterval(() => this._tick(), this.TICK_MS);
    this._raf();
  },

  stop() {
    this._playing = false;
    if (this._timer) { clearInterval(this._timer); this._timer = null; }
    if (ProjectState.loopEnabled) ProjectState.playheadBar = ProjectState.loopStart;
    AV.draw();
    if (PR.activePattern) PR.draw();
  },

  updateTiming() { /* BPM change: timing adjusts automatically since we recompute each tick */ },

  _barToAbsTime(bar) {
    return this._playStartTime + barToSeconds(bar - this._playStartBar);
  },

  _tick() {
    const ctx = getAudioCtx();
    const scheduleUntil = ctx.currentTime + this.LOOK_AHEAD;

    for (const track of ProjectState.tracks) {
      for (const entry of track.arrangement) {
        const pat = track.patterns.find(p => p.id === entry.patternId);
        if (!pat) continue;
        const patStartTime = this._barToAbsTime(entry.startBar);
        const patEndTime = this._barToAbsTime(entry.startBar + pat.lengthBars);

        // Loop handling: also schedule wrapped instance
        const instancesToSchedule = [{ offset: 0 }];
        if (ProjectState.loopEnabled) {
          const loopDur = barToSeconds(ProjectState.loopEnd - ProjectState.loopStart);
          if (loopDur > 0) {
            for (let rep = 1; rep <= 8; rep++) {
              instancesToSchedule.push({ offset: loopDur * rep });
            }
          }
        }

        for (const { offset } of instancesToSchedule) {
          const pst = patStartTime + offset;
          const pet = patEndTime + offset;
          if (pst > scheduleUntil) break;
          if (pet < this._scheduledUpToTime) continue;

          for (const note of pat.notes) {
            const noteAbsTime = pst + barToSeconds(note.start);
            if (noteAbsTime < this._scheduledUpToTime) continue;
            if (noteAbsTime > scheduleUntil) continue;
            playNote(track, note, noteAbsTime);
          }
        }
      }
    }

    this._scheduledUpToTime = scheduleUntil;
  },

  _raf() {
    if (!this._playing) return;
    const ctx = getAudioCtx();
    const elapsed = ctx.currentTime - this._playStartTime;
    const secsPerBar = barToSeconds(1);
    let bar = this._playStartBar + elapsed / secsPerBar;

    if (ProjectState.loopEnabled) {
      const loopLen = ProjectState.loopEnd - ProjectState.loopStart;
      if (loopLen > 0 && bar >= ProjectState.loopEnd) {
        bar = ProjectState.loopStart + ((bar - ProjectState.loopStart) % loopLen);
      }
    }

    ProjectState.playheadBar = bar;
    AV.draw();
    if (PR.activePattern) PR.draw();
    requestAnimationFrame(() => this._raf());
  }
};

// ============================================================
// Clipboard (copy/paste for piano roll notes)
// ============================================================
let _clipboard = null; // array of note objects with start relative to earliest note

function _copySelected() {
  const ap = PR.activePattern;
  if (!ap) return;
  const selected = ap.pattern.notes.filter(n => n.selected);
  if (!selected.length) return;
  const minStart = Math.min(...selected.map(n => n.start));
  _clipboard = JSON.parse(JSON.stringify(selected)).map(n => {
    n.start -= minStart;
    delete n.chordId;    // pasted notes are always independent
    delete n.chordLabel;
    delete n.selected;
    return n;
  });
}

function _paste() {
  const ap = PR.activePattern;
  if (!ap || !_clipboard) return;
  History.push();
  const entry = ap.track.arrangement.find(en => en.patternId === ap.pattern.id);
  const patStartBar = entry ? entry.startBar : 0;
  const relBar = ProjectState.playheadBar - patStartBar;
  const sixteenth = PR.sixteenthWidth() / PR.barWidth();
  const snapped = Math.max(0, Math.min(ap.pattern.lengthBars - sixteenth,
    Math.floor(relBar / sixteenth) * sixteenth));
  ap.pattern.notes.forEach(n => { n.selected = false; });
  for (const note of _clipboard) {
    ap.pattern.notes.push({ ...note, start: snapped + note.start, selected: true });
  }
  PR.draw(); PR.drawVelocity();
}

// Wire transport buttons (after buildTopBar is called)
function wireDivider() {
  const divider = document.getElementById('panel-divider');
  const avPanel = document.getElementById('arrangement-panel');
  const prPanel = document.getElementById('pianoroll-panel');
  divider.addEventListener('mousedown', (e) => {
    e.preventDefault();
    divider.classList.add('dragging');
    const startY = e.clientY;
    const startAvH = avPanel.getBoundingClientRect().height;
    const startPrH = prPanel.getBoundingClientRect().height;
    const onMove = (ev) => {
      const delta = ev.clientY - startY;
      const newAvH = Math.max(60, startAvH + delta);
      const newPrH = Math.max(150, startPrH - delta);
      avPanel.style.flex = 'none';
      avPanel.style.height = newAvH + 'px';
      prPanel.style.height = newPrH + 'px';
      AV.resize(); AV.draw();
      PR.resizeCanvases(); PR.draw(); PR.drawVelocity();
    };
    const onUp = () => {
      divider.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function wireTransport() {
  document.getElementById('btn-undo').onclick = () => History.undo();
  document.getElementById('btn-redo').onclick = () => History.redo();
  document.getElementById('btn-play').onclick = () => Sequencer.play();
  document.getElementById('btn-stop').onclick = () => Sequencer.stop();
  document.addEventListener('keydown', (e) => {
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if ((e.metaKey || e.ctrlKey) && e.code === 'KeyZ') {
      e.preventDefault();
      if (e.shiftKey) History.redo(); else History.undo();
      return;
    }
    if ((e.metaKey || e.ctrlKey) && e.code === 'KeyC') {
      e.preventDefault(); _copySelected(); return;
    }
    if ((e.metaKey || e.ctrlKey) && e.code === 'KeyV') {
      e.preventDefault(); _paste(); return;
    }
    if ((e.metaKey || e.ctrlKey) && e.code === 'KeyA') {
      e.preventDefault();
      const ap = PR.activePattern;
      if (ap) { ap.pattern.notes.forEach(n => { n.selected = true; }); PR.draw(); }
      return;
    }
    if (e.code === 'Space') {
      e.preventDefault();
      if (Sequencer._playing) Sequencer.stop(); else Sequencer.play();
    } else if (e.code === 'Delete' || e.code === 'Backspace') {
      // Delete selected arrangement pattern block(s)
      if (AV._selEntries.size > 0) {
        e.preventDefault();
        History.push();
        const ap = PR.activePattern;
        for (const track of ProjectState.tracks) {
          const before = track.arrangement.length;
          track.arrangement = track.arrangement.filter(en => !AV._selEntries.has(en));
          if (before !== track.arrangement.length && ap) {
            const stillExists = track.arrangement.some(en => en.patternId === ap.pattern.id);
            if (!stillExists) {
              document.getElementById('pianoroll-panel').style.display = 'none';
              document.getElementById('panel-divider').style.display = 'none';
              PR.activePattern = null;
              AV.resize();
            }
          }
        }
        AV._selEntries.clear();
        ProjectState.selectedPatternId = null;
        AV.draw();
        return;
      }
      // Delete selected piano roll notes
      const ap = PR.activePattern;
      if (!ap) return;
      e.preventDefault();
      if (!ap.pattern.notes.some(n => n.selected)) return;
      History.push();
      ap.pattern.notes = ap.pattern.notes.filter(n => !n.selected);
      PR.draw(); PR.drawVelocity();
    }
  });
  document.getElementById('btn-rec').onclick = () => {
    const t = ProjectState.tracks.find(t => t.id === ProjectState.selectedTrackId);
    if (!t || t.channelType !== 'dpcm') return;
    ProjectState.armedTrackId = ProjectState.armedTrackId === t.id ? null : t.id;
    const recBtn = document.getElementById('btn-rec');
    recBtn.classList.toggle('armed', !!ProjectState.armedTrackId);
  };
}

// ============================================================
// MODULE: ExportEngine
// ============================================================
const ExportEngine = {

  async renderOffline() {
    const songBars = getSongLengthBars();
    const durationSecs = barToSeconds(songBars) + 0.5; // pad
    // Use real context sample rate — iOS defaults to 48000, not 44100
    const sampleRate = getAudioCtx().sampleRate;
    const offCtx = new OfflineAudioContext(2, Math.ceil(sampleRate * durationSecs), sampleRate);

    // Swap audioCtx temporarily
    const realCtx = audioCtx;
    audioCtx = offCtx;
    masterGain.node = null;
    _reverbCache['room'] = null; _reverbCache['hall'] = null;

    // Schedule all notes
    for (const track of ProjectState.tracks) {
      for (const entry of track.arrangement) {
        const pat = track.patterns.find(p => p.id === entry.patternId);
        if (!pat) continue;
        const patStart = barToSeconds(entry.startBar);
        for (const note of pat.notes) {
          const t = patStart + barToSeconds(note.start);
          if (t < durationSecs) playNote(track, note, t);
        }
      }
    }

    const rendered = await offCtx.startRendering();

    // Restore real context. Clear reverb cache — offline ConvolverNodes cannot be
    // reused in a different AudioContext and would throw NotSupportedError.
    audioCtx = realCtx;
    masterGain.node = null;
    for (const k in _reverbCache) delete _reverbCache[k];

    return rendered;
  },

  encodeWAV(audioBuffer) {
    const numCh = audioBuffer.numberOfChannels;
    const sr = audioBuffer.sampleRate;
    const bps = 16;
    const blockAlign = numCh * (bps / 8);
    const dataLen = audioBuffer.length * blockAlign;
    const buf = new ArrayBuffer(44 + dataLen);
    const v = new DataView(buf);
    const ws = (off, s) => { for (let i=0;i<s.length;i++) v.setUint8(off+i, s.charCodeAt(i)); };
    ws(0,'RIFF'); v.setUint32(4, 36+dataLen, true);
    ws(8,'WAVE'); ws(12,'fmt ');
    v.setUint32(16,16,true); v.setUint16(20,1,true);
    v.setUint16(22,numCh,true); v.setUint32(24,sr,true);
    v.setUint32(28,sr*blockAlign,true);
    v.setUint16(32,blockAlign,true); v.setUint16(34,bps,true);
    ws(36,'data'); v.setUint32(40,dataLen,true);
    let off = 44;
    for (let i=0;i<audioBuffer.length;i++) {
      for (let ch=0;ch<numCh;ch++) {
        const s = Math.max(-1, Math.min(1, audioBuffer.getChannelData(ch)[i]));
        v.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        off += 2;
      }
    }
    return buf;
  },

  downloadBlob(data, filename, mime) {
    const blob = new Blob([data], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
  },

  async exportWAV() {
    const btn = document.getElementById('exp-wav');
    if (btn) btn.textContent = 'RENDERING...';
    try {
      const buf = await this.renderOffline();
      const wav = this.encodeWAV(buf);
      this.downloadBlob(wav, 'nesforge-export.wav', 'audio/wav');
    } catch(e) {
      alert('WAV export failed: ' + e.message);
    } finally {
      if (btn) btn.textContent = 'EXPORT WAV';
    }
  },

  // --- MIDI Binary Encoding ---
  encodeVarLen(v) {
    const out = [];
    out.push(v & 0x7F);
    v >>= 7;
    while (v > 0) { out.push((v & 0x7F) | 0x80); v >>= 7; }
    return out.reverse();
  },

  buildMIDITrack(notes, bpm, ticksPerBeat) {
    const usecsPerBeat = Math.round(60000000 / bpm);
    const events = [];

    // Tempo meta event at time 0
    events.push({ tick: 0, bytes: [0xFF, 0x51, 0x03,
      (usecsPerBeat >> 16) & 0xFF, (usecsPerBeat >> 8) & 0xFF, usecsPerBeat & 0xFF] });

    // Convert notes to on/off events
    const noteEvents = [];
    for (const note of notes) {
      const startTick = Math.round(note.start * ProjectState.timeSignature[0] * ticksPerBeat);
      const durTick = Math.round(note.duration * ProjectState.timeSignature[0] * ticksPerBeat);
      noteEvents.push({ tick: startTick, bytes: [0x90, note.pitch, note.velocity || 100] });
      noteEvents.push({ tick: startTick + durTick, bytes: [0x80, note.pitch, 0] });
    }
    noteEvents.sort((a,b) => a.tick - b.tick);
    events.push(...noteEvents);
    events.push({ tick: events.reduce((m,e) => Math.max(m,e.tick), 0) + ticksPerBeat,
      bytes: [0xFF, 0x2F, 0x00] }); // end of track

    // Build bytes with delta times
    let lastTick = 0;
    const bytes = [];
    for (const ev of events) {
      const delta = ev.tick - lastTick;
      lastTick = ev.tick;
      bytes.push(...this.encodeVarLen(delta));
      bytes.push(...ev.bytes);
    }

    // MTrk chunk
    const header = [0x4D,0x54,0x72,0x6B]; // MTrk
    const lenBytes = [(bytes.length>>24)&0xFF,(bytes.length>>16)&0xFF,(bytes.length>>8)&0xFF,bytes.length&0xFF];
    return [...header, ...lenBytes, ...bytes];
  },

  buildMIDIFile(trackDataArrays) {
    const ticksPerBeat = 480;
    const nTracks = trackDataArrays.length;
    // MThd header
    const header = [
      0x4D,0x54,0x68,0x64, // MThd
      0,0,0,6,             // chunk length
      0,1,                 // format 1
      (nTracks>>8)&0xFF, nTracks&0xFF,
      (ticksPerBeat>>8)&0xFF, ticksPerBeat&0xFF
    ];
    const all = [...header];
    for (const td of trackDataArrays) all.push(...td);
    return new Uint8Array(all).buffer;
  },

  exportMIDICombined() {
    const ticksPerBeat = 480;
    const trackData = ProjectState.tracks.map(track => {
      const allNotes = [];
      for (const entry of track.arrangement) {
        const pat = track.patterns.find(p => p.id === entry.patternId);
        if (!pat) continue;
        for (const note of pat.notes) {
          // note.start and entry.startBar are both in bars — just add them directly
          allNotes.push({ ...note, start: note.start + entry.startBar });
        }
      }
      return this.buildMIDITrack(allNotes, ProjectState.bpm, ticksPerBeat);
    });
    // Add tempo track as first track
    const tempoTrack = this.buildMIDITrack([], ProjectState.bpm, ticksPerBeat);
    const midi = this.buildMIDIFile([tempoTrack, ...trackData]);
    this.downloadBlob(midi, 'nesforge-combined.mid', 'audio/midi');
  },

  async exportMIDIStems() {
    const ticksPerBeat = 480;
    const zip = new JSZip();
    for (const track of ProjectState.tracks) {
      const allNotes = [];
      for (const entry of track.arrangement) {
        const pat = track.patterns.find(p => p.id === entry.patternId);
        if (!pat) continue;
        for (const note of pat.notes) {
          // note.start and entry.startBar are both in bars — just add them directly
          allNotes.push({ ...note, start: note.start + entry.startBar });
        }
      }
      const trackData = this.buildMIDITrack(allNotes, ProjectState.bpm, ticksPerBeat);
      const tempoTrack = this.buildMIDITrack([], ProjectState.bpm, ticksPerBeat);
      const midi = this.buildMIDIFile([tempoTrack, trackData]);
      zip.file(track.name.replace(/[^a-zA-Z0-9]/g,'_') + '.mid', midi);
    }
    const blob = await zip.generateAsync({ type: 'blob' });
    this.downloadBlob(blob, 'nesforge-stems.zip', 'application/zip');
  },

  saveProject() {
    const state = JSON.parse(JSON.stringify(ProjectState));
    // Serialize Float32Arrays as base64
    for (const track of state.tracks) {
      if (track.sample) {
        const bytes = new Uint8Array(track.sample.buffer);
        let b64 = '';
        for (let i = 0; i < bytes.length; i++) b64 += String.fromCharCode(bytes[i]);
        track.sample = { _base64: btoa(b64) };
      }
    }
    for (const track of state.tracks)
      for (const pat of track.patterns)
        for (const note of pat.notes)
          delete note.selected;
    this.downloadBlob(JSON.stringify(state, null, 2), 'nesforge-project.json', 'application/json');
  },

  loadProject(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const state = JSON.parse(e.target.result);
      for (const track of state.tracks) {
        if (track.sample && track.sample._base64) {
          const bin = atob(track.sample._base64);
          const bytes = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
          track.sample = new Float32Array(bytes.buffer);
        }
      }
      Object.assign(ProjectState, state);
      // Recreate waveform canvas elements for DPCM tracks (EventBus.on('track:added') is not fired during load)
      for (const track of ProjectState.tracks) {
        if (track.channelType === 'dpcm' && !document.getElementById('waveform-' + track.id)) {
          const wc = document.createElement('canvas');
          wc.id = 'waveform-' + track.id;
          wc.width = 80; wc.height = 30;
          wc.style.cssText = 'position:absolute;display:none;';
          document.body.appendChild(wc);
        }
      }
      AV.resize(); AV.draw();
      if (PR.activePattern) PR.draw();
      EventBus.emit('project:loaded');
    };
    reader.readAsText(file);
  },

  showModal() {
    let modal = document.getElementById('export-modal');
    modal.style.display = 'flex';
    modal.innerHTML = `
      <div style="background:#46425e;border:2px solid #15788c;padding:16px;min-width:240px;border-radius:0;">
        <div style="font:8px 'Press Start 2P';color:#00b9be;margin-bottom:12px;">EXPORT</div>
        <button class="nes-btn" id="exp-wav" style="display:block;width:100%;margin-bottom:6px;">EXPORT WAV</button>
        <button class="nes-btn" id="exp-midi" style="display:block;width:100%;margin-bottom:6px;">EXPORT MIDI</button>
        <button class="nes-btn" id="exp-stems" style="display:block;width:100%;margin-bottom:12px;">EXPORT STEMS</button>
        <button class="nes-btn" onclick="document.getElementById('export-modal').style.display='none'">CLOSE</button>
      </div>`;
    modal.style.cssText = 'display:flex;position:fixed;inset:0;background:rgba(0,0,0,0.7);' +
      'align-items:center;justify-content:center;z-index:2000;';
    document.getElementById('exp-wav').onclick = () => ExportEngine.exportWAV();
    document.getElementById('exp-midi').onclick = () => ExportEngine.exportMIDICombined();
    document.getElementById('exp-stems').onclick = () => ExportEngine.exportMIDIStems();
  }
};

  function createDemoState() {
    // "Castle of Dread" — Castlevania-style NES track
    // 174 BPM · D minor · 4 bars · looped
    ProjectState.bpm = 174;
    ProjectState.key = 'D';
    ProjectState.scale = 'Minor';
    ProjectState.loopStart = 0;
    ProjectState.loopEnd = 4;
    ProjectState.loopEnabled = true;

    // Update LCD displays (buildTopBar already ran)
    const _bi = document.getElementById('bpm-input');   if (_bi) _bi.value = 174;
    const _ks = document.getElementById('key-sel');     if (_ks) _ks.value = 'D';
    const _ss = document.getElementById('scale-sel');   if (_ss) _ss.value = 'Minor';

    // Note constructor (no id — not needed for demo notes)
    const n = (pitch, start, dur, vel) => ({ pitch, start, duration: dur, velocity: vel });
    const SX = 0.0625; // 16th note
    const EI = 0.125;  // 8th note

    // MIDI pitch constants
    const A1=33, Bb1=34, C2=36, D2=38, E2=40, F2=41, G2=43, A2=45,
          C4=60, Cs4=61, D4=62, Eb4=63, E4=64, F4=65, Fs4=66, G4=67,
          Ab4=68, A4=69, Bb4=70, B4=71, C5=72, D5=74;

    // ── Track 1: Lead (Pulse 25% · Fuzz Med · Vibrato Low) ──────────────────
    const lead = addTrack('pulse25', 'Lead');
    lead.fuzz = 'med'; lead.vibrato = 'low';
    const leadPat = addPattern(lead.id, 0, 4);

    // Bar 1: D4 ascent to D5, tritone Ab4, chromatic descent
    leadPat.notes.push(
      n(D4, 0.0000, SX, 110), n(F4, 0.0625, SX, 90),
      n(A4, 0.125,  SX, 110), n(C5, 0.1875, SX, 90),
      n(D5, 0.250,  EI, 110),
      n(C5, 0.375,  SX, 90),  n(Bb4,0.4375, SX, 110),
      n(A4, 0.500,  SX, 90),  n(Ab4,0.5625, SX, 110), // tritone
      n(G4, 0.625,  SX, 90),  n(F4, 0.6875, SX, 110),
      n(E4, 0.750,  SX, 90),  n(Eb4,0.8125, SX, 110), // chromatic
      n(D4, 0.875,  EI, 90)
    );
    // Bar 2: diminished arpeggio D–F–Ab–B cycling, then ascend
    leadPat.notes.push(
      n(D4, 1.0000, SX, 110), n(F4, 1.0625, SX, 90),
      n(Ab4,1.125,  SX, 110), n(B4, 1.1875, SX, 90), // dim arp
      n(D5, 1.250,  SX, 110), n(B4, 1.3125, SX, 90),
      n(Ab4,1.375,  SX, 110), n(F4, 1.4375, SX, 90),
      n(E4, 1.500,  SX, 110), n(F4, 1.5625, SX, 90),
      n(G4, 1.625,  SX, 110), n(A4, 1.6875, SX, 90),
      n(Bb4,1.750,  EI, 110),
      n(A4, 1.875,  SX, 90),  n(G4, 1.9375, SX, 110)
    );
    // Bar 3: chromatic A4→D4 descent, leap to C5, descend
    leadPat.notes.push(
      n(A4, 2.0000, SX, 90),  n(Ab4,2.0625, SX, 110), // tritone
      n(G4, 2.125,  SX, 90),  n(Fs4,2.1875, SX, 110), // chromatic F#
      n(F4, 2.250,  SX, 90),  n(E4, 2.3125, SX, 110),
      n(Eb4,2.375,  SX, 90),  n(D4, 2.4375, SX, 110), // chromatic Eb
      n(C5, 2.500,  EI, 90),
      n(Bb4,2.625,  SX, 110), n(A4, 2.6875, SX, 90),
      n(G4, 2.750,  SX, 110), n(F4, 2.8125, SX, 90),
      n(E4, 2.875,  SX, 110), n(F4, 2.9375, SX, 90)
    );
    // Bar 4: tritone tension, resolve to D4 via chromatic C→C#→D
    leadPat.notes.push(
      n(G4, 3.0000, SX, 110), n(Ab4,3.0625, SX, 90),  // tritone
      n(A4, 3.125,  EI, 110),
      n(G4, 3.250,  SX, 90),  n(F4, 3.3125, SX, 110),
      n(E4, 3.375,  SX, 90),  n(Eb4,3.4375, SX, 110), // chromatic
      n(D4, 3.500,  EI, 90),
      n(C4, 3.625,  SX, 110), n(Cs4,3.6875, SX, 90),  // C→C#→D chromatic
      n(D4, 3.750,  EI, 110),
      n(D4, 3.875,  SX, 90)
    );

    // ── Track 2: Harmony (Pulse 50% · no effects) ───────────────────────────
    const harm = addTrack('pulse50', 'Harmony');
    const harmPat = addPattern(harm.id, 0, 4);
    // Chord tones on beats 1 and 3, staccato 8th note stabs
    // Dm→Dm | A→Bb | Gm→A | Bb→A
    harmPat.notes.push(
      n(F4,  0.0, EI, 95), n(A4,  0.5, EI, 95), // Bar 1: Dm (3rd, 5th)
      n(Cs4, 1.0, EI, 95), n(D4,  1.5, EI, 95), // Bar 2: A-major (3rd), Bb (3rd)
      n(Bb4, 2.0, EI, 95), n(E4,  2.5, EI, 95), // Bar 3: Gm (3rd), A (5th)
      n(F4,  3.0, EI, 95), n(Cs4, 3.5, EI, 95)  // Bar 4: Bb (5th), A leading tone
    );

    // ── Track 3: Bass (Triangle · no effects · relentless 8th-note root-fifth)
    const bass = addTrack('triangle', 'Bass');
    const bassPat = addPattern(bass.id, 0, 4);
    // Bar 1: Dm, Bar 2: Cm, Bar 3: Bb, Bar 4: Am — root/fifth alternating
    [[D2,A2],[C2,G2],[Bb1,F2],[A1,E2]].forEach(([root, fifth], bar) => {
      for (let e = 0; e < 8; e++)
        bassPat.notes.push(n(e % 2 === 0 ? root : fifth, bar + e * EI, EI, 100));
    });

    // ── Track 4: Drums (Noise · no effects) ─────────────────────────────────
    const drums = addTrack('pcm7', 'Drums');
    const drumPat = addPattern(drums.id, 0, 4);
    const KICK=36, SNARE=38, HAT=42;
    for (let bar = 0; bar < 4; bar++) {
      // Hi-hat every 8th note
      for (let e = 0; e < 8; e++)
        drumPat.notes.push(n(HAT, bar + e * EI, SX, 80));
      // Kick: beat 1, beat 2.5 (and-of-2), beat 3
      drumPat.notes.push(n(KICK, bar + 0.000, SX, 120));
      drumPat.notes.push(n(KICK, bar + 0.375, SX, 120));
      drumPat.notes.push(n(KICK, bar + 0.500, SX, 120));
      // Snare: beat 2
      drumPat.notes.push(n(SNARE, bar + 0.250, SX, 110));
      if (bar % 2 === 0) {
        // Bars 1 & 3: snare on beat 4
        drumPat.notes.push(n(SNARE, bar + 0.750, SX, 110));
      } else {
        // Bars 2 & 4: snare roll (4× 16th) on beat 4
        for (let r = 0; r < 4; r++)
          drumPat.notes.push(n(SNARE, bar + 0.750 + r * SX, SX, r === 0 ? 110 : 90));
      }
    }

    // ── Track 5: Arp (Pulse 25% · Delay Short · bars 2 and 4 only) ─────────
    const arp = addTrack('pulse25', 'Arp');
    arp.delay = 'short';
    const arpPat = addPattern(arp.id, 0, 4);
    // D–F–Ab–B dim7 arpeggio cycling in 16th notes
    const arpNotes = [D4, F4, Ab4, B4];
    [1, 3].forEach(bar => {
      for (let i = 0; i < 16; i++)
        arpPat.notes.push(n(arpNotes[i % 4], bar + i * SX, SX, 75));
    });
  }

  // ============================================================
  // MODULE: MobileUI
  // ============================================================
  const MobileUI = {
    _initialized: false,
    activeTrackId: null,
    currentBar: 0,
    numBars: 2,
    currentPitch: 60, // middle C
    _rafId: null,
    _lastActiveStep: -1,
    _velPickerStep: null,
    _tapTimes: [],
    _longPressTimer: null,
    _swipeStartX: null,
    _swipeStartY: null,

    isMobile() {
      // visualViewport is more reliable than innerWidth on mobile browsers
      // Falls back to innerWidth if visualViewport not available
      const w = window.visualViewport
        ? window.visualViewport.width
        : window.innerWidth;
      return w < 768;
    },

    checkLayout() {
      if (this.isMobile()) {
        document.body.classList.add('mobile-mode');
        // Zero out desktop canvases — canvas pixel width attributes inflate
        // document.scrollWidth on iOS even when the parent is display:none,
        // causing 100% width on mobile children to resolve wider than viewport
        ['arrangement-canvas','pianoroll-canvas','velocity-canvas'].forEach(id => {
          const c = document.getElementById(id);
          if (c) { c.width = 1; c.height = 1; }
        });
        if (!this._initialized) this._init();
        this._syncFromProject();
        this._startRaf();
      } else {
        document.body.classList.remove('mobile-mode');
        this._stopRaf();
        // Restore canvas dimensions for desktop
        if (typeof AV !== 'undefined') { AV.resize(); AV.draw(); }
      }
    },

    _init() {
      this._initialized = true;

      // Populate key select
      const keySel = document.getElementById('mob-key-sel');
      const NOTE_ORDER = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
      NOTE_ORDER.forEach(k => {
        const o = document.createElement('option');
        o.value = k; o.textContent = k;
        if (k === ProjectState.key) o.selected = true;
        keySel.appendChild(o);
      });
      keySel.addEventListener('change', () => {
        ProjectState.key = keySel.value;
      });

      // Populate scale select
      const scaleSel = document.getElementById('mob-scale-sel');
      Object.keys(Scales.SCALES).forEach(s => {
        const o = document.createElement('option');
        o.value = s; o.textContent = s.substring(0, 8);
        if (s === ProjectState.scale) o.selected = true;
        scaleSel.appendChild(o);
      });
      scaleSel.addEventListener('change', () => {
        ProjectState.scale = scaleSel.value;
      });

      // BPM display — tap to enter BPM manually
      document.getElementById('mob-bpm-display').addEventListener('click', () => {
        const val = prompt('BPM:', ProjectState.bpm);
        if (val !== null) {
          const n = parseInt(val, 10);
          if (!isNaN(n) && n >= 20 && n <= 300) {
            ProjectState.bpm = n;
            document.getElementById('mob-bpm-display').textContent = n;
            if (typeof Sequencer !== 'undefined') Sequencer.updateTiming && Sequencer.updateTiming();
          }
        }
      });

      // Play button
      document.getElementById('mob-play-btn').addEventListener('click', function() {
        var ctx = getAudioCtx();
        function doPlay() {
          if (typeof Sequencer === 'undefined') return;
          if (Sequencer._playing) {
            Sequencer.stop();
            document.getElementById('mob-play-btn').textContent = '▶';
          } else {
            Sequencer.play();
            document.getElementById('mob-play-btn').textContent = '⏹';
            MobileUI._startRaf();
          }
        }
        // Use !== 'running' to catch 'suspended' AND 'interrupted' (iOS Chrome)
        if (ctx.state !== 'running') {
          ctx.resume().then(doPlay).catch(function() { doPlay(); });
        } else {
          doPlay();
        }
      });

      // Stop button
      document.getElementById('mob-stop-btn').addEventListener('click', async () => {
        const ctx = getAudioCtx();
        if (ctx.state === 'suspended') await ctx.resume();
        if (typeof Sequencer !== 'undefined') Sequencer.stop();
        document.getElementById('mob-play-btn').textContent = '▶';
        this._stopRaf();
        document.getElementById('mob-playhead-fill').style.width = '0%';
        this._lastActiveStep = -1;
        const steps = document.querySelectorAll('.mob-step');
        steps.forEach(s => s.classList.remove('active-step'));
      });

      // Loop button
      const loopBtn = document.getElementById('mob-loop-btn');
      loopBtn.classList.toggle('on', ProjectState.loopEnabled);
      loopBtn.style.borderColor = ProjectState.loopEnabled ? 'var(--hi)' : '';
      loopBtn.addEventListener('click', () => {
        ProjectState.loopEnabled = !ProjectState.loopEnabled;
        loopBtn.style.borderColor = ProjectState.loopEnabled ? 'var(--hi)' : '';
        this._showToast(ProjectState.loopEnabled ? 'LOOP ON' : 'LOOP OFF');
      });

      // Tap tempo
      document.getElementById('mob-tap-btn').addEventListener('click', () => {
        const now = performance.now();
        this._tapTimes.push(now);
        // Keep last 8 taps
        if (this._tapTimes.length > 8) this._tapTimes.shift();
        if (this._tapTimes.length >= 2) {
          const intervals = [];
          for (let i = 1; i < this._tapTimes.length; i++) {
            intervals.push(this._tapTimes[i] - this._tapTimes[i - 1]);
          }
          const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;
          const bpm = Math.round(60000 / avg);
          if (bpm >= 20 && bpm <= 300) {
            ProjectState.bpm = bpm;
            document.getElementById('mob-bpm-display').textContent = bpm;
            if (typeof Sequencer !== 'undefined') Sequencer.updateTiming && Sequencer.updateTiming();
          }
        }
        // Reset tap times after 2s of no taps
        clearTimeout(this._tapResetTimer);
        this._tapResetTimer = setTimeout(() => { this._tapTimes = []; }, 2000);
      });

      // Bar navigation
      document.getElementById('mob-prev-bar').addEventListener('click', () => {
        if (this.currentBar > 0) {
          this.currentBar--;
          this._renderBarDots();
          this._renderGrid();
        }
      });
      document.getElementById('mob-next-bar').addEventListener('click', () => {
        if (this.currentBar < this.numBars - 1) {
          this.currentBar++;
          this._renderBarDots();
          this._renderGrid();
        }
      });

      // Add bar
      document.getElementById('mob-add-bar').addEventListener('click', () => {
        this.numBars++;
        // Sync all tracks' mobile patterns to new length
        for (const track of ProjectState.tracks) {
          const pat = this._getMobilePattern(track);
          // _getMobilePattern already ensures pat.lengthBars >= numBars
        }
        // Update loop region if needed
        if (ProjectState.loopEnabled) {
          ProjectState.loopEnd = Math.max(ProjectState.loopEnd, this.numBars);
        }
        this._renderBarDots();
        this._showToast('BARS: ' + this.numBars);
      });

      // Remove bar
      document.getElementById('mob-rem-bar').addEventListener('click', () => {
        if (this.numBars <= 1) { this._showToast('MIN 1 BAR'); return; }
        this.numBars--;
        if (this.currentBar >= this.numBars) {
          this.currentBar = this.numBars - 1;
        }
        this._renderBarDots();
        this._renderGrid();
        this._showToast('BARS: ' + this.numBars);
      });

      // Swipe on grid area
      const gridArea = document.getElementById('mob-grid-area');
      gridArea.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          this._swipeStartX = e.touches[0].clientX;
          this._swipeStartY = e.touches[0].clientY;
        }
      }, { passive: true });
      gridArea.addEventListener('touchend', (e) => {
        if (this._swipeStartX === null) return;
        const dx = e.changedTouches[0].clientX - this._swipeStartX;
        const dy = e.changedTouches[0].clientY - this._swipeStartY;
        if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          if (dx < 0 && this.currentBar < this.numBars - 1) {
            this.currentBar++;
            this._renderBarDots();
            this._renderGrid();
          } else if (dx > 0 && this.currentBar > 0) {
            this.currentBar--;
            this._renderBarDots();
            this._renderGrid();
          }
        }
        this._swipeStartX = null;
        this._swipeStartY = null;
      }, { passive: true });

      // Export button
      document.getElementById('mob-export-btn').addEventListener('click', () => {
        document.getElementById('mob-export-dialog').classList.add('open');
      });
      document.getElementById('mob-export-close-btn').addEventListener('click', () => {
        document.getElementById('mob-export-dialog').classList.remove('open');
      });
      document.getElementById('mob-export-dialog').addEventListener('click', (e) => {
        if (e.target === document.getElementById('mob-export-dialog')) {
          document.getElementById('mob-export-dialog').classList.remove('open');
        }
      });
      document.getElementById('mob-exp-share').addEventListener('click', async () => {
        document.getElementById('mob-export-dialog').classList.remove('open');
        await this._shareAudio();
      });
      document.getElementById('mob-exp-wav').addEventListener('click', async () => {
        document.getElementById('mob-export-dialog').classList.remove('open');
        this._showToast('RENDERING...');
        try {
          const buf = await ExportEngine.renderOffline();
          const wav = ExportEngine.encodeWAV(buf);
          ExportEngine.downloadBlob(wav, 'nesforge-' + Date.now() + '.wav', 'audio/wav');
        } catch (err) {
          this._showToast('ERROR: ' + err.message);
        }
      });
      document.getElementById('mob-exp-midi').addEventListener('click', () => {
        document.getElementById('mob-export-dialog').classList.remove('open');
        ExportEngine.exportMIDICombined();
      });

      // Velocity picker done button
      document.getElementById('mob-vel-done').addEventListener('click', () => {
        this._closeVelPicker();
      });
      document.getElementById('mob-vel-slider').addEventListener('input', (e) => {
        const val = parseInt(e.target.value, 10);
        document.getElementById('mob-vel-picker-label').textContent = 'VELOCITY: ' + val;
        if (this._velPickerStep !== null) {
          this._applyVelocity(this._velPickerStep, val);
        }
      });

      // Double rAF: first fires before paint, second fires after layout is committed
      // Single rAF is not enough on iOS Safari/Chrome — grid has 0 width on first frame
      this._renderKeyboard();
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          this._renderTracks();
          this._renderBarDots();
          this._renderGrid();
          // Force grid reflow by reading offsetWidth then re-rendering
          const grid = document.getElementById('mob-grid');
          if (grid && grid.offsetWidth < 100) {
            // Grid still hasn't expanded — try once more after a tick
            setTimeout(() => { this._renderGrid(); }, 50);
          }
        });
      });
    },

    _syncFromProject() {
      // Sync BPM display
      document.getElementById('mob-bpm-display').textContent = ProjectState.bpm;
      // Sync key/scale selects
      const keySel = document.getElementById('mob-key-sel');
      const scaleSel = document.getElementById('mob-scale-sel');
      if (keySel) keySel.value = ProjectState.key;
      if (scaleSel) scaleSel.value = ProjectState.scale;
    },

    _getMobilePattern(track) {
      // Find pattern at startBar === 0
      let entry = track.arrangement.find(e => e.startBar === 0);
      let pat = null;
      if (entry) {
        pat = track.patterns.find(p => p.id === entry.patternId);
      }
      if (!pat) {
        pat = addPattern(track.id, 0, this.numBars);
      }
      // Ensure length >= numBars (never shrink)
      if (pat.lengthBars < this.numBars) {
        pat.lengthBars = this.numBars;
      }
      return pat;
    },

    _getSteps() {
      const track = ProjectState.tracks.find(t => t.id === this.activeTrackId);
      if (!track) return new Array(16).fill(null);
      const pat = this._getMobilePattern(track);
      const bar = this.currentBar;
      const steps = new Array(16).fill(null);
      for (const note of pat.notes) {
        if (Math.abs(note.pitch - this.currentPitch) < 0.5) {
          const stepFloat = (note.start - bar) * 16;
          const stepIdx = Math.round(stepFloat);
          if (stepIdx >= 0 && stepIdx < 16 && Math.abs(stepFloat - stepIdx) < 0.05) {
            steps[stepIdx] = note;
          }
        }
      }
      return steps;
    },

    _toggleStep(stepIdx) {
      const track = ProjectState.tracks.find(t => t.id === this.activeTrackId);
      if (!track) return;
      const pat = this._getMobilePattern(track);
      const noteStart = this.currentBar + stepIdx / 16;
      const noteDur = 1 / 16;

      // Check if note exists at this step+pitch
      const existingIdx = pat.notes.findIndex(n =>
        Math.abs(n.start - noteStart) < 0.002 &&
        Math.abs(n.pitch - this.currentPitch) < 0.5
      );

      if (existingIdx >= 0) {
        // Remove note
        pat.notes.splice(existingIdx, 1);
      } else {
        // Add note
        const newNote = {
          id: makeId(),
          pitch: this.currentPitch,
          start: noteStart,
          duration: noteDur,
          velocity: 100
        };
        pat.notes.push(newNote);
        // Preview sound
        try {
          const ctx = getAudioCtx();
          playNote(track, newNote, ctx.currentTime + 0.01);
        } catch (e) { /* silent fail */ }
      }
      this._renderGrid();
    },

    _applyVelocity(stepIdx, velocity) {
      const track = ProjectState.tracks.find(t => t.id === this.activeTrackId);
      if (!track) return;
      const pat = this._getMobilePattern(track);
      const noteStart = this.currentBar + stepIdx / 16;
      const note = pat.notes.find(n =>
        Math.abs(n.start - noteStart) < 0.002 &&
        Math.abs(n.pitch - this.currentPitch) < 0.5
      );
      if (note) {
        note.velocity = velocity;
        this._renderGrid();
      }
    },

    _renderTracks() {
      const container = document.getElementById('mob-tracks');
      if (!container) return;
      container.innerHTML = '';
      for (const track of ProjectState.tracks) {
        const btn = document.createElement('button');
        btn.className = 'mob-track-btn' + (track.id === this.activeTrackId ? ' active' : '');
        const color = (typeof PR !== 'undefined' && PR.NOTE_COLORS && PR.NOTE_COLORS[track.channelType]) || '#ff6973';
        const dot = document.createElement('div');
        dot.className = 'mob-track-color-dot';
        dot.style.background = color;
        btn.appendChild(dot);
        const label = document.createElement('span');
        label.textContent = (track.name || track.channelType).substring(0, 6);
        btn.appendChild(label);
        btn.addEventListener('click', () => {
          this.activeTrackId = track.id;
          this._renderTracks();
          this._renderGrid();
          try {
            const ctx = getAudioCtx();
            const fakeNote = { pitch: this.currentPitch, duration: 1/16, velocity: 100 };
            playNote(track, fakeNote, ctx.currentTime + 0.01);
          } catch (e) { /* silent */ }
        });
        container.appendChild(btn);
      }
      // If no active track, pick first
      if (!this.activeTrackId && ProjectState.tracks.length > 0) {
        this.activeTrackId = ProjectState.tracks[0].id;
        this._renderTracks();
      }
    },

    _renderGrid() {
      const container = document.getElementById('mob-grid');
      if (!container) return;
      container.innerHTML = '';
      const track = ProjectState.tracks.find(t => t.id === this.activeTrackId);
      const steps = this._getSteps();
      const color = track ? ((typeof PR !== 'undefined' && PR.NOTE_COLORS && PR.NOTE_COLORS[track.channelType]) || '#ff6973') : '#ff6973';

      for (let i = 0; i < 16; i++) {
        const btn = document.createElement('button');
        btn.className = 'mob-step' + (steps[i] ? ' on' : '');
        btn.dataset.step = i;
        if (steps[i]) {
          btn.style.background = color;
        } else {
          btn.style.background = '';
        }
        // Beat marker (every 4 steps = 1 beat)
        if (i % 4 === 0) {
          const marker = document.createElement('div');
          marker.className = 'mob-step-beat-marker';
          marker.textContent = (i / 4 + 1);
          btn.appendChild(marker);
        }
        // Velocity indicator
        if (steps[i]) {
          const vel = steps[i].velocity || 100;
          const bars = vel >= 90 ? '▮▮▮' : vel >= 55 ? '▮▮' : '▮';
          const velEl = document.createElement('div');
          velEl.className = 'mob-step-vel';
          velEl.textContent = bars;
          btn.appendChild(velEl);
        }

        // Touch/pointer events for tap + long press
        let pressTimer = null;
        let didLongPress = false;

        btn.addEventListener('pointerdown', (e) => {
          var _sc = getAudioCtx();
          if (_sc.state === 'suspended') _sc.resume();
          didLongPress = false;
          pressTimer = setTimeout(() => {
            didLongPress = true;
            if (steps[i]) {
              this._openVelPicker(i, steps[i].velocity || 100, e);
            }
          }, 500);
        });

        btn.addEventListener('pointerup', () => {
          clearTimeout(pressTimer);
          if (!didLongPress) {
            this._toggleStep(i);
          }
        });

        btn.addEventListener('pointercancel', () => {
          clearTimeout(pressTimer);
        });

        container.appendChild(btn);
      }

      // Restore active step highlight
      if (this._lastActiveStep >= 0) {
        const el = container.querySelector('[data-step="' + this._lastActiveStep + '"]');
        if (el) el.classList.add('active-step');
      }
    },

    _renderKeyboard() {
      const wrap = document.getElementById('mob-keyboard-wrap');
      if (!wrap) return;
      wrap.innerHTML = '';

      const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
      const BLACK_NOTES = new Set([1, 3, 6, 8, 10]); // C#, D#, F#, G#, A#

      // Build keys from MIDI 36 (C2) to 83 (B5)
      const keys = [];
      for (let midi = 36; midi <= 83; midi++) {
        const pc = midi % 12;
        const isBlack = BLACK_NOTES.has(pc);
        keys.push({ midi, pc, isBlack });
      }

      // Do NOT set minWidth on wrap — it inflates parent layout and breaks grid width.
      // The inner container is wider than the wrap; overflow-x:auto handles scrolling.
      wrap.style.minWidth = '';

      // Use a flex row with relative positioning tricks
      // Simpler: render all as inline blocks with margin adjustments
      const container = document.createElement('div');
      container.style.cssText = 'position:relative; display:flex; flex-direction:row; align-items:flex-end; height:48px; flex-shrink:0; width:max-content;';
      wrap.appendChild(container);

      for (const key of keys) {
        const btn = document.createElement('button');
        btn.className = 'mob-piano-key ' + (key.isBlack ? 'black-key' : 'white-key');
        btn.dataset.midi = key.midi;
        if (key.midi === this.currentPitch) btn.classList.add('active-pitch');
        if (!key.isBlack && key.pc === 0) {
          const label = document.createElement('span');
          label.textContent = NOTE_NAMES[0] + Math.floor(key.midi / 12 - 1);
          btn.appendChild(label);
        }
        btn.addEventListener('click', () => {
          this.currentPitch = key.midi;
          document.getElementById('mob-pitch-label').textContent = NOTE_NAMES[key.pc] + Math.floor(key.midi / 12 - 1);
          // Update active key highlight
          wrap.querySelectorAll('.mob-piano-key').forEach(k => k.classList.remove('active-pitch'));
          btn.classList.add('active-pitch');
          // Preview
          const track = ProjectState.tracks.find(t => t.id === this.activeTrackId);
          if (track) {
            try {
              const ctx = getAudioCtx();
              const fakeNote = { pitch: key.midi, duration: 1/16, velocity: 100 };
              playNote(track, fakeNote, ctx.currentTime + 0.01);
            } catch (e) { /* silent */ }
          }
          this._renderGrid();
        });
        container.appendChild(btn);
      }

      // Scroll to show currentPitch
      setTimeout(() => {
        const activeBtn = wrap.querySelector('.active-pitch');
        if (activeBtn) {
          activeBtn.scrollIntoView({ behavior: 'instant', block: 'nearest', inline: 'center' });
        }
      }, 50);
    },

    _renderBarDots() {
      const container = document.getElementById('mob-bar-dots');
      if (!container) return;
      container.innerHTML = '';
      for (let i = 0; i < this.numBars; i++) {
        const dot = document.createElement('div');
        dot.className = 'mob-bar-dot' + (i === this.currentBar ? ' active' : '');
        dot.addEventListener('click', () => {
          this.currentBar = i;
          this._renderBarDots();
          this._renderGrid();
        });
        container.appendChild(dot);
      }
    },

    _openVelPicker(stepIdx, currentVel, pointerEvent) {
      this._velPickerStep = stepIdx;
      const picker = document.getElementById('mob-vel-picker');
      const slider = document.getElementById('mob-vel-slider');
      slider.value = currentVel;
      document.getElementById('mob-vel-picker-label').textContent = 'VELOCITY: ' + currentVel;

      // Position near the pointer
      const x = Math.min(pointerEvent.clientX, window.innerWidth - 160);
      const y = Math.max(pointerEvent.clientY - 120, 8);
      picker.style.left = x + 'px';
      picker.style.top = y + 'px';
      picker.classList.add('open');
    },

    _closeVelPicker() {
      this._velPickerStep = null;
      document.getElementById('mob-vel-picker').classList.remove('open');
    },

    _startRaf() {
      if (this._rafId) return;
      const tick = () => {
        if (!this.isMobile()) { this._rafId = null; return; }
        // Update playhead
        if (typeof Sequencer !== 'undefined' && Sequencer._playing) {
          const bar = ProjectState.playheadBar;
          const relBar = ((bar % this.numBars) - this.currentBar);
          const pct = Math.max(0, Math.min(100, relBar * 100));
          const fill = document.getElementById('mob-playhead-fill');
          if (fill) fill.style.width = pct + '%';

          // Active step highlight
          const barFraction = bar - Math.floor(bar / this.numBars) * this.numBars;
          const activeStep = (barFraction >= this.currentBar && barFraction < this.currentBar + 1)
            ? Math.floor((barFraction - this.currentBar) * 16)
            : -1;

          if (activeStep !== this._lastActiveStep) {
            const grid = document.getElementById('mob-grid');
            if (grid) {
              if (this._lastActiveStep >= 0) {
                const prev = grid.querySelector('[data-step="' + this._lastActiveStep + '"]');
                if (prev) prev.classList.remove('active-step');
              }
              if (activeStep >= 0 && activeStep < 16) {
                const cur = grid.querySelector('[data-step="' + activeStep + '"]');
                if (cur) cur.classList.add('active-step');
              }
            }
            this._lastActiveStep = activeStep;
          }
        } else {
          // Not playing — clear playhead
          const fill = document.getElementById('mob-playhead-fill');
          if (fill && fill.style.width !== '0%') {
            fill.style.width = '0%';
          }
          if (this._lastActiveStep >= 0) {
            const grid = document.getElementById('mob-grid');
            if (grid) {
              const prev = grid.querySelector('[data-step="' + this._lastActiveStep + '"]');
              if (prev) prev.classList.remove('active-step');
            }
            this._lastActiveStep = -1;
          }
        }
        this._rafId = requestAnimationFrame(tick);
      };
      this._rafId = requestAnimationFrame(tick);
    },

    _stopRaf() {
      if (this._rafId) {
        cancelAnimationFrame(this._rafId);
        this._rafId = null;
      }
    },

    _showToast(msg) {
      const toast = document.getElementById('mob-toast');
      if (!toast) return;
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(this._toastTimer);
      this._toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
    },

    _hideToast() {
      const t = document.getElementById('mob-toast');
      if (t) t.classList.remove('show');
    },

    async _shareAudio() {
      this._showToast('RENDERING...');
      try {
        const buf = await ExportEngine.renderOffline();
        const wavData = ExportEngine.encodeWAV(buf);
        const fileName = 'nesforge-' + Date.now() + '.wav';

        // Dismiss rendering toast before opening share sheet
        this._hideToast();

        // Try Web Share API (requires HTTPS — will fail on file://)
        let shared = false;
        if (window.location.protocol === 'https:' &&
            navigator.canShare &&
            typeof navigator.share === 'function') {
          try {
            const wavBlob = new Blob([wavData], { type: 'audio/wav' });
            const file = new File([wavBlob], fileName, { type: 'audio/wav' });
            if (navigator.canShare({ files: [file] })) {
              await navigator.share({ files: [file], title: 'NESForge Track' });
              shared = true;
            }
          } catch(shareErr) {
            if (shareErr.name === 'AbortError') return; // user cancelled — do nothing
            // Any other error: fall through to download
          }
        }

        if (!shared) {
          // Fall back to download + explain why
          ExportEngine.downloadBlob(wavData, fileName, 'audio/wav');
          if (window.location.protocol !== 'https:') {
            this._showToast('OPEN VIA HTTPS TO SHARE DIRECTLY');
          } else {
            this._showToast('SAVED — CHECK YOUR DOWNLOADS');
          }
        }

      } catch (err) {
        if (err && err.name === 'AbortError') return;
        this._showToast('ERROR: ' + (err && err.message ? err.message.substring(0, 30) : 'RENDER FAILED'));
        console.error('Share audio error:', err);
      }
    }
  };

  window.addEventListener('DOMContentLoaded', () => {
    buildTopBar();
    wireTransport();
    wireDivider();
    createDemoState();
    AV.resize();
    AV.draw();
    AV.initEvents();
    PR.initEvents();
    MobileUI.checkLayout();
    window.addEventListener('resize', () => {
      MobileUI.checkLayout();
      if (!MobileUI.isMobile()) { AV.resize(); AV.draw(); PR.resizeCanvases && PR.resizeCanvases(); }
      if (MobileUI.isMobile()) { requestAnimationFrame(() => { MobileUI._renderGrid(); MobileUI._renderTracks(); }); }
    });
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        MobileUI.checkLayout();
        if (!MobileUI.isMobile()) { AV.resize(); AV.draw(); PR.resizeCanvases && PR.resizeCanvases(); }
        if (MobileUI.isMobile()) { requestAnimationFrame(() => { MobileUI._renderGrid(); MobileUI._renderTracks(); }); }
      });
    }

    // iOS Web Audio unlock — must happen inside a real user gesture
    (function() {
      var _audioUnlocked = false;
      function _unlockAudio() {
        if (_audioUnlocked) return;
        // Create context if it doesn't exist yet
        var ctx = getAudioCtx();
        function _afterResume() {
          _audioUnlocked = true;
          // Play silent 1-sample buffer — required to fully unlock iOS Web Audio
          try {
            var silentBuf = ctx.createBuffer(1, 1, ctx.sampleRate);
            var silentSrc = ctx.createBufferSource();
            silentSrc.buffer = silentBuf;
            silentSrc.connect(ctx.destination);
            silentSrc.start(0);
          } catch(e) {}
          // Remove listeners — only need to unlock once
          document.removeEventListener('touchstart', _unlockAudio, true);
          document.removeEventListener('touchend',   _unlockAudio, true);
          document.removeEventListener('click',      _unlockAudio, true);
        }
        if (ctx.state !== 'running') {
          ctx.resume().then(_afterResume).catch(function() {
            // resume() rejected — try again on next gesture
            _audioUnlocked = false;
          });
        } else {
          _afterResume();
        }
      }
      // Listen on touchstart AND touchend AND click for maximum compatibility
      // useCapture:true catches the event before anything else can swallow it
      document.addEventListener('touchstart', _unlockAudio, true);
      document.addEventListener('touchend',   _unlockAudio, true);
      document.addEventListener('click',      _unlockAudio, true);
    })();
  });

  </script>
