<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NESForge</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
  <style>/* STYLES */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* ── Backgrounds ─────────────────────────────────────────── */
  --bg:          #46425e;   /* primary app background */
  --bg-hover:    #3a384e;   /* subtle hover state for cards/panels */
  --bg-deep:     #1e1c30;   /* modals, panels, deep surfaces */
  --bg3:         #15788c;   /* teal — borders, headers, controls */
  --bg-disabled: #444466;   /* inactive/disabled element backgrounds */

  /* ── Accent & Text ───────────────────────────────────────── */
  --hi:          #00ccaa;   /* primary CTA — insert, generate, engaged */
  --hi-dim:      #00b9be;   /* hover/focus state, secondary interactive */
  --accent:      #ff6973;   /* error, delete, warning */
  --accent2:     #ffb0a3;   /* secondary text, soft labels */
  --text:        #ffeecc;   /* primary text */
  --text-dim:    #8888aa;   /* disabled text, hints, sub-labels */

  /* ── Borders ─────────────────────────────────────────────── */
  --border:      2px solid var(--bg3);
  --border-thin: 1px solid var(--bg3);

  /* ── Spacing Scale ───────────────────────────────────────── */
  --space-1: 4px;    /* tight — icon padding, micro gaps */
  --space-2: 8px;    /* standard — button padding, control gaps */
  --space-3: 12px;   /* component — input/card internal padding */
  --space-4: 16px;   /* section — modal content, panel insets */
  --space-5: 24px;   /* large — modal outer padding, section gaps */
  --space-6: 36px;   /* screen — startup screen, hero spacing */

  /* ── Z-Index Scale ───────────────────────────────────────── */
  --z-dropdown:  100;
  --z-modal:     500;
  --z-modal-top: 1000;
  --z-picker:    1500;   /* transient pickers above modals */
  --z-overlay:   8000;
  --z-system:    99999;

  /* ── Typography Scale ────────────────────────────────────── */
  --font:    'Press Start 2P', monospace;
  --t-xs:    8px;    /* sub-labels, canvas overlays, kbd hints */
  --t-sm:    9px;    /* button labels, dropdowns, field labels */
  --t-base:  10px;   /* body text, general UI, note info */
  --t-md:    12px;   /* section headings, emphasis */
  --t-lg:    14px;   /* title text, modal headers */
  --t-xl:    18px;   /* display text, startup screen */
  --t-input: 10px;   /* form controls — prevents iOS auto-zoom */
  --tracking: 0.05em; /* universal letter-spacing */

}
html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 14px; overflow: hidden;
  letter-spacing: var(--tracking); max-width: 100vw;
  -webkit-user-select: none; user-select: none;
  -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
#app { display: flex; flex-direction: column; height: 100vh; width: 100%; max-width: 100vw; }
/* Landscape phone in desktop mode: allow vertical scroll so all panels are reachable */
@media (max-height: 500px) and (pointer: coarse) {
  html, body { overflow-y: auto; height: auto; }
  #app { height: auto; min-height: 100vh; }
  #main { overflow: visible; }
  #arrangement-panel { overflow: visible; }
}
#topbar { height: 64px; background: var(--bg); border-bottom: var(--border);
  display: flex; align-items: center; padding: 0 12px; gap: 6px; flex-shrink: 0; }
.tb-group { display: flex; align-items: center; gap: 4px; }
.tb-vdivider { width: 2px; height: 32px; background: var(--bg3); flex-shrink: 0; margin: 0 4px; }
.tb-spacer { flex: 1; min-width: 0; }
#lcd-box { display: flex; align-items: stretch; background: var(--bg-deep); border: 2px solid var(--bg3); height: 46px; }
.lcd-field { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 10px; gap: 3px; }
.lcd-field + .lcd-field { border-left: 1px solid var(--bg3); }
.lcd-value { font-family: var(--font); font-size: var(--t-base); color: var(--text); display: flex; align-items: center; gap: 3px; }
.lcd-label { font-family: var(--font); font-size: var(--t-xs); color: var(--accent2); letter-spacing: var(--tracking); }
#bpm-display { font-family: var(--font); font-size: var(--t-base); color: var(--text); min-width: 40px; text-align: center; cursor: default; }
input.lcd-input { display: none; }
.bpm-arrow { background: none; border: none; color: var(--bg3); font-family: var(--font); font-size: var(--t-sm); cursor: pointer; padding: 0 1px; line-height: 1; display: block; }
.bpm-arrow:hover { color: var(--hi); }
select.lcd-select { background: transparent !important; border: none !important; color: var(--text); font-family: var(--font); font-size: var(--t-base); padding: 0; cursor: pointer; outline: none; -webkit-appearance: none; appearance: none; }
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#arrangement-panel { flex: 1 1 0; overflow: hidden; min-height: 60px; }
#panel-divider {
  height: 6px; flex-shrink: 0; cursor: ns-resize;
  background: var(--bg3); border-top: 2px solid var(--bg3); border-bottom: 2px solid var(--bg3);
  display: none;
}
#panel-divider:hover, #panel-divider.dragging { background: var(--hi-dim); }
#arrangement-canvas { display: block; touch-action: none; -webkit-touch-callout: none; user-select: none; -webkit-user-select: none; }
#pianoroll-panel { flex: 1 1 0; min-height: 150px; border-top: var(--border); display: flex;
  flex-direction: column; }
#pianoroll-canvas { flex: 1; display: block; touch-action: none; -webkit-touch-callout: none; user-select: none; -webkit-user-select: none; }
#panel-divider { touch-action: none; }
/* ── Design System: Button ───────────────────────────────────── */
.btn {
  background: var(--bg3);
  color: var(--text);
  border-width: 2px;
  border-style: solid;
  border-color: var(--hi-dim);
  font-family: var(--font);
  font-size: var(--t-sm);
  letter-spacing: var(--tracking);
  padding: var(--space-1) var(--space-2);
  cursor: pointer;
  border-radius: 0;
  image-rendering: pixelated;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.btn:hover   { background: var(--hi-dim); color: var(--bg); border-color: var(--hi-dim); }
.btn:active  { background: var(--accent); color: var(--text); border-color: var(--accent); }
.btn--primary { background: var(--hi); color: var(--bg-deep); border-color: var(--hi); }
.btn--primary:hover { background: var(--hi-dim); color: var(--bg); border-color: var(--hi-dim); }
.btn--danger  { background: var(--bg); color: var(--accent); border-color: var(--accent); }
.btn--danger:hover  { background: var(--accent); color: var(--bg-deep); border-color: var(--accent); }
.btn--engaged { background: var(--hi); color: var(--bg-deep); border-color: var(--hi); }
.btn--engaged:hover { background: var(--hi-dim); color: var(--bg-deep); border-color: var(--hi-dim); }
.btn--sm      { font-size: var(--t-xs); padding: 3px var(--space-1); } /* 3px vertical intentional — space-1 too tall for inline track buttons */
.btn--icon    { width: 32px; height: 32px; padding: var(--space-1); }
.btn--full    { width: 100%; }
.btn--mob     {
  border-radius: 2px;
  border-color: transparent;
  border-width: 1px;
  padding: 0 var(--space-3);
  height: 44px;
  min-width: 44px;
}

/* ── Design System: Modals ───────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: var(--z-modal);
}
.modal {
  background: var(--bg-deep);
  border: var(--border);
  padding: var(--space-4);
  display: flex; flex-direction: column; gap: var(--space-3);
  font-family: var(--font);
}
.modal--sm  { width: 320px; }
.modal--lg  { width: min(680px, 94vw); max-height: 90vh; overflow-y: auto; }
.modal-title   { font-size: var(--t-lg); color: var(--text); letter-spacing: var(--tracking); margin-bottom: var(--space-2); }
.modal-section { display: flex; flex-direction: column; gap: var(--space-2); }
.modal-label   { font-size: var(--t-xs); color: var(--text-dim); letter-spacing: var(--tracking); font-family: var(--font); }
.modal-row     { display: flex; align-items: center; gap: var(--space-2); }
.modal-actions { display: flex; gap: var(--space-2); margin-top: var(--space-3); }

/* ── Design System: Form Controls ───────────────────────────── */
.field         { display: flex; flex-direction: column; gap: var(--space-1); }
.field-label   { font-size: var(--t-xs); color: var(--text-dim); letter-spacing: var(--tracking); font-family: var(--font); }
/* .field-input and .field-select share identical base — intentional, may diverge later */
.field-input   { background: var(--bg); color: var(--text); border-width: 2px; border-style: solid; border-color: var(--bg3); font-family: var(--font); font-size: var(--t-input); padding: var(--space-1) var(--space-2); }
.field-select  { background: var(--bg); color: var(--text); border-width: 2px; border-style: solid; border-color: var(--bg3); font-family: var(--font); font-size: var(--t-input); padding: var(--space-1) var(--space-2); }
.field-input:focus, .field-select:focus { border-color: var(--hi-dim); }

/* ── Design System: Layout Utilities ────────────────────────── */
.row     { display: flex; align-items: center; gap: var(--space-2); }
.col     { display: flex; flex-direction: column; gap: var(--space-2); }
.divider { width: 100%; height: 0; border: none; border-top: var(--border-thin); margin: var(--space-2) 0; }

/* ── Design System: Status & Feedback ───────────────────────── */
.badge         { display: inline-block; padding: 1px var(--space-1); font-size: var(--t-xs); font-family: var(--font); letter-spacing: var(--tracking); border-width: 1px; border-style: solid; border-color: var(--bg3); color: var(--text-dim); }
.badge--active { background: var(--hi); color: var(--bg-deep); border-color: var(--hi); }
.status-error  { color: var(--accent); font-size: var(--t-xs); font-family: var(--font); }
.status-ok     { color: var(--hi); font-size: var(--t-xs); font-family: var(--font); }

label { display: flex; align-items: center; gap: 4px; font-size: var(--t-sm); color: var(--accent2); letter-spacing: var(--tracking); }
input[type=number], select {
  background: var(--bg); color: var(--text); border: 2px solid var(--bg3);
  font-family: var(--font); font-size: var(--t-sm); padding: 2px 4px;
  letter-spacing: var(--tracking); border-radius: 0;
}
/* Scanlines */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    rgba(0,0,0,0.18) 2px,
    rgba(0,0,0,0.18) 4px
  );
  pointer-events: none;
  z-index: var(--z-system);
}

/* Pixel borders on all panels */
#topbar, #arrangement-panel, #pianoroll-panel {
  border-color: var(--bg3);
  image-rendering: pixelated;
}

/* Input / Select styling */
input, select {
  background: var(--bg); color: var(--text);
  border: 2px solid var(--bg3); outline: none;
  font-family: var(--font); font-size: var(--t-sm);
  letter-spacing: var(--tracking); border-radius: 0;
}
select, input[type=number], input[type=text], input[type=range] {
  font-size: var(--t-input) !important;
}
input:focus, select:focus { border-color: var(--hi-dim); }

/* Transport button states */
#btn-play:hover  { color: var(--text); }
#btn-rec         { color: var(--accent2); }
#btn-rec.armed   { color: var(--accent); animation: blink 0.8s step-end infinite; }
@keyframes blink  { 50% { opacity: 0.3; } }


/* NoteSeq modal */
#noteseq-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  align-items: center;
  justify-content: center;
  z-index: var(--z-modal-top);
}
#noteseq-modal.open { display: flex; }
#noteseq-modal-content {
  background: var(--bg-deep);
  border: 2px solid var(--bg3);
  padding: 14px;
  width: 340px;
  max-width: calc(100vw - 32px);
  max-height: 90vh;
  overflow-y: auto;
  font-family: var(--font);
}
.mg-seg {
  display: flex;
}
.mg-seg button {
  flex: 1;
  background: var(--bg3);
  color: var(--accent2);
  border: 2px solid var(--bg3);
  font-family: var(--font);
  font-size: var(--t-sm);
  padding: 5px 4px;
  cursor: pointer;
  letter-spacing: var(--tracking);
}
.mg-seg button.active {
  background: var(--hi-dim);
  color: var(--bg);
  border-color: var(--hi-dim);
}
.mg-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  gap: 6px;
}
.mg-label {
  font-size: var(--t-xs);
  color: var(--accent2);
  letter-spacing: var(--tracking);
  flex-shrink: 0;
}
.mg-stepper {
  display: flex;
  align-items: center;
  gap: 4px;
}
.mg-stepper button {
  background: var(--bg3);
  color: var(--text);
  border: 2px solid var(--bg3);
  font-family: var(--font);
  font-size: var(--t-sm);
  width: 20px;
  height: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.mg-stepper span {
  font-size: var(--t-sm);
  color: var(--text);
  min-width: 20px;
  text-align: center;
}
.mg-divider {
  height: 1px;
  background: var(--bg3);
  margin: 10px 0;
}
/* Step sequencer lane */
.mg-step-scroll {
  overflow-x: auto;
  overflow-y: hidden;
  margin: 6px 0;
  -webkit-overflow-scrolling: touch;
}
.mg-step-row {
  display: flex;
  flex-direction: row;
  width: max-content;
}
.mg-step-tone {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font);
  font-size: var(--t-sm);
  cursor: pointer;
  border: 1px solid var(--bg3);
  border-right: none;
  color: var(--bg-deep);
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.mg-step-tone:last-child { border-right: 1px solid var(--bg3); }
.mg-step-tone.rest { background: var(--bg); color: var(--bg3); }
.mg-step-tone.beat-marker { border-right: 2px solid var(--hi-dim) !important; }
.mg-step-tone.preview-active { outline: 2px solid #fff; outline-offset: -2px; filter: brightness(1.5); }
.mg-step-len {
  width: 28px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font);
  font-size: var(--t-xs);
  color: var(--accent2);
  cursor: pointer;
  border: 1px solid var(--bg3);
  border-right: none;
  border-top: none;
  background: var(--bg-deep);
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.mg-step-len:last-child { border-right: 1px solid var(--bg3); }
.mg-step-len.beat-marker { border-right: 2px solid var(--hi-dim) !important; }
.mg-step-oct {
  width: 28px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font);
  font-size: var(--t-xs);
  color: var(--text-dim);
  cursor: pointer;
  border: 1px solid var(--bg3);
  border-right: none;
  border-top: none;
  background: var(--bg-deep);
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.mg-step-oct:last-child { border-right: 1px solid var(--bg3); }
.mg-step-oct.beat-marker { border-right: 2px solid var(--hi-dim) !important; }
.mg-step-oct.nonzero { color: var(--hi-dim); }

/* Global typography & pixel-art constraints */
* { border-radius: 0 !important; box-shadow: none !important; }
button, input, select, textarea { letter-spacing: var(--tracking); }

/* Scrollbars */
::-webkit-scrollbar { width: 6px; height: 6px; background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg3); }
::-webkit-scrollbar-thumb:hover { background: var(--hi-dim); }

/* Dithered border pattern for panels */
#arrangement-panel { background: var(--bg);
  background-image: repeating-linear-gradient(
    45deg, transparent, transparent 2px,
    rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px
  );
}

/* ============================================================
   MOBILE UI — activates on screens < 768px
   ============================================================ */
body.mobile-mode #app { display: none !important; width: 0 !important; height: 0 !important; overflow: hidden !important; position: absolute !important; }
body.mobile-mode #mobile-app { display: flex !important; }

#mobile-app {
  display: none;
  flex-direction: column;
  align-items: stretch;
  width: 100%;
  max-width: 100vw;
  position: relative;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  overflow-x: hidden;
  background: var(--bg);
  font-family: var(--font);
  font-size: var(--t-base);
  color: var(--text);
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

/* Transport bar */
#mob-transport {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  background: var(--bg-deep);
  border-bottom: 2px solid var(--bg3);
  flex-shrink: 0;
  flex-wrap: nowrap;
  overflow-x: auto;
}
#mob-play-btn { font-size: 14px; }
#mob-bpm-display {
  background: var(--bg-deep);
  border: 2px solid var(--bg3);
  color: var(--hi);
  font-family: var(--font);
  font-size: var(--t-base);
  padding: 0 8px;
  height: 44px;
  min-width: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  flex-shrink: 0;
}
#mob-tap-btn { font-size: var(--t-sm); }
#mob-loop-btn { font-size: var(--t-sm); }
.mob-transport-spacer { flex: 1; min-width: 4px; }

/* Track list */
#mob-tracks {
  display: flex;
  flex-direction: row;
  gap: 4px;
  padding: 6px 8px;
  background: var(--bg-deep);
  border-bottom: 2px solid var(--bg3);
  overflow-x: auto;
  flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
}
.mob-track-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  min-width: 56px;
  height: 52px;
  border-radius: 4px;
  border: 2px solid transparent;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: var(--t-sm);
  cursor: pointer;
  flex-shrink: 0;
  padding: 4px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  text-align: center;
  line-height: 1.2;
}
.mob-track-btn:active { opacity: 0.7; }
.mob-track-btn.active { border-color: var(--hi); }
.mob-track-color-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Grid area (keyboard + bar nav + playhead + grid) */
#mob-grid-area {
  flex: 1 1 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  width: 100%;
  max-width: 100%;
  min-width: 0;
  min-height: 0;
  overflow-x: hidden;
  position: relative;
  touch-action: pan-y;
}

#mob-pitch-label {
  text-align: center;
  font-size: var(--t-sm);
  color: var(--hi);
  padding: 4px 0 2px;
  flex-shrink: 0;
  background: var(--bg);
}

/* Keyboard */
#mob-keyboard-wrap {
  display: flex;
  flex-direction: row;
  overflow-x: auto;
  overflow-y: hidden;
  flex-shrink: 0;
  width: 100%;
  max-width: 100%;
  min-width: 0;
  box-sizing: border-box;
  height: 48px;
  background: var(--bg-deep);
  border-top: 1px solid var(--bg3);
  border-bottom: 1px solid var(--bg3);
  -webkit-overflow-scrolling: touch;
  scroll-snap-type: x proximity;
}
.mob-piano-key {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 3px;
  cursor: pointer;
  flex-shrink: 0;
  border-right: 1px solid rgba(0,0,0,0.3);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  font-family: var(--font);
  font-size: var(--t-xs);
}
.mob-piano-key.white-key {
  width: 36px;
  height: 48px;
  background: #e8e0c8;
  color: #333;
}
.mob-piano-key.black-key {
  width: 24px;
  height: 30px;
  background: var(--bg-deep);
  color: var(--hi);
  margin-left: -12px;
  margin-right: -12px;
  z-index: 1;
  border-radius: 0 0 3px 3px;
}
.mob-piano-key.white-key:active { background: var(--hi); }
.mob-piano-key.black-key:active { background: var(--accent); }
.mob-piano-key.active-pitch.white-key { background: var(--hi); color: var(--bg-deep); }
.mob-piano-key.active-pitch.black-key { background: var(--hi); }
/* Key lights up when note is playing during sequencer playback */
.mob-piano-key.key-active.white-key { background: var(--accent); color: #fff; box-shadow: 0 0 6px var(--accent); }
.mob-piano-key.key-active.black-key { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

/* Bar navigation */
#mob-bar-nav {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  flex-shrink: 0;
  width: 100%;
  background: var(--bg);
}
